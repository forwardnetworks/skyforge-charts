    pullPolicy: IfNotPresent
  forward:
    baseUrl: https://skyforge-fwd.dc.forwardnetworks.com
  forwardImages:
    tag: 26.4.1-02
    imagePullSecretName: ""
    imagePullSecretNamespace: ""
