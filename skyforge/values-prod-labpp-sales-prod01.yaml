            memory: "8Gi"
          limits:
            cpu: "2"
            memory: "8Gi"
        probes:
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 180
          timeoutSeconds: 2
      logAggregation:
        enabled: true
        replicas: 1
      cbr:
        enabled: true
        server:
          pvc:
            size: "20Gi"
        agent:
          replicas: 1
          pvc:
            size: "20Gi"
        s3Agent:
          enabled: true
          replicas: 1
          pvc:
            size: "20Gi"
        s3Backup:
