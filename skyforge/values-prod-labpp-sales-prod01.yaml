kubernetes:
  imagePullSecrets:
    - ghcr-pull
skyforge:
  priorityClasses:
    create: true
  corePriorityClassName: "skyforge-core"
  hostname: skyforge.dc.forwardnetworks.com
  gateway:
    addresses:
      - type: IPAddress
        value: "10.128.65.100"
    additionalHostnames:
      - skyforge.craigjohnson.org
    ciliumLBIPAM:
      sharedIP: "10.128.65.100"
  cloudflareTunnel:
    enabled: true
    tokenSecretName: "skyforge-cloudflared-tunnel"
    tokenSecretKey: "token"
    replicas: 1
  observability:
    enabled: true
    managed:
      enabled: true
    dashboards:
      enabled: true
  platformData:
    storage:
      storageClassName: "local-path"
      accessMode: "ReadWriteOnce"
  skyforgeServerData:
    storage:
      storageClassName: "local-path"
      accessMode: "ReadWriteOnce"
  server:
    placement:
      requiredPoolClass: "app"
  worker:
    placement:
      requiredPoolClass: "app"
  coreStatefulPlacement:
    requiredPoolClass: "app"
  hooks:
    authRuntimeSync:
      runOnUpgrade: false
    coderAdminBootstrap:
      runOnUpgrade: false
    giteaActionsRunnerTokenReconcile:
      runOnUpgrade: true
  auth:
    mode: oidc
  dex:
    authMode: oidc
    replicas: 1
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 0
    placement:
      requiredAntiAffinity: false
      requiredPoolClass: "app"
      nodeSelector: {}
    oidc:
      issuer: "https://fn-prod.okta.com"
      clientID: "0oa127d1wd8JoI14f698"
      clientSecretSecretName: "dex-oidc-client-secret"
      clientSecretSecretKey: "dex-oidc-client-secret"
      redirectURI: "https://skyforge.dc.forwardnetworks.com/dex/callback"
      insecureSkipEmailVerified: true
  adminUsers: "skyforge,craigjohnson"
  oidc:
    discoveryUrl: "http://dex:5556/dex"
    issuerUrl: "https://skyforge.dc.forwardnetworks.com/dex"
    redirectUrl: "https://skyforge.dc.forwardnetworks.com/api/auth/oidc/callback"
  db:
    storage:
      storageClassName: "local-path"
    maxConnections: 1200
  edition: enterprise
  infoblox:
    enabled: true
    managed: true
    image: ghcr.io/forwardnetworks/kubevirt/infoblox-vnios:9.0.3-50212
    pullPolicy: IfNotPresent
    internalUrl: https://infoblox:443
    serviceName: infoblox
    servicePort: 443
    routeServiceName: ""
    routeServicePort: 0
    rewritePrefixToRoot: true
    serviceAlias:
      enabled: false
    proxyEnabled: false
    vm:
      cpuCores: 4
      memory: 32Gi
      managementMacAddress: "02:00:00:ab:cd:01"
      dedicatedCpuPlacement: false
      isolateEmulatorThread: false
      managementInterfaceModel: virtio
      auxiliaryInterfaceModel: virtio
      podNetworkBinding: masquerade
      multus:
        enabled: true
        createNADs: true
        lan1:
          macAddress: "02:00:00:ab:cd:11"
        ha:
          macAddress: "02:00:00:ab:cd:12"
        lan2:
          macAddress: "02:00:00:ab:cd:13"
    lifecycle:
      enabled: true
      autoStop:
        enabled: false
        schedule: "*/15 * * * *"
        maxIdleMinutes: 45
        maxRunMinutes: 180
      reseed:
        enabled: true
        schedule: "17 */6 * * *"
        resetAfterDays: 60
        haltWaitSeconds: 30
      license:
        enabled: true
        schedule: "*/20 * * * *"
        maxAttempts: 3
        attemptSleepSeconds: 60
        promptWaitSeconds: 600
        consoleTimeoutSeconds: 420
        virtctlVersion: v1.7.2
        licenseChoice: "2"
  jira:
    enabled: false
    managed: false
    storage:
      storageClassName: "local-path"
  rapid7:
    enabled: true
    managed: true
    image: ghcr.io/forwardnetworks/rapid7:20260307-r33
    resources:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "4"
        memory: "8Gi"
    storage:
      size: "100Gi"
      storageClassName: "local-path"
  rapid7Url: "https://skyforge.dc.forwardnetworks.com/rapid7"
  elk:
    enabled: false
    managed: false
  keda:
    enabled: true
    worker:
      enabled: true
      pollingInterval: 15
      cooldownPeriod: 120
      minReplicaCount: 1
      maxReplicaCount: 1
      query: "SELECT COUNT(*) FROM sf_tasks WHERE status = 'queued'"
      activationTargetQueryValue: "1"
      targetQueryValue: "5"
  burst:
    hetzner:
      enabled: false
      apiTokenSecretName: skyforge-hetzner-burst
      apiTokenSecretKey: api-token
      hubPublicKeySecretName: skyforge-hetzner-burst
      hubPublicKeySecretKey: public-key
      k3sTokenSecretName: skyforge-hetzner-burst
      k3sTokenSecretKey: token
