# Skyforge Helm values.
# Override anything here with your local deployment details.

skyforge:
  hooks:
    # Keep release upgrades deterministic: bootstrap/reconcile hooks run on
    # install by default and opt-in to post-upgrade behavior only when needed.
    authRuntimeSync:
      runOnUpgrade: false
      backoffLimit: 1
      activeDeadlineSeconds: 600
    gatewayNodePortsReconcile:
      runOnUpgrade: false
      backoffLimit: 1
      activeDeadlineSeconds: 300
    coderAdminBootstrap:
      runOnUpgrade: false
      backoffLimit: 1
      activeDeadlineSeconds: 600
    giteaActionsRunnerTokenReconcile:
      runOnUpgrade: false
      backoffLimit: 1
      activeDeadlineSeconds: 600
    dbProvision:
      runOnUpgrade: false
      backoffLimit: 0
      activeDeadlineSeconds: 900

  # Optional workload priority controls. Set class names in deployment values
  # and enable class creation for clusters where Skyforge manages these classes.
  priorityClasses:
    create: false
    core:
      name: "skyforge-core"
      value: 100000
      description: "Skyforge core/control-plane workloads."
    integrations:
      name: "skyforge-integrations"
      value: -100
      description: "Skyforge optional heavyweight integrations."
  corePriorityClassName: ""
  integrationsPriorityClassName: ""

  # Optional: run a standalone Atlas migration Job as a Helm hook.
  #
  # This is normally unnecessary because `skyforge-server` already runs migrations
  # in an initContainer before starting the API. Keeping this disabled avoids
  # hook-related upgrade failures when the cluster is temporarily unhealthy.
  migrateJob:
    enabled: false

  worker:
    replicas: 1
    priorityClassName: ""
    strategy:
      type: RollingUpdate
      # IntOrString values are supported (e.g. 0, "25%")
      maxUnavailable: 0
      maxSurge: 1
    placement:
      # Preferred hybrid placement for the worker deployment. Pool classes help
      # align workloads to node pools like control/app/lab/burst/onprem-lab.
      # These preferences are soft so unlabeled clusters continue to schedule.
      poolLabelKey: "skyforge.forwardnetworks.com/pool-class"
      pools:
        - app
        - lab
      poolWeight: 100
      # Optional hard requirement for clusters that explicitly label node pool class.
      requiredPoolClass: ""
      # Scheduling behavior when topology spread cannot be satisfied.
      topologyWhenUnsatisfiable: "ScheduleAnyway"
      nodeSelector: {}
      affinity: {}
      tolerations: []
      requiredAntiAffinity: false
    resources:
      requests:
        cpu: "250m"
        memory: "1Gi"
      limits: {}
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
    pdb:
      enabled: true
      minAvailable: 1
    tuning:
      interactiveConcurrency: 8
      interactiveQueueSize: 64
      backgroundConcurrency: 2
      backgroundQueueSize: 16
      heartbeatIntervalSeconds: 30
      reconcileQueuedIntervalSeconds: 30
      reconcileRunningIntervalSeconds: 300
      activationIntervalSeconds: 20
      activationMinQueuedAgeSeconds: 20
      activationBatchSize: 200
      diagStaleHeartbeatSeconds: 120
      diagOldestQueuedSeconds: 300

  # Optional: provide ENCORE_RUNTIME_CONFIG for Encore runtime infrastructure config.
  # NOTE: This is NOT the same as typed Encore config loaded via config.Load.
  encoreRuntimeConfig:
    create: false
    json: "{}"
    workerCreate: false
    workerJson: "{}"

  # Optional: provide ENCORE_CFG_SKYFORGE for typed Encore config (config.Load).
  # The value must be a JSON object; the chart will base64url-encode it.
  # Keep it non-secret: do not include passwords/tokens here.
  encoreCfg:
    create: true
    json: "{}"
    workerJson: "{}"
  hostname: "skyforge.local.forwardnetworks.com"
  server:
    replicas: 1
    migrateOnStartup: true
    priorityClassName: ""
    strategy:
      type: RollingUpdate
      # IntOrString values are supported (e.g. 0, "25%")
      maxUnavailable: 0
      maxSurge: 1
    pdb:
      enabled: true
      minAvailable: 1
    resources:
      requests:
        cpu: "250m"
        memory: "1Gi"
      limits: {}
    placement:
      # Control-plane workloads prefer the control/elevated pool by default.
      poolLabelKey: "skyforge.forwardnetworks.com/pool-class"
      pools:
        - control
      poolWeight: 100
      requiredPoolClass: ""
      # Scheduling behavior when topology spread cannot be satisfied.
      topologyWhenUnsatisfiable: "ScheduleAnyway"
      nodeSelector: {}
      tolerations: []
      affinity: {}
      requiredAntiAffinity: false
  domain: "forwardnetworks.com"
  gateway:
    # Optional explicit Gateway addresses.
    # Set this in production to avoid Gateway "AddressNotAssigned" status when
    # using Cilium Gateway API with node-IP ingress.
    # Example:
    # addresses:
    #   - type: IPAddress
    #     value: "10.128.16.60"
    addresses: []
    additionalHostnames: []
    # Local k3d can pin the generated cilium-gateway-* Service nodePorts to
    # stable values so host port bindings stay deterministic without adding a
    # separate ingress implementation.
    localNodePorts:
      enabled: false
      serviceName: cilium-gateway-skyforge
      http: 30080
      https: 30443
  publicTunnel:
    ngrok:
      enabled: false
      image: "docker.io/ngrok/ngrok:3"
      imagePullPolicy: "IfNotPresent"
      authtokenSecretName: "skyforge-ngrok"
      authtokenSecretKey: "authtoken"
      hostNetwork: false
      dnsPolicy: ""
      targetServiceName: "cilium-gateway-skyforge"
      targetServiceNamespace: "kube-system"
      targetServicePort: 80
      targetAddress: ""
      extraArgs: []
      env: {}
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
  # Skyforge uses Cilium Gateway API for ingress (no Traefik).
  kne:
    # Enable Kubernetes Network Emulation (KNE) meshnet components.
    # This installs the upstream meshnet CRDs + daemonset.
    enabled: false
    # meshnet mode: grpc or vxlan
    meshnetMode: grpc
    controllers:
      # Install upstream KNE vendor controller stacks (CRDs + controller Deployments).
      enabled: true
      ceoslab:
        enabled: true
      cdnos:
        enabled: true
      srlinux:
        enabled: true
      lemming:
        enabled: true
    # Source used for the vendored manifest files:
    # https://github.com/forwardnetworks/kne/tree/main/manifests
    upstreamRef: "forwardnetworks/kne@c5df08f"
  # Optional cookie Domain attribute. Leave empty for host-only cookies.
  # If you enable any Skyforge tools on a subdomain (e.g. Hoppscotch at
  # `tool.<skyforge.hostname>`), set this to a common parent domain like
  # `.forwardnetworks.com` so SSO cookies work across subdomains.
  cookieDomain: ""
  adminUsers: "skyforge"
  awsSsoRegion: "us-east-1"
  awsSsoStartUrl: ""
  cloudPricingCredentials:
    # Optional Kubernetes Secret that provides provider credentials for
    # server-side cloud pricing fetchers (AWS/Azure/GCP).
    secretName: "skyforge-cloud-pricing-creds"
    azureTenantIdKey: "SKYFORGE_AZURE_TENANT_ID"
    azureClientIdKey: "SKYFORGE_AZURE_CLIENT_ID"
    azureClientSecretKey: "SKYFORGE_AZURE_CLIENT_SECRET"
    gcpServiceAccountJSONKey: "SKYFORGE_GCP_SERVICE_ACCOUNT_JSON"
    awsAccessKeyIdKey: "SKYFORGE_AWS_ACCESS_KEY_ID"
    awsSecretAccessKeyKey: "SKYFORGE_AWS_SECRET_ACCESS_KEY"
  gitea:
    enabled: true
    storage:
      enabled: true
    apiUrl: "http://gitea:3000/api/v1"
    url: "https://skyforge.local.forwardnetworks.com/git"
    username: "skyforge"
    repoPrivate: true
    adminUsername: "skyforge"
    allowedDomains: ""
    actionsRunner:
      enabled: true
      replicas: 1
      # Runner image for Gitea Actions. Keep host-mode labels to avoid
      # Docker-in-Docker dependency.
      image: "ghcr.io/forwardnetworks/act_runner:0.2.12"
      pullPolicy: "IfNotPresent"
      # Runner registration token secret consumed by the runner.
      # Managed automatically by a chart hook job on install/upgrade.
      tokenSecretName: "gitea-actions-runner-token"
      tokenSecretKey: "token"
      # Comma-separated labels passed to act_runner.
      labels: "ubuntu-latest:host,self-hosted:host"
      # Poll interval (seconds) between workflow checks.
      fetchInterval: 2
  registry:
    # Container image registry used by the Designer palette.
    # Example: https://ghcr.io
    url: ""
    # Optional comma-separated prefixes to include (e.g. "forwardnetworks,lab").
    repoPrefixes: ""
    skipTlsVerify: false
    # Optional registry credentials (Kubernetes Secret name/key).
    usernameSecretName: "skyforge-registry-username"
    usernameSecretKey: "skyforge-registry-username"
    passwordSecretName: "skyforge-registry-password"
    passwordSecretKey: "skyforge-registry-password"
  netboxSsoUrl: ""
  nautobotSsoUrl: ""
  infobloxUrl: ""
  jiraUrl: ""
  rapid7Url: ""
  elkUrl: ""
  auth:
    # Browser authentication mode used by the Skyforge UI.
    # - local: local Skyforge/Dex username-password login
    # - oidc: browser login via /api/auth/oidc/login, with Dex acting as the OIDC broker
    mode: "local"
  debug:
    # Optional access logging for Envoy SSO proxies. Useful when debugging
    # Gateway/API or app-prefix issues without introducing a second proxy path.
    ssoProxyAccessLog: false
  # Public base URL for Skyforge (used for webhook and SNMP instructions).
  publicUrl: ""
  oidc:
    # Internal Skyforge -> Dex discovery URL used only when skyforge.auth.mode=oidc.
    # This is not the upstream IdP/Okta endpoint; configure that under skyforge.dex.oidc.*.
    discoveryUrl: "http://dex:5556/dex"
  listenAddr: ":8085"
  maxGroups: 50
  ssoSkipTlsVerify: false
  netbox:
    enabled: false
    internalUrl: ""
    storage:
      enabled: true
    # Redis database index for NetBox (shared Redis service).
    # Keep distinct from Skyforge (0) and Nautobot (1).
    redisDatabase: 2
    bootstrap:
      # NetBox bootstrap is a one-time operation. Disable when NetBox is
      # intentionally scaled to zero (for example, KEDA subordinate mode), or
      # Helm post-upgrade hooks will wait on a pod that is not expected to run.
      enabled: true
  netboxUrl: ""
  netboxMgmtSubnet: "10.255.0.0/24"
  nautobot:
    enabled: false
    internalUrl: ""
    # Redis database index for Nautobot (shared Redis service).
    # Keep distinct from Skyforge (0) and NetBox (2).
    redisDatabase: 1
    bootstrap:
      # Nautobot bootstrap is a one-time operation. Leaving this enabled causes Helm
      # upgrades with `--wait` to hang/fail if the bootstrap job ever fails (and it is
      # not required for steady-state operation).
      enabled: false
  nautobotUrl: ""
  infoblox:
    enabled: false
    internalUrl: ""
    externalPrefix: "/infoblox"
    oidc:
      # OIDC-gated browser access through Skyforge SSO proxy.
      # Disabled by default for Infoblox to preserve native appliance session/login behavior.
      enabled: false
      # Managed Infoblox service usually exposes both 443 and 80. Default to
      # HTTP upstream here to avoid appliance certificate trust bootstrap.
      upstreamPort: 80
      upstreamUseTLS: false
      upstreamTLSSkipVerify: false
      upstreamTrustedCAConfigMap: ""
      upstreamTrustedCAFile: "ca.crt"
    # Managed KubeVirt runtime (VM + Service) for Infoblox.
    # When enabled, skyforge.infoblox.image must be set.
    managed: false
    image: ""
    pullPolicy: "IfNotPresent"
    # Direct in-cluster service route (no extra proxy tier).
    serviceName: "infoblox"
    serviceNamespace: ""
    servicePort: 443
    routeServiceName: ""
    routeServicePort: 0
    rewritePrefixToRoot: true
    vm:
      cpuCores: 4
      memory: "32Gi"
      # Host CPU passthrough improves appliance performance and reduces emulation overhead.
      cpuModel: "host-passthrough"
      # Pin vCPUs for lower jitter on heavier VM workloads.
      dedicatedCpuPlacement: true
      # Isolate emulator thread from guest vCPUs when dedicated CPU placement is enabled.
      isolateEmulatorThread: true
      # Enable IO thread scheduling for virtio block/network paths.
      ioThreadsPolicy: "auto"
      # Enable virtio-net multiqueue for higher packet throughput.
      networkInterfaceMultiqueue: true
      hugepages:
        # Keep disabled until worker nodes expose hugepages resources.
        enabled: false
        pageSize: "2Mi"
      managementInterfaceModel: "virtio"
      auxiliaryInterfaceModel: "virtio"
      # Pod network binding for the management NIC.
      # Supported values: masquerade, bridge.
      podNetworkBinding: "masquerade"
      multus:
        enabled: false
        createNADs: false
      lan1:
        nadName: "infoblox-lan1"
        networkName: "infoblox-lan1"
        bridgeName: "br-ibx-l1"
        # Per-NAD IPAM type: host-local (default) or dhcp.
        ipamType: "host-local"
        subnet: "169.254.101.0/24"
        isGateway: false
        ipMasq: false
      ha:
        nadName: "infoblox-ha"
        networkName: "infoblox-ha"
        bridgeName: "br-ibx-ha"
        ipamType: "host-local"
        subnet: "169.254.102.0/24"
      lan2:
        nadName: "infoblox-lan2"
        networkName: "infoblox-lan2"
        bridgeName: "br-ibx-l2"
        ipamType: "host-local"
        subnet: "169.254.103.0/24"
      nodeSelector: {}
      tolerations: []
    lifecycle:
      # Managed Infoblox VM lifecycle controls.
      # Auto-stop reduces idle resource use by halting long-running VM sessions.
      # Reseed restarts the VM from stock containerDisk on a fixed cadence
      # (used for temp-license renewal workflows).
      enabled: true
      # Optional override for the lifecycle controller image. Defaults to
      # images.kubectl when empty.
      image: ""
      pullPolicy: "IfNotPresent"
      stateConfigMapName: "infoblox-vm-lifecycle-state"
      autoStop:
        enabled: true
        # Cron expression for checking VM runtime.
        schedule: "*/15 * * * *"
        # Set true only for temporary operator pause; default is always active.
        suspend: false
        # Halt VM after this many minutes without observed Skyforge access.
        # Access timestamps are updated from Infoblox status/wake/console flows.
        maxIdleMinutes: 45
        # Halt VM after this many minutes of continuous runtime.
        # This is a hard safety cap even if access signals continue.
        maxRunMinutes: 360
      reseed:
        enabled: true
        # Cron expression for checking reseed age.
        schedule: "17 */6 * * *"
        # Set true only for temporary operator pause; default is always active.
        suspend: false
        # Restart VM from stock containerDisk after this many days.
        resetAfterDays: 60
        haltWaitSeconds: 30
      license:
        # Best-effort periodic temp-license reconcile.
        # Runs non-interactive console bootstrap when HTTPS is still down
        # or when reseed marks license_pending=true.
        enabled: true
        schedule: "*/20 * * * *"
        # Optional virtctl image that includes /usr/local/bin/virtctl.
        # Leave empty to use chart default.
        virtctlImage: ""
        # Set true only for temporary operator pause; default is always active.
        suspend: false
        maxAttempts: 3
        attemptSleepSeconds: 20
        promptWaitSeconds: 180
        consoleTimeoutSeconds: 240
        postBootstrapWaitSeconds: 45
        initialWaitSeconds: 8
    # When true, create a simple Service alias (and Endpoints for IP targets)
    # so Gateway can route directly without sidecar/app proxy Deployments.
    serviceAlias:
      enabled: true
    # Legacy proxy mode for external/non-Kubernetes endpoints.
    # Keep disabled by default; direct Service routing is preferred.
    proxyEnabled: false
    # Attach a secondary interface via Multus NAD (lanNetworkName) when needed.
    # Used only when proxyEnabled=true.
    attachLanNetwork: false
    # Existing LAN-side appliance IP reachable from the raw in-cluster proxy.
    # Used only when proxyEnabled=true.
    upstreamHost: "192.168.1.2"
    upstreamPort: 443
    upstreamScheme: "https"
    lanNetworkName: "infoblox-lan1"
    nodeSelector: {}
  jira:
    enabled: false
    # In-cluster Jira Service wiring.
    managed: false
    image: "docker.io/atlassian/jira-software:latest"
    pullPolicy: "IfNotPresent"
    serviceName: "jira"
    serviceNamespace: ""
    servicePort: 8080
    containerPort: 8080
    externalPrefix: "/jira"
    rewritePrefixToRoot: false
    oidc:
      # OIDC-gated browser access through Skyforge SSO proxy.
      enabled: true
    contextPath: "/jira"
    storage:
      enabled: true
      size: "20Gi"
      storageClassName: ""
    resources:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
    env:
      ATL_PROXY_NAME: "skyforge.local.forwardnetworks.com"
      ATL_PROXY_PORT: "443"
      ATL_TOMCAT_SCHEME: "https"
      ATL_TOMCAT_SECURE: "true"
      JVM_MINIMUM_MEMORY: "2048m"
      JVM_MAXIMUM_MEMORY: "4096m"
  rapid7:
    enabled: false
    # In-cluster Rapid7 Service wiring.
    managed: false
    image: ""
    pullPolicy: "IfNotPresent"
    serviceName: "rapid7"
    serviceNamespace: ""
    servicePort: 3780
    containerPort: 3780
    progressDeadlineSeconds: 3600
    externalPrefix: "/rapid7"
    rewritePrefixToRoot: true
    oidc:
      # OIDC-gated browser access through Skyforge SSO proxy.
      enabled: true
      upstreamUseTLS: true
      # Rapid7 often presents a self-signed cert in lab installs.
      upstreamTLSSkipVerify: true
      upstreamTrustedCAConfigMap: ""
      upstreamTrustedCAFile: "ca.crt"
    storage:
      enabled: true
      size: "50Gi"
      storageClassName: ""
    resources:
      requests:
        cpu: "2"
        memory: "8Gi"
      limits:
        cpu: "4"
        memory: "16Gi"
    priorityClassName: ""
    env: {}
    # Gateway API backend TLS policy for direct /rapid7 routing.
    # When enabled, chart renders a BackendTLSPolicy targeting the Rapid7
    # Service (sectionName=https) and validates the backend certificate against
    # the configured CA ConfigMap.
    backendTLS:
      enabled: false
      hostname: "rapid7"
      caConfigMapName: "rapid7-ca"
      policyName: "rapid7-backend-tls"
  elk:
    enabled: false
    managed: false
    image: "sebp/elk:8.13.4"
    pullPolicy: "IfNotPresent"
    # Route Kibana through Gateway API.
    serviceName: "kibana"
    serviceNamespace: ""
    servicePort: 5601
    containerPort: 5601
    externalPrefix: "/elk"
    rewritePrefixToRoot: false
    oidc:
      # OIDC-gated browser access through Skyforge SSO proxy.
      enabled: true
    storage:
      enabled: true
      size: "20Gi"
      storageClassName: ""
    resources:
      requests:
        cpu: "1000m"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
    priorityClassName: ""
    env:
      ELASTICSEARCH_START: "1"
      LOGSTASH_START: "1"
      KIBANA_START: "1"
      SERVER_BASEPATH: "/elk"
      SERVER_REWRITEBASEPATH: "true"
  keda:
    # Optional KEDA autoscaling for heavy managed integrations.
    # Requires KEDA CRDs to be installed cluster-wide.
    enabled: false
    requireCRD: true
    worker:
      enabled: false
      pollingInterval: 15
      cooldownPeriod: 120
      minReplicaCount: 1
      maxReplicaCount: 6
      # Queue pressure query against Skyforge task state.
      query: "SELECT COUNT(*) FROM sf_tasks WHERE status = 'queued'"
      activationTargetQueryValue: "1"
      targetQueryValue: "5"
    jira:
      enabled: false
      pollingInterval: 30
      cooldownPeriod: 900
      minReplicaCount: 1
      maxReplicaCount: 2
      triggers:
        - type: cpu
          metricType: Utilization
          metadata:
            value: "70"
    netbox:
      enabled: false
      pollingInterval: 30
      cooldownPeriod: 900
      minReplicaCount: 1
      maxReplicaCount: 2
      triggers:
        - type: cpu
          metricType: Utilization
          metadata:
            value: "70"
    nautobot:
      enabled: false
      pollingInterval: 30
      cooldownPeriod: 900
      minReplicaCount: 1
      maxReplicaCount: 2
      triggers:
        - type: cpu
          metricType: Utilization
          metadata:
            value: "70"
    rapid7:
      enabled: false
      pollingInterval: 30
      cooldownPeriod: 900
      minReplicaCount: 1
      maxReplicaCount: 2
      triggers:
        - type: cpu
          metricType: Utilization
          metadata:
            value: "70"
    elkProxy:
      enabled: false
      pollingInterval: 30
      cooldownPeriod: 900
      minReplicaCount: 1
      # The bundled ELK image is a single-node stack sharing one RWO
      # Elasticsearch data volume, so it cannot scale horizontally.
      maxReplicaCount: 1
      triggers:
        - type: cpu
          metricType: Utilization
          metadata:
            value: "70"
  yaadeUrl: "http://yaade"
  yaadeAdminUsername: "admin"
  yaade:
    enabled: true
    internalUrl: ""
    storage:
      enabled: true

  # Optional Kubernetes admission policies that harden the cluster against
  # non-native runtime patterns (Docker-in-Docker / docker.sock).
  #
  # Requires Kubernetes v1.30+ (ValidatingAdmissionPolicy).
  admissionPolicies:
    enabled: false
    # Namespace selector for enforcement (only namespaces matching this label are checked).
    namespaceSelectorLabel: "skyforge-managed"
    namespaceSelectorValue: "true"
    # Deny Pods that mount /var/run/docker.sock via hostPath.
    forbidDockerSock: true
  staticRoot: "/opt/skyforge/static"
  objectStorage:
    endpoint: "s3gw:7480"
    useSsl: false
    filesBucket: "skyforge-files"
    # Kubernetes Secret (name/key) that holds the object storage access key used by
    # Skyforge artifact storage.
    #
    # Defaults match the existing secret names; you can rename the underlying
    # Secrets (for example, dropping "-terraform") by overriding these values.
    #
    accessKeySecretName: "object-storage-root-user"
    accessKeySecretKey: "object-storage-root-user"
    secretKeySecretName: "object-storage-root-password"
    secretKeySecretKey: "object-storage-root-password"
  terraform:
    path: ""
  netlab:
    sshUser: "ubuntu"
    stateRoot: "/var/lib/skyforge/netlab"
    # Single netlab runtime image used for both create and apply phases.
    # NOTE: Override with a pinned tag in deploy values for reproducibility.
    image: "ghcr.io/forwardnetworks/skyforge-netlab:20260325-vsrx-transitional-r9"
    pullPolicy: "IfNotPresent"
    runtimePrepull:
      enabled: false
      # Keep this low-impact; the pod only exists to ensure the image is cached.
      resources:
        requests:
          cpu: "10m"
          memory: "32Mi"
        limits: {}
  dns:
    enabled: false
    adminUsername: "admin"
    userZoneSuffix: "skyforge"
    # NodePort for UDP/TCP 53 on the k3s host.
    nodePort: 30053
    # NodePort for the DNS web UI on the k3s host.
    webNodePort: 30380
  userDataDir: "/var/lib/skyforge"
  userDeleteMode: "live"
  uiThemeDefault: ""
  # Typed config equivalent of SKYFORGE_NOTIFICATIONS_ENABLED. Default true.
  notificationsEnabled: true
  # Product edition controls Forward defaults and OSS-facing behavior.
  # enterprise: Forward integrations available (subject to skyforge.forward.enabled)
  # oss: Forward integrations forced off in generated Encore config
  edition: "enterprise"
  forward:
    # Enable Forward Networks integration (collector deployment + sync actions).
    # When false, Skyforge hides Forward UI and disables Forward API endpoints.
    enabled: true
    snmpPlaceholderEnabled: true
  forwardCluster:
    # Global Forward Cluster UI endpoint.
    enabled: false
    # Optional dedicated hostname for Forward Cluster wildcard routing.
    # Example: skyforge-fwd.local.forwardnetworks.com
    hostname: ""
    # TLS secret used for the dedicated Forward hostname listener when
    # forwardCluster.hostname differs from skyforge.hostname.
    tlsSecretName: "proxy-tls-fwd"
    # In-cluster Forward app Service routed by Cilium Gateway.
    serviceName: "fwd-appserver"
    serviceNamespace: "forward"
    servicePort: 8080
    nodeRoleReconciler:
      enabled: false
      # Reconcile the Forward scheduling labels onto the intended nodes. This
      # self-heals node re-registration drift where a recreated node object
      # loses its role labels and Forward master pods become unschedulable.
      schedule: "*/1 * * * *"
      image: ""
      pullPolicy: "IfNotPresent"
      successfulJobsHistoryLimit: 1
      failedJobsHistoryLimit: 2
      ttlSecondsAfterFinished: 3600
      roleLabel: "forwardnetworks.com/role"
      roleValue: "forward"
      scratchGroupLabel: "forwardnetworks.com/scratch-group"
      scratchGroupValue: "forward-scratch"
      poolLabelKey: "skyforge.forwardnetworks.com/pool-class"
      # Optional explicit node inventory that should have Forward role labels
      # actively reconciled (including label removals when roles are unassigned).
      managedNodes: []
      nodeRoles:
        master: []
        monitoring: []
        compute: []
        search: []
        forward: []
      nodePools:
        control: []
        app: []
        lab: []
    contractValidation:
      # Fail Helm rendering when Forward node-role or Longhorn node contracts
      # drift from the expected production topology.
      enabled: false
      longhornNamespace: "longhorn-system"
      expectedLonghornDataPath: "/var/lib/longhorn"
      expectedForwardPoolClass: "app"
      expectedForwardRoleLabel: "forwardnetworks.com/role"
      expectedForwardRoleValue: "forward"
      minimumLonghornDiskBytes: 1000000000000
  observability:
    # Global browser-facing observability UIs used by Skyforge platform
    # operations and capacity workflows.
    enabled: true
    # Namespace where Grafana/Prometheus services live. Leave empty to use the
    # Skyforge release namespace.
    namespace: ""
    grafana:
      externalPrefix: "/grafana"
      serviceName: "skyforge-grafana"
      servicePort: 3000
      rewritePrefixMatch: "/grafana"
      oidc:
        enabled: true
        clientID: "grafana"
        clientSecretSecretName: "dex-client-grafana-secret"
        clientSecretSecretKey: "dex-client-grafana-secret"
    prometheus:
      externalPrefix: "/prometheus"
      serviceName: "skyforge-prometheus"
      servicePort: 9090
      rewritePrefixMatch: "/prometheus"
      # Optional in-cluster Prometheus base URL used by Skyforge signals API.
      # Defaults to http://<serviceName>.<namespace>.svc.cluster.local:<servicePort>
      internalBaseURL: ""
    dashboards:
      # When true, create Grafana dashboard ConfigMaps in the observability
      # namespace. This relies on Grafana sidecar dashboard discovery
      # conventions.
      enabled: false
      labelKey: "grafana_dashboard"
      labelValue: "1"
      folder: "Skyforge"
    managed:
      # Deploy a built-in Prometheus + Grafana stack for platform observability.
      enabled: false
      scrapeInterval: "30s"
      prometheus:
        image: "quay.io/prometheus/prometheus:v2.55.1"
        retention: "15d"
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits: {}
        persistence:
          enabled: true
          size: "20Gi"
          storageClassName: ""
      grafana:
        image: "grafana/grafana:11.2.2"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits: {}
      nodeExporter:
        enabled: true
        serviceName: "skyforge-node-exporter"
        image: "prom/node-exporter:v1.8.2"
  forwardCollector:
    # Optional: enable the in-cluster Forward collector by configuring the image.
    # When empty, Skyforge will not deploy a collector Pod (Collector page will
    # show "not configured").
    # Example:
    # image: "harbor.local.forwardnetworks.com/forward/fwd_collector:26.3.3-02"
    image: ""
    pullPolicy: "IfNotPresent"
    heapSizeGB: 0
    # Optional: registry pull secret to use for the collector image. When empty,
    # Skyforge falls back to the global Kubernetes imagePullSecret.
    imagePullSecretName: ""
    imagePullSecretNamespace: ""
  sessionTtl: "8h"
  cookieSecure: true
  openApiUrl: ""
  health:
    httpChecks: "Edge|edge|http://skyforge-server Server|server|http://skyforge-server Testing|api|http://yaade/api-testing/|/api-testing/;API Docs|redoc|http://redoc:80/|/redoc/;Webhook Inbox|webhooks|http://skyforge-server"
    codeChecks: "Postgres|postgres|pg|db;Redis|redis|redis|redis;RADIUS|radius|radius|freeradius"
  admin:
    username: "skyforge"
    name: "Skyforge"
  provisioner:
    login: "skyforge-provisioner"
    name: "Skyforge Provisioner"
  ui:
    productName: "Skyforge"
    productSubtitle: "Automation Hub"
    logoUrl: "/assets/skyforge/FN-logo.svg"
    logoAlt: "Skyforge"
    headerBgUrl: "/assets/skyforge/header-background.png"
    supportText: "Need access? Contact your platform admin."
    supportUrl: ""
  s3gw:
    enabled: true
    serviceName: "s3gw"
    service:
      port: 7480
    persistence:
      enabled: true
      size: "5Gi"
  # Placement for core PVC-backed platform services that must stay on a stable
  # node in local-path or other node-local storage environments.
  #
  # This is intentionally separate from the API/worker placement knobs because
  # DB/Redis/Gitea/object storage have different scheduling constraints.
  coreStatefulPlacement:
    requiredPoolClass: ""
    nodeSelector: {}
    tolerations: []
    affinity: {}
  db:
    host: "db"
    port: "5432"
    name: "skyforge_server"
    user: "skyforge_server"
    sslmode: "disable"
    storage:
      enabled: true
    # Forward services can open many idle JDBC sessions; keep headroom so
    # platform integrations (Dex/NetBox/Nautobot/Coder) are not starved.
    maxConnections: 600
  redis:
    storage:
      enabled: true
  sessionCookie: "skyforge_session"
  syslog:
    enabled: false
    # Syslog events are collected via Vector (DaemonSet, hostNetwork).
    # Host port to bind on each node (UDP); defaults to 514.
    hostPort: 514
  snmpTraps:
    enabled: false
    # SNMP trap events are collected via Telegraf (DaemonSet, hostNetwork).
    # Host port to bind on each node (UDP); defaults to 162.
    hostPort: 162
  nodeMetrics:
    enabled: false
    interval: "10s"
  coder:
    enabled: true
    storage:
      enabled: true
    # Enables password auth for the bootstrap admin user (useful for demos).
    # Keep this true for strict SSO-only deployments.
    disablePasswordAuth: true
    oidcAutoLogin: true
    # Portal link (/coder) redirect target.
    # Default uses Coder's standard landing path.
    # For demo "open VS Code", set this to something like:
    #   /user/@skyforge-demo/skyforge-demo/apps/code-server
    portalRedirectPath: "/coder/launch"
    # Optional bootstrap admin user (created once, idempotent).
    # If you leave these empty, you'll need to create the first user manually.
    bootstrap:
      username: ""
      email: ""
      passwordSecretName: "coder-admin-bootstrap"
      passwordSecretKey: "password"
    demo:
      enabled: false
  dex:
    enabled: true
    # When false, Dex config is expected to be provided via the `dex-config` Secret
    # (for example, via deploy/skyforge-secrets.yaml). When true, the chart
    # generates and manages `dex-config` based on the values below.
    manageConfig: true
    # Optional: tweak Dex login page UX/branding. These settings are applied by an initContainer
    # that patches the Dex config from the `dex-config` Secret at startup.
    webTheme: ""
    logoUrl: "/assets/skyforge/FN-logo.svg"
    # Dex connector mode. This controls Dex's upstream identity source, not
    # Skyforge's browser-auth selector.
    # - local: Dex static password DB (useful for tool SSO or standalone Dex testing)
    # - google: Google Project / Cloud Identity login
    # - oidc: Generic OIDC connector (for providers such as Okta)
    # - mock: mock callback connector (dev/test only)
    authMode: "local"
    local:
      # Dex login identity for local-password mode.
      username: "skyforge"
      email: "skyforge@skyforge.local.forwardnetworks.com"
      userID: "skyforge"
      # Optional: provide a precomputed bcrypt hash for Dex staticPasswords.
      # When empty, the chart derives a bcrypt hash from skyforge-admin-shared.password.
      passwordHash: ""
    google:
      # Google OAuth client ID for Dex.
      # Redirect URI to configure in Google Cloud:
      #   https://<skyforge.hostname>/dex/callback
      clientID: ""
      # Optional restriction to specific Google Project domains.
      hostedDomains:
        - "forwardnetworks.com"
      # Where to read the Google OAuth client secret from.
      clientSecretSecretName: "dex-google-client-secret"
      clientSecretSecretKey: "dex-google-client-secret"
    oidc:
      # Generic OIDC connector (for example, Okta).
      # Redirect URI to configure at the IdP:
      #   https://<skyforge.hostname>/dex/callback
      issuer: ""
      clientID: ""
      clientSecretSecretName: "dex-oidc-client-secret"
      clientSecretSecretKey: "dex-oidc-client-secret"
      # Optional override; defaults to https://<skyforge.hostname>/dex/callback
      redirectURI: ""
      # Allow providers that omit the optional `email_verified` claim.
      insecureSkipEmailVerified: false
      # Optional provider-specific scopes.
      scopes:
        - openid
        - profile
        - email
        - groups
  redoc:
    enabled: true
images:
  # Use non-DockerHub registries for common base images to avoid Docker Hub pull rate limits.
  alpine: "public.ecr.aws/docker/library/alpine:latest"
  kubectl: "public.ecr.aws/bitnami/kubectl:1.35.3"
  envoy: "envoyproxy/envoy:v1.31.2"
  python: "ghcr.io/forwardnetworks/skyforge-python:3.12-alpine"
  # Vector publishes official images under `timberio/vector` (Docker Hub).
  # NOTE: If Docker Hub rate limits are a concern, mirror this image into your registry.
  vector: "timberio/vector:0.44.0-debian"
  telegraf: "ghcr.io/forwardnetworks/skyforge-telegraf:1.33-alpine"
  freeradius: "ghcr.io/freeradius/freeradius-server:3.2.5"
  # Prefer GHCR (Docker Hub rate limits are painful in-cluster).
  gitea: "ghcr.io/go-gitea/gitea:1.24.6-rootless"
  giteaActRunner: "ghcr.io/forwardnetworks/act_runner:0.2.12"
  coder: "ghcr.io/coder/coder:latest"
  yaade: "ghcr.io/esperotech/yaade:latest"
  dex: "ghcr.io/dexidp/dex:v2.44.0"
  s3gw: "quay.io/s3gw/s3gw:latest"
  postgres: "public.ecr.aws/docker/library/postgres:15-alpine"
  redis: "public.ecr.aws/docker/library/redis:7-alpine"
  redoc: "redocly/redoc:v2.5.0"
  technitiumDns: "docker.io/technitium/dns-server@sha256:94f2b90d63f03181421152157a8099ea2752b13fa30b6c96833859be8e93dfa9"
  atlas: "ghcr.io/forwardnetworks/atlas:1.1.6-alpine"
  skyforgeNautobot: "ghcr.io/forwardnetworks/skyforge-nautobot:20260127-1253-277c9dc4"
  skyforgeNetbox: "ghcr.io/forwardnetworks/skyforge-netbox:4.5.0"
  skyforgeServer: "ghcr.io/forwardnetworks/skyforge-server:20260326-kne-raw-r1"
  # Optional dedicated task worker image (build-tagged to include the PubSub subscription).
  # Defaults to the same image as skyforgeServer for local/dev workflows.
  skyforgeServerWorker: "ghcr.io/forwardnetworks/skyforge-server:20260326-kne-raw-r1-worker"
  nsq: "ghcr.io/forwardnetworks/skyforge-nsqd:v1.2.1"
nsq:
  enabled: true

kubernetes:
  # Optional image pull secrets to attach to service accounts created by the chart.
  # Example: ["ghcr-pull"] for private GHCR images.
  imagePullSecrets: []
  imagePullSecret:
    # Optional: create a pull secret in the release namespace.
    # Useful for OSS-style installs where you want a single script to set up
    # everything. Prefer supplying this via `--set-file` to avoid shell quoting.
    create: false
    name: "ghcr-pull"
    # Raw docker config JSON (contents of ~/.docker/config.json), NOT base64.
    dockerConfigJson: ""

secrets:
