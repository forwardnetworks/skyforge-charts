skyforge:
  forwardCluster:
    workers:
      owner: "skyforge"
      adoptionAcknowledged: true
      namespace: "forward"
      imagePullSecretName: "forward-registry-pull"
      imagePullPolicy: "IfNotPresent"
      alpineImage: "quay.io/forwardnetworks/docker:alpine_3.18.3"
      priorityClassName: ""
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      memoryProfileConfigMapName: "fwd-memory-profile-overrides"
      rollout:
        strategyType: "RollingUpdate"
        maxUnavailable: 0
        maxSurge: 1
        minReadySeconds: 10
        progressDeadlineSeconds: 600
        terminationGracePeriodSeconds: 90
        preStopSleepSeconds: 20
      pdb:
        enabled: true
        compute:
          minAvailable: 1
        search:
          minAvailable: 1
      discovery:
        nodeAgentHeadlessAlias:
          enabled: true
          serviceName: "fwd-node-agent-headless"
      containerMounts:
        logs: "/var/log/forward"
        scratchDataDir: "/scratch/data"
      scratch:
        hostPath: "/mnt/forward/extended/scratch/pods"
      logForwarding:
        enabled: true
        fluentBitImage: "quay.io/forwardnetworks/docker:fluent_fluent-bit_1.9.3"
        httpPort: 2020
        outputs:
          - host: "fwd-log-aggregator-0"
            port: 24224
          - host: "fwd-log-aggregator-1"
            port: 24224
      database:
        mode: "external"
        port: 5432
        appHost: "db.skyforge.svc.cluster.local"
        fdbHost: "db.skyforge.svc.cluster.local"
        sslMode: "DISABLE"
        certificate: ""
        appCredentialsSecretName: "postgres.fwd-pg-app.credentials"
        appUserKey: "user"
        appPasswordKey: "password"
        fdbExternalCredentialsSecretName: "postgres.fwd-pg-fdb.credentials"
        fdbUserKey: "user"
        fdbPasswordKey: "password"
        fdbInternalPartition0SecretName: "postgres.fwd-pg-fdb-0.credentials"
        fdbInternalPartition1SecretName: "postgres.fwd-pg-fdb-1.credentials"
        fdbPartitionPasswordKey: "password"
      compute:
        replicas: 5
        image: "harbor.local.forwardnetworks.com/forward/fwd_compute_worker:26.4.0-02"
        port: 30060
        reservedMemoryOverride: ""
        memoryLimitMB: 0
        memoryPctOverride: ""
        resources:
          requests:
            cpu: "4"
            memory: "12Gi"
          limits:
            cpu: "4"
            memory: "12Gi"
        probes:
          initialDelaySeconds: 10
          periodSeconds: 60
          failureThreshold: 10
          timeoutSeconds: 3
      search:
        replicas: 5
        image: "harbor.local.forwardnetworks.com/forward/fwd_search_worker:26.4.0-02"
        port: 30050
        reservedMemoryOverride: ""
        memoryLimitMB: 0
        memoryPctOverride: ""
        ioexecThreadsPerCore: ""
        fdbJdbcMaxPoolSize: 30
        resources:
          requests:
            cpu: "4"
            memory: "8Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        probes:
          initialDelaySeconds: 10
          periodSeconds: 60
          failureThreshold: 10
          timeoutSeconds: 3
