skyforge:
  backups:
    localSpread:
      enabled: true
    offsiteRaw:
      enabled: true
    forwardRaw:
      enabled: true
  platformData:
    storage:
      storageClassName: "longhorn"
      accessMode: "ReadWriteOnce"
  skyforgeServerData:
    storage:
      storageClassName: "longhorn"
      accessMode: "ReadWriteOnce"
  priorityClasses:
    create: true
    core:
      name: "skyforge-core"
      value: 100000
    integrations:
      name: "skyforge-integrations"
      value: -100
    labs:
      name: "skyforge-lab"
      value: -1000
  corePriorityClassName: "skyforge-core"
  integrationsPriorityClassName: "skyforge-integrations"
  labPriorityClassName: "skyforge-lab"
  apiPriorityAndFairness:
    create: true
  auth:
    mode: oidc
  db:
    storage:
      storageClassName: "longhorn"
  hostname: skyforge.local.forwardnetworks.com
  domain: forwardnetworks.com
  publicUrl: https://skyforge.local.forwardnetworks.com
  gateway:
    # Local Skyforge exposure uses the LB-IPAM/L2-announced VIP path.
    # Keep addresses empty so Cilium assigns the reserved Gateway VIP.
    addresses: []
    localNodePorts:
      enabled: false
  dex:
    manageConfig: true
    authMode: oidc
    oidc:
      issuer: https://fn-prod.okta.com
      clientID: 0oa108ytsjzRXoJw3698
      insecureSkipEmailVerified: true
      clientSecretSecretName: dex-oidc-client-secret
      clientSecretSecretKey: dex-oidc-client-secret
  adminUsers: "skyforge,craigjohnson"
  encoreCfg:
    create: true
  encoreRuntimeConfig:
    create: false
    workerCreate: false
  netbox:
    enabled: true
  netboxUrl: https://skyforge.local.forwardnetworks.com/netbox
  netboxSsoUrl: https://skyforge.local.forwardnetworks.com/netbox
  nautobot:
    enabled: true
  nautobotUrl: https://skyforge.local.forwardnetworks.com/nautobot
  nautobotSsoUrl: https://skyforge.local.forwardnetworks.com/nautobot
  redoc:
    enabled: true
  registry:
    url: https://ghcr.io
  infoblox:
    enabled: false
  jira:
    enabled: false
  rapid7:
    enabled: true
    backendTLS:
      enabled: true
      hostname: rapid7
      caConfigMapName: rapid7-ca
  elk:
    enabled: false
    managed: true
    env:
      ELASTICSEARCH_START: "1"
      LOGSTASH_START: "1"
      KIBANA_START: "1"
      SERVER_BASEPATH: /elk
      SERVER_REWRITEBASEPATH: "true"
      ES_JAVA_OPTS: -Xms1024m -Xmx1024m
      LS_JAVA_OPTS: -Xms256m -Xmx256m
      NODE_OPTIONS: --max-old-space-size=512
  forward:
    enabled: true
    baseUrl: https://fwd-appserver.forward.svc:8443
  forwardImages:
    tag: 26.4.0-13
    imagePullSecretName: ""
    imagePullSecretNamespace: ""
  forwardCluster:
    enabled: true
    hostname: skyforge-fwd.local.forwardnetworks.com
    tlsSecretName: proxy-tls-fwd
    serviceName: fwd-appserver
    serviceNamespace: forward
    servicePort: 8080
  observability:
    enabled: true
    managed:
      enabled: true
      prometheus:
        persistence:
          storageClassName: "longhorn"
    dashboards:
      enabled: true
  redis:
    storage:
      storageClassName: "longhorn"
  gitea:
    storage:
      storageClassName: "longhorn"
    apiUrl: http://gitea.skyforge.svc.cluster.local:3000/api/v1
    url: https://skyforge.local.forwardnetworks.com/git
    actionsRunner:
      enabled: false
  s3gw:
    persistence:
      storageClassName: "longhorn"
  netlab:
    image: ghcr.io/forwardnetworks/skyforge-netlab:20260418-netlab-snmpfix-r2-fe0107a
    pullPolicy: IfNotPresent
  kne:
    enabled: true
    meshnetMode: vxlan
    meshnet:
      image: "ghcr.io/forwardnetworks/meshnet:20260419-meshnet-vni-scope-r4"
      imagePullPolicy: "IfNotPresent"
    controllers:
      enabled: true
      ceoslab:
        enabled: true
      cdnos:
        enabled: false
      srlinux:
        enabled: false
      lemming:
        enabled: false
  worker:
    replicas: 1
    autoscaling:
      enabled: false
    pdb:
      enabled: true
      minAvailable: 1
    tuning:
      interactiveConcurrency: 8
      interactiveQueueSize: 64
      backgroundConcurrency: 2
      backgroundQueueSize: 16
      heartbeatIntervalSeconds: 30
      reconcileQueuedIntervalSeconds: 30
      reconcileRunningIntervalSeconds: 300
      activationIntervalSeconds: 20
      activationMinQueuedAgeSeconds: 20
      activationBatchSize: 200
      diagStaleHeartbeatSeconds: 120
      diagOldestQueuedSeconds: 300
images:
  skyforgeServer: ghcr.io/forwardnetworks/skyforge-server:20260419-meshnet-overlap-r3
  skyforgeServerWorker: ghcr.io/forwardnetworks/skyforge-server:20260419-meshnet-overlap-r3-worker
  atlas: arigaio/atlas:latest-alpine
