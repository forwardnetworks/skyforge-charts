skyforge:
  auth:
    mode: oidc
  hostname: skyforge.local.forwardnetworks.com
  domain: forwardnetworks.com
  publicUrl: https://skyforge.local.forwardnetworks.com
  gateway:
    addresses:
    - type: IPAddress
      value: 10.128.16.73
    localNodePorts:
      enabled: false
  dex:
    manageConfig: true
    authMode: oidc
    oidc:
      issuer: https://fn-prod.okta.com
      clientID: 0oa108ytsjzRXoJw3698
      insecureSkipEmailVerified: true
      clientSecretSecretName: dex-oidc-client-secret
      clientSecretSecretKey: dex-oidc-client-secret
  adminUsers: skyforge,craigjohnson,craigjohnson@forwardnetworks.com
  encoreCfg:
    create: true
  encoreRuntimeConfig:
    create: false
    workerCreate: false
  netbox:
    enabled: true
  netboxUrl: https://skyforge.local.forwardnetworks.com/netbox
  netboxSsoUrl: https://skyforge.local.forwardnetworks.com/netbox
  nautobot:
    enabled: true
  nautobotUrl: https://skyforge.local.forwardnetworks.com/nautobot
  nautobotSsoUrl: https://skyforge.local.forwardnetworks.com/nautobot
  redoc:
    enabled: true
  registry:
    url: https://ghcr.io
  infoblox:
    enabled: false
  jira:
    enabled: false
  rapid7:
    enabled: false
  elk:
    enabled: false
  forward:
    enabled: true
  forwardCollector:
    image: harbor.local.forwardnetworks.com/forward/fwd_collector:26.3.0-09
    imagePullSecretName: ""
    imagePullSecretNamespace: ""
  forwardCluster:
    enabled: true
    hostname: skyforge-fwd.local.forwardnetworks.com
    tlsSecretName: proxy-tls-fwd
    serviceName: fwd-appserver
    serviceNamespace: forward
    servicePort: 8080
    observabilityUI:
      enabled: true
  gitea:
    apiUrl: http://gitea:3000/api/v1
    url: https://skyforge.local.forwardnetworks.com/git
    actionsRunner:
      enabled: false
  netlab:
    image: ghcr.io/forwardnetworks/skyforge-netlab:20260315-kne-cisco-bootstrap-r4
    pullPolicy: IfNotPresent
  kne:
    enabled: true
    meshnetMode: grpc
    controllers:
      enabled: true
  worker:
    replicas: 1
    autoscaling:
      enabled: false
    pdb:
      enabled: true
      minAvailable: 1
    tuning:
      interactiveConcurrency: 8
      interactiveQueueSize: 64
      backgroundConcurrency: 2
      backgroundQueueSize: 16
      heartbeatIntervalSeconds: 30
      reconcileQueuedIntervalSeconds: 30
      reconcileRunningIntervalSeconds: 300
      activationIntervalSeconds: 20
      activationMinQueuedAgeSeconds: 20
      activationBatchSize: 200
      diagStaleHeartbeatSeconds: 120
      diagOldestQueuedSeconds: 300
images:
  skyforgeServer: ghcr.io/forwardnetworks/skyforge-server:20260314-prod-authfix1
  skyforgeServerWorker: ghcr.io/forwardnetworks/skyforge-server:20260314-prod-authfix1-worker
