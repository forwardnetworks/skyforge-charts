    UPDATE sf_audit_log
    SET
      event_type = COALESCE(NULLIF(event_type, ''), action),
      event_category = COALESCE(NULLIF(event_category, ''), lower(NULLIF(split_part(COALESCE(action, ''), '.', 1), ''))),
      severity = COALESCE(NULLIF(severity, ''), 'info'),
      outcome = COALESCE(NULLIF(outcome, ''), 'success'),
      actor_type = COALESCE(
        NULLIF(actor_type, ''),
        CASE lower(COALESCE(actor_username, ''))
          WHEN 'system' THEN 'system'
          WHEN 'skyforge' THEN 'service'
          WHEN 'admin' THEN 'break-glass'
          ELSE 'human'
        END
      ),
      target_type = COALESCE(NULLIF(target_type, ''), CASE WHEN COALESCE(user_id, '') <> '' THEN 'user_scope' ELSE NULL END),
      target_id = COALESCE(NULLIF(target_id, ''), NULLIF(user_id, '')),
      target_display = COALESCE(NULLIF(target_display, ''), NULLIF(user_id, '')),
      message = COALESCE(NULLIF(message, ''), action),
      details_json = CASE
        WHEN details_json <> '{}'::jsonb THEN details_json
        WHEN COALESCE(details, '') = '' THEN '{}'::jsonb
        ELSE jsonb_build_object('legacyDetails', details)
      END
    WHERE
      event_type IS NULL OR event_type = '' OR
      event_category IS NULL OR event_category = '' OR
      severity IS NULL OR severity = '' OR
      outcome IS NULL OR outcome = '' OR
      actor_type IS NULL OR actor_type = '' OR
      target_type IS NULL OR target_type = '' OR
      target_id IS NULL OR target_id = '' OR
      target_display IS NULL OR target_display = '' OR
      message IS NULL OR message = '' OR
      details_json = '{}'::jsonb;
    
