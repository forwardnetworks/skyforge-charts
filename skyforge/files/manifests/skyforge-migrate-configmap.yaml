        ) THEN
            ALTER TABLE public.sf_deployment_leases
                ADD CONSTRAINT sf_deployment_leases_deployment_fkey
                FOREIGN KEY (deployment_id) REFERENCES public.sf_deployments(id) ON DELETE CASCADE;
        END IF;
    END
    $$;
    
    WITH latest AS (
        SELECT DISTINCT ON (d.user_id, t.deployment_id)
            d.user_id,
            t.deployment_id,
            t.id AS task_id,
            COALESCE(NULLIF(t.metadata->>'topologyKey', ''), '') AS artifact_key,
            t.task_type,
            COALESCE(t.finished_at, t.started_at, t.created_at, now()) AS generated_at
        FROM public.sf_tasks t
        JOIN public.sf_deployments d
          ON d.id = t.deployment_id
        WHERE t.deployment_id IS NOT NULL
          AND COALESCE(NULLIF(t.metadata->>'topologyKey', ''), '') <> ''
          AND t.task_type = ANY (ARRAY['netlab-c9s-run', 'clabernetes-run', 'containerlab-run', 'netlab-run', 'eve-ng-run'])
        ORDER BY d.user_id, t.deployment_id, COALESCE(t.finished_at, t.started_at, t.created_at, now()) DESC, t.id DESC
    )
    INSERT INTO public.sf_deployment_topology_current (
        user_id,
        deployment_id,
        task_id,
        artifact_key,
        source,
        generated_at,
        node_count,
        edge_count,
        created_at,
        updated_at
    )
    SELECT
        l.user_id,
        l.deployment_id,
        l.task_id,
        l.artifact_key,
        CASE
            WHEN l.task_type = 'netlab-c9s-run' THEN 'netlab-c9s'
            WHEN l.task_type = 'clabernetes-run' THEN 'clabernetes'
            WHEN l.task_type = 'containerlab-run' THEN 'containerlab'
            WHEN l.task_type = 'netlab-run' THEN 'netlab'
            WHEN l.task_type = 'eve-ng-run' THEN 'eve-ng'
            ELSE 'task'
        END AS source,
        l.generated_at,
        0,
        0,
        now(),
        now()
    FROM latest l
    ON CONFLICT (deployment_id) DO UPDATE
    SET user_id = EXCLUDED.user_id,
        task_id = EXCLUDED.task_id,
        artifact_key = EXCLUDED.artifact_key,
        source = EXCLUDED.source,
        generated_at = EXCLUDED.generated_at,
        updated_at = now();
    
    INSERT INTO public.sf_deployment_forward_state (
        user_id,
        deployment_id,
        enabled,
        collector_config_id,
        collector_username,
        network_id,
        network_name,
        snapshot_url,
        cli_credential_id,
        cli_credential_ids_by_device,
        cli_credential_fingerprints_by_device,
        snmp_credential_id,
        jump_server_id,
        endpoint_profile_id,
        created_at,
        updated_at
    )
    SELECT
        d.user_id,
        d.id,
        CASE
            WHEN lower(COALESCE(d.config->>'forwardEnabled', 'false')) = ANY (ARRAY['true', '1', 'yes', 'y', 'on']) THEN true
            ELSE false
        END AS enabled,
        COALESCE(d.config->>'forwardCollectorId', ''),
        COALESCE(d.config->>'forwardCollectorUsername', ''),
        COALESCE(d.config->>'forwardNetworkId', ''),
        COALESCE(d.config->>'forwardNetworkName', ''),
        COALESCE(d.config->>'forwardSnapshotUrl', ''),
        COALESCE(d.config->>'forwardCliCredentialId', ''),
        CASE
            WHEN jsonb_typeof(d.config->'forwardCliCredentialIdsByDevice') = 'object' THEN d.config->'forwardCliCredentialIdsByDevice'
            ELSE '{}'::jsonb
        END,
        CASE
            WHEN jsonb_typeof(d.config->'forwardCliCredentialFingerprintsByDevice') = 'object' THEN d.config->'forwardCliCredentialFingerprintsByDevice'
            ELSE '{}'::jsonb
        END,
        COALESCE(d.config->>'forwardSnmpCredentialId', ''),
        COALESCE(d.config->>'forwardJumpServerId', ''),
        COALESCE(d.config->>'forwardEndpointProfileId', ''),
        now(),
        now()
    FROM public.sf_deployments d
    WHERE d.type = ANY (ARRAY['terraform', 'c9s', 'byos'])
    ON CONFLICT (deployment_id) DO UPDATE
    SET user_id = EXCLUDED.user_id,
        enabled = EXCLUDED.enabled,
        collector_config_id = EXCLUDED.collector_config_id,
        collector_username = EXCLUDED.collector_username,
        network_id = EXCLUDED.network_id,
        network_name = EXCLUDED.network_name,
        snapshot_url = EXCLUDED.snapshot_url,
        cli_credential_id = EXCLUDED.cli_credential_id,
        cli_credential_ids_by_device = EXCLUDED.cli_credential_ids_by_device,
        cli_credential_fingerprints_by_device = EXCLUDED.cli_credential_fingerprints_by_device,
        snmp_credential_id = EXCLUDED.snmp_credential_id,
        jump_server_id = EXCLUDED.jump_server_id,
        endpoint_profile_id = EXCLUDED.endpoint_profile_id,
        updated_at = now();
    
    INSERT INTO public.sf_deployment_leases (
        user_id,
        deployment_id,
        enabled,
        hours,
        expires_at,
        stopped_at,
        stop_task_id,
        created_at,
        updated_at
    )
    SELECT
        d.user_id,
        d.id,
        CASE
            WHEN lower(COALESCE(d.config->>'leaseEnabled', 'false')) = ANY (ARRAY['true', '1', 'yes', 'y', 'on']) THEN true
            ELSE false
        END AS enabled,
        CASE
            WHEN jsonb_typeof(d.config->'leaseHours') = 'number' THEN (d.config->>'leaseHours')::integer
            WHEN COALESCE(d.config->>'leaseHours', '') ~ '^[0-9]+$' THEN (d.config->>'leaseHours')::integer
            ELSE 0
        END AS hours,
        CASE
            WHEN COALESCE(d.config->>'leaseExpiresAt', '') = '' THEN NULL
            ELSE (d.config->>'leaseExpiresAt')::timestamp with time zone
        END AS expires_at,
        CASE
            WHEN COALESCE(d.config->>'leaseStoppedAt', '') = '' THEN NULL
            ELSE (d.config->>'leaseStoppedAt')::timestamp with time zone
        END AS stopped_at,
        CASE
            WHEN jsonb_typeof(d.config->'leaseStopTaskId') = 'number' THEN (d.config->>'leaseStopTaskId')::bigint
            WHEN COALESCE(d.config->>'leaseStopTaskId', '') ~ '^[0-9]+$' THEN (d.config->>'leaseStopTaskId')::bigint
            ELSE NULL
        END AS stop_task_id,
        now(),
        now()
    FROM public.sf_deployments d
    WHERE d.type = ANY (ARRAY['terraform', 'c9s', 'byos'])
    ON CONFLICT (deployment_id) DO UPDATE
    SET user_id = EXCLUDED.user_id,
        enabled = EXCLUDED.enabled,
        hours = EXCLUDED.hours,
        expires_at = EXCLUDED.expires_at,
        stopped_at = EXCLUDED.stopped_at,
        stop_task_id = EXCLUDED.stop_task_id,
        updated_at = now();
    
    -- Strip runtime state keys from deployment config JSON hard-cut.
    UPDATE public.sf_deployments
    SET config = config
        - 'forwardEnabled'
        - 'forwardCollectorId'
        - 'forwardCollectorUsername'
        - 'forwardNetworkId'
        - 'forwardNetworkName'
        - 'forwardSnapshotUrl'
        - 'forwardCliCredentialId'
        - 'forwardCliCredentialIdsByDevice'
        - 'forwardCliCredentialFingerprintsByDevice'
        - 'forwardSnmpCredentialId'
        - 'forwardJumpServerId'
        - 'forwardEndpointProfileId'
        - 'leaseEnabled'
        - 'leaseHours'
        - 'leaseExpiresAt'
        - 'leaseStoppedAt'
        - 'leaseStopTaskId'
    WHERE type = ANY (ARRAY['terraform', 'c9s', 'byos']);

  20260228193000_netlab_artifact_index.up.sql: |
    -- Hard-cut netlab artifact index out of task JSON metadata into a typed table
    -- for queryability and auditing.
    
    CREATE TABLE IF NOT EXISTS public.sf_netlab_artifact_index (
        task_id bigint NOT NULL,
        user_scope_id text NOT NULL,
        deployment_id uuid NOT NULL,
        topology_name text NOT NULL DEFAULT '',
        lab_name text NOT NULL DEFAULT '',
        artifact_prefix text NOT NULL DEFAULT '',
        artifact_path text NOT NULL,
        object_key text NOT NULL,
        content_type text NOT NULL DEFAULT '',
        size_bytes integer NOT NULL DEFAULT 0,
        sha256 text NOT NULL DEFAULT '',
        created_at timestamp with time zone NOT NULL DEFAULT now(),
        updated_at timestamp with time zone NOT NULL DEFAULT now(),
        PRIMARY KEY (task_id, artifact_path),
        CONSTRAINT sf_netlab_artifact_index_size_nonnegative CHECK (size_bytes >= 0)
    );
    
    CREATE INDEX IF NOT EXISTS sf_netlab_artifact_index_scope_deployment_idx
        ON public.sf_netlab_artifact_index (user_scope_id, deployment_id, created_at DESC);
    
    CREATE INDEX IF NOT EXISTS sf_netlab_artifact_index_topology_idx
        ON public.sf_netlab_artifact_index (user_scope_id, topology_name, created_at DESC);
    
    DO $$
    BEGIN
        IF NOT EXISTS (
            SELECT 1
            FROM pg_constraint
            WHERE conname = 'sf_netlab_artifact_index_task_fkey'
        ) THEN
            ALTER TABLE public.sf_netlab_artifact_index
                ADD CONSTRAINT sf_netlab_artifact_index_task_fkey
                FOREIGN KEY (task_id) REFERENCES public.sf_tasks(id) ON DELETE CASCADE;
        END IF;
    
        IF NOT EXISTS (
            SELECT 1
            FROM pg_constraint
            WHERE conname = 'sf_netlab_artifact_index_user_fkey'
        ) THEN
            ALTER TABLE public.sf_netlab_artifact_index
                ADD CONSTRAINT sf_netlab_artifact_index_user_fkey
                FOREIGN KEY (user_scope_id) REFERENCES public.sf_user_scopes(id) ON DELETE CASCADE;
        END IF;
    
        IF NOT EXISTS (
            SELECT 1
            FROM pg_constraint
            WHERE conname = 'sf_netlab_artifact_index_deployment_fkey'
        ) THEN
            ALTER TABLE public.sf_netlab_artifact_index
                ADD CONSTRAINT sf_netlab_artifact_index_deployment_fkey
                FOREIGN KEY (deployment_id) REFERENCES public.sf_deployments(id) ON DELETE CASCADE;
        END IF;
    END
    $$;
    
    WITH src AS (
        SELECT
            t.id AS task_id,
            d.user_id AS user_scope_id,
            t.deployment_id,
            t.metadata->'netlabArtifacts' AS idx
        FROM public.sf_tasks t
        JOIN public.sf_deployments d
          ON d.id = t.deployment_id
        WHERE t.task_type = 'netlab-c9s-run'
          AND t.deployment_id IS NOT NULL
          AND jsonb_typeof(t.metadata->'netlabArtifacts') = 'object'
    ),
    items AS (
        SELECT
            s.task_id,
            s.user_scope_id,
            s.deployment_id,
            COALESCE(s.idx->>'prefix', '') AS artifact_prefix,
            item
        FROM src s
        CROSS JOIN LATERAL jsonb_array_elements(
            CASE
                WHEN jsonb_typeof(s.idx->'items') = 'array' THEN s.idx->'items'
                ELSE '[]'::jsonb
            END
        ) AS item
    )
    INSERT INTO public.sf_netlab_artifact_index (
        task_id,
        user_scope_id,
        deployment_id,
        artifact_prefix,
        artifact_path,
        object_key,
        content_type,
        size_bytes,
        sha256,
        created_at,
        updated_at
    )
    SELECT
        i.task_id,
        i.user_scope_id,
        i.deployment_id,
        COALESCE(i.artifact_prefix, ''),
        COALESCE(i.item->>'path', ''),
        COALESCE(i.item->>'key', ''),
        COALESCE(i.item->>'contentType', ''),
        CASE
            WHEN COALESCE(i.item->>'sizeBytes', '') ~ '^[0-9]+$' THEN (i.item->>'sizeBytes')::integer
            ELSE 0
        END,
        COALESCE(i.item->>'sha256', ''),
        now(),
        now()
    FROM items i
    WHERE COALESCE(i.item->>'path', '') <> ''
      AND COALESCE(i.item->>'key', '') <> ''
    ON CONFLICT (task_id, artifact_path) DO UPDATE
    SET user_scope_id = EXCLUDED.user_scope_id,
        deployment_id = EXCLUDED.deployment_id,
        artifact_prefix = EXCLUDED.artifact_prefix,
        object_key = EXCLUDED.object_key,
        content_type = EXCLUDED.content_type,
        size_bytes = EXCLUDED.size_bytes,
        sha256 = EXCLUDED.sha256,
        updated_at = now();

