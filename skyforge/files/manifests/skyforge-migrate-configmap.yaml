  20260227235500_deployment_type_model_hard_cut.up.sql: |
    -- Hard-cut deployment type model to canonical values:
    --   terraform | c9s | byos
    --
    -- Legacy deployment rows are removed instead of migrated.
    -- Related queued/history task rows and UI event rows are removed for those deployments.
    
    DELETE FROM sf_tasks
    WHERE deployment_id IN (
      SELECT id
      FROM sf_deployments
      WHERE type IN ('netlab', 'netlab-c9s', 'eve_ng', 'containerlab', 'clabernetes')
    );
    
    DELETE FROM sf_deployment_ui_events
    WHERE deployment_id IN (
      SELECT id::text
      FROM sf_deployments
      WHERE type IN ('netlab', 'netlab-c9s', 'eve_ng', 'containerlab', 'clabernetes')
    );
    
    DELETE FROM sf_deployments
    WHERE type IN ('netlab', 'netlab-c9s', 'eve_ng', 'containerlab', 'clabernetes');
    
    ALTER TABLE sf_deployments
      DROP CONSTRAINT IF EXISTS sf_deployments_type_check;
    
    ALTER TABLE sf_deployments
      ADD CONSTRAINT sf_deployments_type_check
      CHECK (
        type = ANY (ARRAY['terraform'::text, 'c9s'::text, 'byos'::text])
      );

  20260228000500_deployment_engine_contract_hard_cut.up.sql: |
    -- Hard-cut deployment engine contract:
    --   - require config.engine for all managed families
    --   - strip legacy config.compiler/config.driver keys
    --   - enforce family+engine pairing in DB constraints
    
    DO $$
    DECLARE
      unresolved_count integer := 0;
      invalid_pair_count integer := 0;
    BEGIN
      WITH resolved AS (
        SELECT
          d.id,
          d.type,
          CASE d.type
            WHEN 'terraform' THEN 'terraform'
            WHEN 'c9s' THEN COALESCE(
              NULLIF(lower(replace(trim(d.config->>'engine'), '-', '_')), ''),
              NULLIF(lower(replace(trim(d.config->>'compiler'), '-', '_')), '')
            )
            WHEN 'byos' THEN COALESCE(
              NULLIF(lower(replace(trim(d.config->>'engine'), '-', '_')), ''),
              NULLIF(lower(replace(trim(d.config->>'driver'), '-', '_')), ''),
              NULLIF(lower(replace(trim(d.config->>'compiler'), '-', '_')), '')
            )
            ELSE NULL
          END AS engine
        FROM sf_deployments d
        WHERE d.type IN ('terraform', 'c9s', 'byos')
      )
      SELECT count(*) INTO unresolved_count
      FROM resolved r
      WHERE r.engine IS NULL;
    
      IF unresolved_count > 0 THEN
        RAISE EXCEPTION 'deployment engine hard-cut failed: % deployment rows have no resolvable engine', unresolved_count;
      END IF;
    
      WITH resolved AS (
        SELECT
          d.id,
          d.type,
          CASE d.type
            WHEN 'terraform' THEN 'terraform'
            WHEN 'c9s' THEN COALESCE(
              NULLIF(lower(replace(trim(d.config->>'engine'), '-', '_')), ''),
              NULLIF(lower(replace(trim(d.config->>'compiler'), '-', '_')), '')
            )
            WHEN 'byos' THEN COALESCE(
              NULLIF(lower(replace(trim(d.config->>'engine'), '-', '_')), ''),
              NULLIF(lower(replace(trim(d.config->>'driver'), '-', '_')), ''),
              NULLIF(lower(replace(trim(d.config->>'compiler'), '-', '_')), '')
            )
            ELSE NULL
          END AS engine
        FROM sf_deployments d
        WHERE d.type IN ('terraform', 'c9s', 'byos')
      )
      SELECT count(*) INTO invalid_pair_count
      FROM resolved r
      WHERE NOT (
        (r.type = 'terraform' AND r.engine = 'terraform') OR
        (r.type = 'c9s' AND r.engine IN ('netlab', 'containerlab')) OR
        (r.type = 'byos' AND r.engine IN ('netlab', 'containerlab', 'eve_ng'))
      );
    
      IF invalid_pair_count > 0 THEN
        RAISE EXCEPTION 'deployment engine hard-cut failed: % deployment rows have invalid family/engine pairs', invalid_pair_count;
      END IF;
    
      UPDATE sf_deployments d
      SET config = (
        (d.config - 'compiler' - 'driver') ||
        jsonb_build_object(
          'engine',
          CASE d.type
            WHEN 'terraform' THEN 'terraform'
            WHEN 'c9s' THEN COALESCE(
              NULLIF(lower(replace(trim(d.config->>'engine'), '-', '_')), ''),
              NULLIF(lower(replace(trim(d.config->>'compiler'), '-', '_')), '')
            )
            WHEN 'byos' THEN COALESCE(
              NULLIF(lower(replace(trim(d.config->>'engine'), '-', '_')), ''),
              NULLIF(lower(replace(trim(d.config->>'driver'), '-', '_')), ''),
              NULLIF(lower(replace(trim(d.config->>'compiler'), '-', '_')), '')
            )
          END
        )
      )
      WHERE d.type IN ('terraform', 'c9s', 'byos');
    END $$;
    
    ALTER TABLE sf_deployments
      DROP CONSTRAINT IF EXISTS sf_deployments_family_engine_pair_check;
    
    ALTER TABLE sf_deployments
      ADD CONSTRAINT sf_deployments_family_engine_pair_check
      CHECK (
        (type = 'terraform' AND config->>'engine' = 'terraform') OR
        (type = 'c9s' AND config->>'engine' = ANY (ARRAY['netlab'::text, 'containerlab'::text])) OR
        (type = 'byos' AND config->>'engine' = ANY (ARRAY['netlab'::text, 'containerlab'::text, 'eve_ng'::text]))
      );
    
    ALTER TABLE sf_deployments
      DROP CONSTRAINT IF EXISTS sf_deployments_no_legacy_deployment_keys_check;
    
    ALTER TABLE sf_deployments
      ADD CONSTRAINT sf_deployments_no_legacy_deployment_keys_check
      CHECK (
        NOT (config ? 'compiler') AND
        NOT (config ? 'driver')
      );

