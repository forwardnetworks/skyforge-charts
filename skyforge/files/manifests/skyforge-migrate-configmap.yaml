    -- Align DB deployment family/engine constraint with hard-cut runtime model:
    --   family(type): terraform | kne | byos
    --   engine(config.engine):
    --     terraform -> terraform
    --     kne       -> netlab
    --     byos      -> netlab | kne
    
    ALTER TABLE sf_deployments
      DROP CONSTRAINT IF EXISTS sf_deployments_family_engine_pair_check;
    
    ALTER TABLE sf_deployments
      ADD CONSTRAINT sf_deployments_family_engine_pair_check
      CHECK (
        (type = 'terraform' AND config->>'engine' = 'terraform') OR
        (type = 'kne' AND config->>'engine' = 'netlab') OR
        (type = 'byos' AND config->>'engine' = ANY (ARRAY['netlab'::text, 'kne'::text]))
      );

