  20260403125500_audit_log_legacy_details_backfill.up.sql: |
    WITH extracted AS (
      SELECT
        id,
        details,
        NULLIF((regexp_match(details, '(^|[ ,])username=([^ ,]+)'))[2], '') AS username,
        NULLIF((regexp_match(details, '(^|[ ,])seed(ID)?=([^ ,]+)'))[3], '') AS seed_id,
        NULLIF((regexp_match(details, '(^|[ ,])reservation=([^ ,]+)'))[2], '') AS reservation_id,
        NULLIF((regexp_match(details, '(^|[ ,])run(ID)?=([^ ,]+)'))[3], '') AS run_id,
        NULLIF((regexp_match(details, '(^|[ ,])network=([^ ,]+)'))[2], '') AS network_name,
        NULLIF((regexp_match(details, '(^|[ ,])webhook=([^ ,]+)'))[2], '') AS webhook,
        NULLIF((regexp_match(details, '(^|[ ,])primaryProvider=([^ ,]+)'))[2], '') AS primary_provider
      FROM sf_audit_log
      WHERE COALESCE(details, '') <> ''
        AND details_json ? 'legacyDetails'
    )
    UPDATE sf_audit_log a
    SET
      details_json = jsonb_strip_nulls(
        a.details_json ||
        jsonb_build_object(
          'username', extracted.username,
          'seedID', extracted.seed_id,
          'reservation', extracted.reservation_id,
          'runID', extracted.run_id,
          'network', extracted.network_name,
          'webhook', extracted.webhook,
          'primaryProvider', extracted.primary_provider
        )
      ),
      target_type = COALESCE(
        NULLIF(a.target_type, ''),
        CASE
          WHEN extracted.username IS NOT NULL THEN 'user'
          WHEN extracted.seed_id IS NOT NULL THEN 'demo_seed'
          WHEN extracted.reservation_id IS NOT NULL THEN 'reservation'
          WHEN extracted.run_id IS NOT NULL THEN 'workflow_run'
          ELSE NULL
        END
      ),
      target_id = COALESCE(
        NULLIF(a.target_id, ''),
        extracted.username,
        extracted.seed_id,
        extracted.reservation_id,
        extracted.run_id
      ),
      target_display = COALESCE(
        NULLIF(a.target_display, ''),
        extracted.username,
        extracted.seed_id,
        extracted.reservation_id,
        extracted.run_id
      )
    FROM extracted
    WHERE a.id = extracted.id;

