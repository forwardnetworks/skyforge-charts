  20260311200500_reservation_priority_and_override.up.sql: |
    ALTER TABLE public.sf_reservations
        ADD COLUMN IF NOT EXISTS priority_tier text NOT NULL DEFAULT 'standard',
        ADD COLUMN IF NOT EXISTS admin_override boolean NOT NULL DEFAULT false;
    
    UPDATE public.sf_reservations
    SET priority_tier = CASE
        WHEN type = 'admin-reserved-block' THEN 'admin-critical'
        WHEN COALESCE(template_ref, '') LIKE 'quick-deploy:%' THEN 'curated-demo'
        ELSE 'standard'
    END
    WHERE COALESCE(priority_tier, '') = '';
    
    ALTER TABLE public.sf_reservations
        DROP CONSTRAINT IF EXISTS sf_reservations_priority_tier_check;
    
    ALTER TABLE public.sf_reservations
        ADD CONSTRAINT sf_reservations_priority_tier_check CHECK (priority_tier = ANY (ARRAY[
            'standard'::text,
            'training'::text,
            'curated-demo'::text,
            'admin-critical'::text
        ]));
    
    CREATE INDEX IF NOT EXISTS sf_reservations_priority_tier_idx ON public.sf_reservations(priority_tier);
    CREATE INDEX IF NOT EXISTS sf_reservations_admin_override_idx ON public.sf_reservations(admin_override);

