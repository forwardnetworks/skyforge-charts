{{- $backups := default (dict) .Values.skyforge.backups -}}
{{- $forwardRaw := default (dict) $backups.forwardRaw -}}
{{- if and .Values.skyforge.s3gw.enabled (default false $forwardRaw.enabled) }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/name: backup-forward-raw
  name: backup-forward-raw
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: backup-forward-raw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backup-forward-raw
    spec:
      automountServiceAccountToken: false
{{- with include "skyforge.workloadNodeAffinity" (list $forwardRaw.placement) }}
      affinity:
{{ . | nindent 8 }}
{{- end }}
{{- with include "skyforge.workloadPlacementSpec" (list $forwardRaw.placement) }}
{{ . | nindent 6 }}
{{- end }}
      containers:
        - name: backup-forward-raw
          image: {{ default "alpine:3.20" $forwardRaw.image | quote }}
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -euo pipefail
              apk add --no-cache rsync >/dev/null
              src_root="/source"
              dst_root="/dest/${POD_NODE_NAME}"
              mkdir -p "${src_root}" "${dst_root}"
              while true; do
                copied=0
{{- range (default (list) $forwardRaw.includeClaims) }}
                claim={{ . | quote }}
                src="$(find "${src_root}" -maxdepth 1 -mindepth 1 -type d -name "*_forward_${claim}" | head -n1 || true)"
                if [ -n "${src}" ] && [ -d "${src}" ]; then
                  dst="${dst_root}/${claim}"
                  mkdir -p "${dst}"
                  echo "forward-raw: syncing ${src} -> ${dst}"
                  rsync -a --delete "${src}/" "${dst}/"
                  copied=$((copied + 1))
                else
                  echo "forward-raw: claim ${claim} not present on node ${POD_NODE_NAME}, skipping"
                fi
{{- end }}
                echo "forward-raw: complete copied_claims=${copied}"
                sleep {{ default 1800 $forwardRaw.intervalSeconds }}
              done
          env:
            - name: POD_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: source
              mountPath: /source
              readOnly: true
            - name: dest
              mountPath: /dest
          resources:
{{ toYaml (default (dict "requests" (dict "cpu" "50m" "memory" "128Mi") "limits" (dict "memory" "512Mi")) $forwardRaw.resources) | nindent 12 }}
      restartPolicy: Always
      volumes:
        - name: source
          hostPath:
            path: {{ default "/opt/local-path-provisioner" $forwardRaw.sourceHostPath | quote }}
            type: DirectoryOrCreate
        - name: dest
          hostPath:
            path: {{ default "/mnt/hetzner-wireguard/skyforge-backups/forward-pv" $forwardRaw.destinationHostPath | quote }}
            type: DirectoryOrCreate
{{- end }}
