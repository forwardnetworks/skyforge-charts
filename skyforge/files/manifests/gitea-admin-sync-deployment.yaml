apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: gitea-admin-sync
  name: gitea-admin-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea-admin-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea-admin-sync
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      initContainers:
      - name: skyforge-ca-bundle
        image: public.ecr.aws/docker/library/alpine:latest
        command:
        - sh
        - -c
        - |
          cat /etc/ssl/certs/ca-certificates.crt \
            /etc/skyforge/skyforge-ca-cert \
            /etc/proxy/tls.crt > /work/ca-certificates.crt
        volumeMounts:
        - name: skyforge-ca-cert
          mountPath: /etc/skyforge
          readOnly: true
        - name: proxy-tls
          mountPath: /etc/proxy
          readOnly: true
        - name: skyforge-ca-bundle
          mountPath: /work
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: gitea
              topologyKey: kubernetes.io/hostname
{{- with include "skyforge.workloadPlacementSpec" (list .Values.skyforge.coreStatefulPlacement) }}
{{ . | indent 6 }}
{{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
      - command:
        - /bin/sh
        - -c
        args:
        - |
          set -euo pipefail

          export SECRET_KEY="$(cat /run/secrets/gitea-secret-key)"
          export GITEA__database__PASSWD="$(cat /run/secrets/db-gitea-password)"

          interval="${SKYFORGE_ADMIN_SYNC_SECONDS:-30}"
          if ! echo "${interval}" | grep -Eq '^[0-9]+$' || [ "${interval}" -lt 5 ]; then
            interval="30"
          fi

          admin_username="${SKYFORGE_ADMIN_USERNAME:-}"
          admin_email="${SKYFORGE_ADMIN_EMAIL:-}"
          admin_password="$(cat /run/secrets/skyforge-admin-shared | tr -d '\n')"
          oidc_discovery_url="${SKYFORGE_GITEA_OIDC_DISCOVERY_URL:-}"
          oidc_client_id="${SKYFORGE_GITEA_OIDC_CLIENT_ID:-gitea}"
          oidc_client_secret="$(cat /run/secrets/dex-client-gitea-secret | tr -d '\n')"
          oidc_source_name="${SKYFORGE_GITEA_OIDC_SOURCE_NAME:-oidc}"
          config="/var/lib/gitea/custom/conf/app.ini"

          ensure_oidc_auth_source() {
            local source_id
            local source_discovery_url

            source_discovery_url="${oidc_discovery_url%/}"
            case "${source_discovery_url}" in
              */.well-known/openid-configuration) ;;
              *) source_discovery_url="${source_discovery_url}/.well-known/openid-configuration" ;;
            esac

            source_id="$(
              gitea admin auth list --config "${config}" --vertical-bars | \
              awk -F'|' -v source="${oidc_source_name}" '
                {
                  for (i = 1; i <= NF; i++) {
                    gsub(/^[[:space:]]+|[[:space:]]+$/, "", $i)
                  }
                }
                $1 ~ /^[0-9]+$/ && tolower($2) == tolower(source) {
                  print $1
                  exit
                }
              '
            )"

            if [ -n "${source_id}" ]; then
              gitea admin auth update-oauth --config "${config}" \
                --id "${source_id}" \
                --name "${oidc_source_name}" \
                --provider openidConnect \
                --key "${oidc_client_id}" \
                --secret "${oidc_client_secret}" \
                --auto-discover-url "${source_discovery_url}" \
                --scopes openid --scopes profile --scopes email --scopes groups \
                --group-claim-name groups
              echo "Gitea OIDC auth source updated: ${oidc_source_name} (id=${source_id})"
            else
              gitea admin auth add-oauth --config "${config}" \
                --name "${oidc_source_name}" \
                --provider openidConnect \
                --key "${oidc_client_id}" \
                --secret "${oidc_client_secret}" \
                --auto-discover-url "${source_discovery_url}" \
                --scopes openid --scopes profile --scopes email --scopes groups \
                --group-claim-name groups
              echo "Gitea OIDC auth source created: ${oidc_source_name}"
            fi
          }

          while true; do
            if [ -z "${admin_username}" ] || [ -z "${admin_password}" ]; then
              echo "SKYFORGE_ADMIN_USERNAME/password not set; waiting..."
              sleep "${interval}"
              continue
            fi

            for i in $(seq 1 60); do
              if [ -f "${config}" ]; then
                break
              fi
              echo "Waiting for gitea config to exist at ${config} (${i}/60)..."
              sleep 2
            done

            if [ ! -f "${config}" ]; then
              echo "Gitea config not found at ${config}; retrying..."
              sleep "${interval}"
              continue
            fi

            if gitea admin user create --config "${config}" \
              --username "${admin_username}" \
              --password "${admin_password}" \
              --email "${admin_email}" \
              --admin \
              --must-change-password=false; then
              echo "Gitea admin created: ${admin_username}"
            else
              gitea admin user change-password --config "${config}" \
                --username "${admin_username}" \
                --password "${admin_password}" \
                --must-change-password=false || true
              echo "Gitea admin updated: ${admin_username}"
            fi

            gitea admin user must-change-password --config "${config}" --all --unset || true
            ensure_oidc_auth_source
            sleep "${interval}"
          done
        env:
        - name: SKYFORGE_ADMIN_SYNC_SECONDS
          value: '30'
        - name: SKYFORGE_ADMIN_USERNAME
          valueFrom:
            configMapKeyRef:
              name: skyforge-config
              key: SKYFORGE_ADMIN_USERNAME
        - name: SKYFORGE_ADMIN_EMAIL
          valueFrom:
            configMapKeyRef:
              name: skyforge-config
              key: SKYFORGE_ADMIN_EMAIL
        - name: SKYFORGE_GITEA_OIDC_DISCOVERY_URL
          value: {{ .Values.skyforge.oidc.discoveryUrl | quote }}
        - name: SKYFORGE_GITEA_OIDC_CLIENT_ID
          value: "gitea"
        - name: SKYFORGE_GITEA_OIDC_SOURCE_NAME
          value: {{ default "oidc" .Values.skyforge.gitea.oidc.sourceName | quote }}
        - name: SSL_CERT_FILE
          value: /etc/skyforge/ca/ca-certificates.crt
        image: ghcr.io/go-gitea/gitea:1.24.6-rootless
        name: gitea-admin-sync
        securityContext:
          runAsGroup: 1000
          runAsUser: 1000
        volumeMounts:
        - mountPath: /run/secrets
          name: run-secrets
          readOnly: true
        - mountPath: /var/lib/gitea
          name: gitea-data
        - mountPath: /etc/skyforge/ca
          name: skyforge-ca-bundle
          readOnly: true
      restartPolicy: Always
      volumes:
      - name: run-secrets
        projected:
          sources:
          - secret:
              items:
              - key: db-gitea-password
                path: db-gitea-password
              name: db-gitea-password
          - secret:
              items:
              - key: gitea-secret-key
                path: gitea-secret-key
              name: gitea-secret-key
          - secret:
              items:
              - key: password
                path: skyforge-admin-shared
              name: skyforge-admin-shared
          - secret:
              items:
              - key: dex-client-gitea-secret
                path: dex-client-gitea-secret
              name: dex-client-gitea-secret
      - name: skyforge-ca-cert
        secret:
          secretName: skyforge-ca-cert
      - name: proxy-tls
        secret:
          secretName: proxy-tls
      - name: skyforge-ca-bundle
        emptyDir: {}
      - name: gitea-data
        persistentVolumeClaim:
          claimName: gitea-data
