{{- $backups := default (dict) .Values.skyforge.backups -}}
{{- $postgresBackup := default (dict) $backups.postgres -}}
{{- if and .Values.skyforge.s3gw.enabled (default true $postgresBackup.enabled) }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-postgres-s3
  labels:
    app.kubernetes.io/name: backup-postgres-s3
spec:
  schedule: {{ default "17 3 * * *" $postgresBackup.schedule | quote }}
  suspend: {{ ternary "true" "false" (default false $postgresBackup.suspend) }}
  successfulJobsHistoryLimit: {{ default 1 $postgresBackup.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ default 1 $postgresBackup.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: {{ default 3600 $postgresBackup.ttlSecondsAfterFinished }}
      template:
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          containers:
            - name: backup
              image: public.ecr.aws/docker/library/postgres:15-alpine
              command: ["/bin/sh","-lc"]
              args:
                - |
                  set -eu
                  apk add --no-cache aws-cli >/dev/null
                  ts="$(date -u +%Y%m%dT%H%M%SZ)"
                  out="/tmp/skyforge-postgres-${ts}.sql.gz"

                  : "${BACKUP_S3_BUCKET:?set BACKUP_S3_BUCKET}"
                  : "${BACKUP_S3_ENDPOINT:?set BACKUP_S3_ENDPOINT}"
                  endpoint="${BACKUP_S3_ENDPOINT}"
                  if [[ "${endpoint}" != http://* && "${endpoint}" != https://* ]]; then
                    if [[ "${BACKUP_S3_USE_SSL}" == "true" ]]; then
                      endpoint="https://${endpoint}"
                    else
                      endpoint="http://${endpoint}"
                    fi
                  fi

                  export AWS_ACCESS_KEY_ID="$(cat /run/secrets/object-storage-root-user | tr -d '\r\n')"
                  export AWS_SECRET_ACCESS_KEY="$(cat /run/secrets/object-storage-root-password | tr -d '\r\n')"
                  export AWS_DEFAULT_REGION="us-east-1"
                  export PGPASSWORD="$(cat /run/secrets/postgres-skyforge-password | tr -d '\r\n')"

                  echo "Dumping Postgres..."
                  pg_dumpall -h db -U "${BACKUP_PG_USER}" | gzip -9 > "${out}"

                  echo "Uploading to s3://${BACKUP_S3_BUCKET}/${BACKUP_S3_PREFIX}/"
                  aws --endpoint-url "${endpoint}" s3 cp "${out}" "s3://${BACKUP_S3_BUCKET}/${BACKUP_S3_PREFIX}/$(basename "${out}")"
                  echo "Done."
              env:
                - name: BACKUP_S3_BUCKET
                  value: {{ default "skyforge-backups" $postgresBackup.bucket | quote }}
                - name: BACKUP_S3_PREFIX
                  value: {{ default "postgres" $postgresBackup.prefix | quote }}
                - name: BACKUP_S3_ENDPOINT
                  value: {{ default "s3gw:7480" $postgresBackup.endpoint | quote }}
                - name: BACKUP_S3_USE_SSL
                  value: {{ ternary "true" "false" (default false $postgresBackup.useSSL) | quote }}
                - name: BACKUP_PG_USER
                  value: {{ default "skyforge" $postgresBackup.user | quote }}
              volumeMounts:
                - name: run-secrets
                  mountPath: /run/secrets
                  readOnly: true
          volumes:
            - name: run-secrets
              projected:
                sources:
                  - secret:
                      name: postgres-skyforge-password
                      items:
                        - key: postgres-skyforge-password
                          path: postgres-skyforge-password
                  - secret:
                      name: object-storage-root-user
                      items:
                        - key: object-storage-root-user
                          path: object-storage-root-user
                  - secret:
                      name: object-storage-root-password
                      items:
                        - key: object-storage-root-password
                          path: object-storage-root-password
{{- end }}
