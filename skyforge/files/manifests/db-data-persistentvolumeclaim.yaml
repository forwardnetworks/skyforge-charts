apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/name: db-data
  name: db-data
spec:
  accessModes:
    - {{ default "ReadWriteOnce" .Values.skyforge.db.storage.accessMode | quote }}
{{ with .Values.skyforge.db.storage.storageClassName }}
  storageClassName: {{ . | quote }}
{{ end }}
  resources:
    requests:
      storage: {{ default "50Gi" .Values.skyforge.db.storage.size | quote }}
