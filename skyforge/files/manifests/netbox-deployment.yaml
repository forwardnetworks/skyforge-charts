apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: netbox
  name: netbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: netbox
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbox
    spec:
      automountServiceAccountToken: false
{{- if .Values.skyforge.integrationsPriorityClassName }}
      priorityClassName: {{ .Values.skyforge.integrationsPriorityClassName | quote }}
{{- end }}
      containers:
      - args:
        - 'set -e

          export DB_PASSWORD="$(cat /run/secrets/db-netbox-password)"

          export SUPERUSER_PASSWORD="$(cat /run/secrets/skyforge-admin-shared)"

          export SUPERUSER_API_TOKEN="$(cat /run/secrets/netbox-superuser-api-token)"

          export SECRET_KEY="$(cat /run/secrets/netbox-secret-key)"

          exec /usr/bin/tini -- /opt/netbox/docker-entrypoint.sh /opt/netbox/launch-netbox.sh

          '
        command:
        - /bin/sh
        - -lc
        env:
        - name: DB_HOST
          value: db
        - name: DB_NAME
          value: netbox
        - name: DB_PORT
          value: '5432'
        - name: DB_USER
          value: netbox
        - name: BASE_PATH
          value: /netbox
        - name: REDIS_DATABASE
          value: {{ .Values.skyforge.netbox.redisDatabase | quote }}
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: '6379'
        - name: SKYFORGE_HOSTNAME
          valueFrom:
            configMapKeyRef:
              key: SKYFORGE_HOSTNAME
              name: skyforge-config
        - name: SKYFORGE_OIDC_DISCOVERY_URL
          valueFrom:
            configMapKeyRef:
              key: SKYFORGE_OIDC_DISCOVERY_URL
              name: skyforge-config
        - name: SKYFORGE_OIDC_CLIENT_ID
          value: netbox
        - name: SKYFORGE_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: dex-client-netbox-secret
              key: dex-client-netbox-secret
        - name: API_TOKEN_PEPPERS
          valueFrom:
            secretKeyRef:
              name: netbox-api-token-peppers
              key: netbox-api-token-peppers
        - name: SUPERUSER_NAME
          value: skyforge
        - name: SUPERUSER_EMAIL
          valueFrom:
            configMapKeyRef:
              name: skyforge-config
              key: SKYFORGE_ADMIN_EMAIL
        - name: SSL_CERT_FILE
          value: /etc/skyforge/ca/ca-certificates.crt
        - name: REQUESTS_CA_BUNDLE
          value: /etc/skyforge/ca/ca-certificates.crt
        image: ghcr.io/forwardnetworks/skyforge-netbox:4.5.0
        imagePullPolicy: IfNotPresent
        startupProbe:
          httpGet:
            path: /netbox/login/
            port: 8080
            scheme: HTTP
            httpHeaders:
            - name: X-Forwarded-Proto
              value: https
          failureThreshold: 240
          periodSeconds: 5
          timeoutSeconds: 2
        livenessProbe:
          httpGet:
            path: /netbox/login/
            port: 8080
            scheme: HTTP
            httpHeaders:
            - name: X-Forwarded-Proto
              value: https
          failureThreshold: 6
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /netbox/login/
            port: 8080
            scheme: HTTP
            httpHeaders:
            - name: X-Forwarded-Proto
              value: https
          failureThreshold: 3
          periodSeconds: 5
          timeoutSeconds: 2
        name: netbox
        ports:
        - containerPort: 8080
          protocol: TCP
        resources:
          limits:
            memory: '2147483648'
        volumeMounts:
        - mountPath: /run/secrets
          name: run-secrets
          readOnly: true
        - mountPath: /opt/netbox/netbox/media
          name: netbox-media
        - mountPath: /opt/netbox/netbox/reports
          name: netbox-reports
        - mountPath: /opt/netbox/netbox/scripts
          name: netbox-scripts
        - mountPath: /etc/netbox/config/extra.py
          name: netbox-config
          subPath: extra.py
        - name: skyforge-ca-bundle
          mountPath: /etc/skyforge/ca
      restartPolicy: Always
      volumes:
      - name: run-secrets
        projected:
          sources:
          - secret:
              items:
              - key: db-netbox-password
                path: db-netbox-password
              name: db-netbox-password
          - secret:
              items:
              - key: password
                path: skyforge-admin-shared
              name: skyforge-admin-shared
          - secret:
              items:
              - key: netbox-superuser-api-token
                path: netbox-superuser-api-token
              name: netbox-superuser-api-token
          - secret:
              items:
              - key: netbox-secret-key
                path: netbox-secret-key
              name: netbox-secret-key
      - name: netbox-media
        persistentVolumeClaim:
          claimName: netbox-media
      - name: netbox-reports
        persistentVolumeClaim:
          claimName: netbox-reports
      - name: netbox-scripts
        persistentVolumeClaim:
          claimName: netbox-scripts
      - name: netbox-config
        configMap:
          name: netbox-config
      - name: skyforge-ca-cert
        secret:
          secretName: skyforge-ca-cert
      - name: skyforge-ca-bundle
        emptyDir: {}
      initContainers:
      - name: skyforge-ca-bundle
        image: alpine:3.20
        command:
        - sh
        - -c
        - cat /etc/ssl/certs/ca-certificates.crt /etc/skyforge/skyforge-ca-cert > /work/ca-certificates.crt
        volumeMounts:
        - name: skyforge-ca-cert
          mountPath: /etc/skyforge
          readOnly: true
        - name: skyforge-ca-bundle
          mountPath: /work
