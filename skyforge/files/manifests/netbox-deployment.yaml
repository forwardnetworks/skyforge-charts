apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: netbox
  name: netbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: netbox
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbox
    spec:
      automountServiceAccountToken: false
{{- if .Values.skyforge.integrationsPriorityClassName }}
      priorityClassName: {{ .Values.skyforge.integrationsPriorityClassName | quote }}
{{- end }}
{{- with .Values.kubernetes.imagePullSecrets }}
      imagePullSecrets:
{{- range . }}
        - name: {{ . | quote }}
{{- end }}
{{- end }}
      containers:
      - args:
        - |
          set -e
          export DB_PASSWORD="$(cat /run/secrets/db-netbox-password)"
          export SUPERUSER_PASSWORD="$(cat /run/secrets/skyforge-admin-shared)"
          export SECRET_KEY="$(cat /run/secrets/netbox-secret-key)"
          if [ -n "${SKYFORGE_NETBOX_PLUGINS:-}" ]; then
            python - <<'PY'
          import json
          import os

          path = "/etc/unit/nginx-unit.json"
          with open(path, "r", encoding="utf-8") as handle:
              config = json.load(handle)
          app = config.setdefault("applications", {}).setdefault("netbox", {})
          env = app.setdefault("environment", {})
          env["PYTHONPATH"] = os.environ.get("PYTHONPATH", "")
          with open(path, "w", encoding="utf-8") as handle:
              json.dump(config, handle)
          PY

            for path in "${PYTHONPATH:-/opt/skyforge/netbox-plugins}"/*; do
              [ -e "${path}" ] || continue
              ln -sfn "${path}" "/opt/netbox/venv/lib/python3.12/site-packages/$(basename "${path}")"
            done
          fi
          exec /usr/bin/tini -- /opt/netbox/docker-entrypoint.sh /opt/netbox/launch-netbox.sh
        command:
        - /bin/sh
        - -lc
        env:
        - name: DB_HOST
          value: db
        - name: DB_NAME
          value: netbox
        - name: DB_PORT
          value: '5432'
        - name: DB_USER
          value: netbox
        - name: BASE_PATH
          value: /netbox
        - name: REDIS_DATABASE
          value: {{ .Values.skyforge.netbox.redisDatabase | quote }}
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: '6379'
        - name: SKYFORGE_HOSTNAME
          valueFrom:
            configMapKeyRef:
              key: SKYFORGE_HOSTNAME
              name: skyforge-config
        - name: SKYFORGE_OIDC_DISCOVERY_URL
          valueFrom:
            configMapKeyRef:
              key: SKYFORGE_OIDC_DISCOVERY_URL
              name: skyforge-config
        - name: SKYFORGE_OIDC_CLIENT_ID
          value: netbox
        - name: SKYFORGE_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: dex-client-netbox-secret
              key: dex-client-netbox-secret
        - name: API_TOKEN_PEPPERS
          valueFrom:
            secretKeyRef:
              name: netbox-api-token-peppers
              key: netbox-api-token-peppers
{{- if .Values.skyforge.netbox.forwardPlugin.enabled }}
        - name: PYTHONPATH
          value: {{ .Values.skyforge.netbox.forwardPlugin.installTarget | quote }}
        - name: SKYFORGE_NETBOX_PLUGINS
          value: {{ join "," .Values.skyforge.netbox.forwardPlugin.plugins | quote }}
{{- end }}
        - name: SUPERUSER_NAME
          value: skyforge
        - name: SUPERUSER_EMAIL
          valueFrom:
            configMapKeyRef:
              name: skyforge-config
              key: SKYFORGE_ADMIN_EMAIL
        - name: SSL_CERT_FILE
          value: /etc/skyforge/ca/ca-certificates.crt
        - name: REQUESTS_CA_BUNDLE
          value: /etc/skyforge/ca/ca-certificates.crt
        image: {{ .Values.images.skyforgeNetbox | quote }}
        imagePullPolicy: IfNotPresent
        startupProbe:
          httpGet:
            path: /netbox/login/
            port: 8080
            scheme: HTTP
            httpHeaders:
            - name: X-Forwarded-Proto
              value: https
          failureThreshold: 240
          periodSeconds: 5
          timeoutSeconds: 2
        livenessProbe:
          httpGet:
            path: /netbox/login/
            port: 8080
            scheme: HTTP
            httpHeaders:
            - name: X-Forwarded-Proto
              value: https
          failureThreshold: 6
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /netbox/login/
            port: 8080
            scheme: HTTP
            httpHeaders:
            - name: X-Forwarded-Proto
              value: https
          failureThreshold: 3
          periodSeconds: 5
          timeoutSeconds: 2
        name: netbox
        ports:
        - containerPort: 8080
          protocol: TCP
        resources:
{{ toYaml .Values.skyforge.netbox.resources | indent 10 }}
        volumeMounts:
        - mountPath: /run/secrets
          name: run-secrets
          readOnly: true
        - mountPath: /opt/netbox/netbox/media
          name: netbox-media
        - mountPath: /opt/netbox/netbox/reports
          name: netbox-reports
        - mountPath: /opt/netbox/netbox/scripts
          name: netbox-scripts
        - mountPath: /etc/netbox/config/extra.py
          name: netbox-config
          subPath: extra.py
{{- if .Values.skyforge.netbox.forwardPlugin.enabled }}
        - mountPath: {{ .Values.skyforge.netbox.forwardPlugin.installTarget | quote }}
          name: netbox-forward-plugin
{{- end }}
        - name: skyforge-ca-bundle
          mountPath: /etc/skyforge/ca
      restartPolicy: Always
      volumes:
      - name: run-secrets
        projected:
          sources:
          - secret:
              items:
              - key: db-netbox-password
                path: db-netbox-password
              name: db-netbox-password
          - secret:
              items:
              - key: password
                path: skyforge-admin-shared
              name: skyforge-admin-shared
          - secret:
              items:
              - key: netbox-superuser-api-token
                path: netbox-superuser-api-token
              name: netbox-superuser-api-token
          - secret:
              items:
              - key: netbox-secret-key
                path: netbox-secret-key
              name: netbox-secret-key
      - name: netbox-media
        persistentVolumeClaim:
          claimName: netbox-media
      - name: netbox-reports
        persistentVolumeClaim:
          claimName: netbox-reports
      - name: netbox-scripts
        persistentVolumeClaim:
          claimName: netbox-scripts
      - name: netbox-config
        configMap:
          name: netbox-config
{{- if .Values.skyforge.netbox.forwardPlugin.enabled }}
      - name: netbox-forward-plugin
        emptyDir: {}
{{- end }}
      - name: skyforge-ca-cert
        secret:
          secretName: skyforge-ca-cert
      - name: skyforge-ca-bundle
        emptyDir: {}
      initContainers:
{{- if .Values.skyforge.netbox.forwardPlugin.enabled }}
      - name: install-forward-netbox-plugin
        image: {{ .Values.skyforge.netbox.forwardPlugin.installerImage | quote }}
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -lc
        - |
          set -eu
          python -m pip install --no-cache-dir --target {{ .Values.skyforge.netbox.forwardPlugin.installTarget | quote }} "httpx<0.29,>0.26"
          python -m pip install --no-cache-dir --no-deps --target {{ .Values.skyforge.netbox.forwardPlugin.installTarget | quote }} "netboxlabs-netbox-branching>=0.7.0" {{ .Values.skyforge.netbox.forwardPlugin.packageUrl | quote }}
        volumeMounts:
        - mountPath: {{ .Values.skyforge.netbox.forwardPlugin.installTarget | quote }}
          name: netbox-forward-plugin
{{- end }}
      - name: skyforge-ca-bundle
        image: public.ecr.aws/docker/library/alpine:latest
        command:
        - sh
        - -c
        - cat /etc/ssl/certs/ca-certificates.crt /etc/skyforge/skyforge-ca-cert > /work/ca-certificates.crt
        volumeMounts:
        - name: skyforge-ca-cert
          mountPath: /etc/skyforge
          readOnly: true
        - name: skyforge-ca-bundle
          mountPath: /work
