skyforge:
  platformData:
    storage:
      storageClassName: "longhorn"
      accessMode: "ReadWriteOnce"
  skyforgeServerData:
    storage:
      storageClassName: "longhorn"
      accessMode: "ReadWriteOnce"
  hooks:
    authRuntimeSync:
      runOnUpgrade: false
    giteaActionsRunnerTokenReconcile:
      runOnUpgrade: true
  auth:
    mode: oidc
  dex:
    authMode: oidc
    replicas: 2
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 0
    placement:
      requiredAntiAffinity: true
      nodeSelector:
        skyforge.forwardnetworks.com/egress-okta: "true"
    oidc:
      issuer: "https://fn-prod.okta.com"
      clientID: "0oa108ytsjzRXoJw3698"
      clientSecretSecretName: "dex-oidc-client-secret"
      clientSecretSecretKey: "dex-oidc-client-secret"
      redirectURI: "https://skyforge.local.forwardnetworks.com/dex/callback"
      insecureSkipEmailVerified: true
  adminUsers: "skyforge,craigjohnson"
  oidc:
    discoveryUrl: "http://dex:5556/dex"
    issuerUrl: "https://skyforge.local.forwardnetworks.com/dex"
    redirectUrl: "https://skyforge.local.forwardnetworks.com/api/auth/oidc/callback"
  db:
    storage:
      storageClassName: "longhorn"
  edition: enterprise
  infoblox:
    enabled: true
    managed: true
    image: ghcr.io/forwardnetworks/kubevirt/infoblox-vnios:9.0.3-50212
    pullPolicy: IfNotPresent
    internalUrl: https://infoblox:443
    serviceName: infoblox
    servicePort: 443
    routeServiceName: ""
    routeServicePort: 0
    rewritePrefixToRoot: true
    serviceAlias:
      enabled: false
    proxyEnabled: false
    vm:
      cpuCores: 4
      memory: 32Gi
      managementMacAddress: "02:00:00:ab:cd:01"
      dedicatedCpuPlacement: false
      isolateEmulatorThread: false
      managementInterfaceModel: virtio
      auxiliaryInterfaceModel: virtio
      podNetworkBinding: masquerade
      multus:
        enabled: true
        createNADs: true
        lan1:
          macAddress: "02:00:00:ab:cd:11"
        ha:
          macAddress: "02:00:00:ab:cd:12"
        lan2:
          macAddress: "02:00:00:ab:cd:13"
    lifecycle:
      enabled: true
      autoStop:
        enabled: false
        schedule: "*/15 * * * *"
        maxIdleMinutes: 45
        maxRunMinutes: 180
      reseed:
        enabled: true
        schedule: "17 */6 * * *"
        resetAfterDays: 60
        haltWaitSeconds: 30
      license:
        enabled: true
        schedule: "*/20 * * * *"
        maxAttempts: 3
        attemptSleepSeconds: 60
        promptWaitSeconds: 600
        consoleTimeoutSeconds: 420
        virtctlVersion: v1.7.2
        licenseChoice: "2"
  jira:
    enabled: false
    managed: false
    storage:
      storageClassName: "longhorn"
  rapid7:
    enabled: false
    managed: false
    storage:
      storageClassName: "longhorn"
  elk:
    enabled: false
    managed: false
  keda:
    enabled: true
    worker:
      enabled: true
      pollingInterval: 15
      cooldownPeriod: 120
      minReplicaCount: 2
      maxReplicaCount: 4
      query: "SELECT COUNT(*) FROM sf_tasks WHERE status = 'queued'"
      activationTargetQueryValue: "1"
      targetQueryValue: "5"
  burst:
    hetzner:
      apiTokenSecretName: skyforge-hetzner-burst
      apiTokenSecretKey: api-token
      hubPublicKeySecretName: skyforge-hetzner-burst
      hubPublicKeySecretKey: public-key
      k3sTokenSecretName: skyforge-hetzner-burst
      k3sTokenSecretKey: token
  netlab:
    image: ghcr.io/forwardnetworks/skyforge-netlab:20260418-netlab-snmpfix-r2-fe0107a
    pullPolicy: IfNotPresent
  forward:
    baseUrl: https://fwd-appserver.forward.svc:8443
  forwardImages:
    tag: 26.4.0-14
    imagePullSecretName: ""
    imagePullSecretNamespace: ""
  kubernetes:
    apiHostOverride: "10.128.16.82"
    apiPortOverride: "6443"
  waitForNsq:
    host: "nsq.skyforge.svc.cluster.local"
    port: 4150
    attempts: 90
    sleepSeconds: 2
    connectTimeoutSeconds: 2
  forwardCluster:
    enabled: true
    hostname: skyforge-fwd.local.forwardnetworks.com
    serviceNamespace: forward
    serviceName: fwd-appserver
    servicePort: 8080
    tlsSecretName: proxy-tls-fwd
  kne:
    enabled: true
    meshnetMode: vxlan
    meshnet:
      image: "ghcr.io/forwardnetworks/meshnet:20260419-meshnet-vni-scope-r4"
      imagePullPolicy: "IfNotPresent"
    controllers:
      enabled: true
      ceoslab:
        enabled: true
        image: ghcr.io/forwardnetworks/arista-ceoslab-operator:20260417-kne-persistence-r1
      cdnos:
        enabled: false
      srlinux:
        enabled: false
      lemming:
        enabled: false
  gitea:
    storage:
      storageClassName: "longhorn"
    apiUrl: http://gitea.skyforge.svc.cluster.local:3000/api/v1
    url: /git
  redis:
    storage:
      storageClassName: "longhorn"
  coder:
