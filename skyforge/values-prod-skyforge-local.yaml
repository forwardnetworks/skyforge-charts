skyforge:
  auth:
    mode: oidc
  hostname: skyforge.local.forwardnetworks.com
  domain: forwardnetworks.com
  publicUrl: https://skyforge.local.forwardnetworks.com
  gateway:
    addresses:
      - type: IPAddress
        value: "10.128.16.73"
    localNodePorts:
      enabled: false
  dex:
    manageConfig: true
    authMode: oidc
    oidc:
      issuer: "https://fn-prod.okta.com"
      clientID: "0oa108ytsjzRXoJw3698"
      insecureSkipEmailVerified: true
      # Secret remains pre-created in-cluster.
      clientSecretSecretName: "dex-oidc-client-secret"
      clientSecretSecretKey: "dex-oidc-client-secret"
  oidc:
    discoveryUrl: "http://dex:5556/dex"
    issuerUrl: "https://skyforge.local.forwardnetworks.com/dex"
    redirectUrl: "https://skyforge.local.forwardnetworks.com/api/auth/oidc/callback"

  # Comma-separated usernames/emails that should see admin-only UI + APIs.
  # NOTE: Server-side admin checks are exact-match (no wildcards).
  adminUsers: "skyforge,craigjohnson,craigjohnson@forwardnetworks.com"

  encoreCfg:
    # Manage the API service typed config secret via Helm so feature flags and
    # defaults reliably propagate into the running pods.
    create: true

  # Provide ENCORE_RUNTIME_CONFIG from the chart's `files/infra.config.json`.
  # This keeps Skyforge server images portable (no baked-in infra config).
  encoreRuntimeConfig:
    # Deprecated: prefer `ENCORE_INFRA_CONFIG_PATH` which points at the mounted
    # `infra.config.json` ConfigMap. Leave these disabled to avoid version skew
    # and base64 encoding pitfalls across Encore runtime versions.
    create: false
    workerCreate: false

  netbox:
    enabled: true
  netboxUrl: /netbox
  netboxSsoUrl: /netbox

  nautobot:
    enabled: true
  nautobotUrl: /nautobot
  nautobotSsoUrl: /nautobot

  # ReDoc image pulls can be rate-limited; keep this disabled
  # in production unless you pin a mirrored image.
  redoc:
    enabled: true

  # Keep registry integration enabled for GHCR-backed workflows.
  registry:
    url: https://ghcr.io

  # Staged integrations must be explicit in prod-shaped values.
  # They remain disabled until promoted.
  infoblox:
    enabled: true
    managed: true
    image: ghcr.io/forwardnetworks/kubevirt/infoblox-vnios:9.0.3-50212
    internalUrl: https://infoblox:443
    lifecycle:
      # Pin lifecycle controller tooling image in prod for deterministic reconcile behavior.
      image: public.ecr.aws/bitnami/kubectl:1.35.2-debian-12-r1
    vm:
      managementInterfaceModel: virtio
      managementMacAddress: "52:54:00:10:00:01"
      auxiliaryInterfaceModel: e1000
      # Avoid co-locating Infoblox VM with Forward worker pool by preference.
      # This keeps Forward cold-start/reboots from contending with a 32Gi VM.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: forwardnetworks.com/role
                    operator: DoesNotExist
      multus:
        enabled: true
        createNADs: true
        lan1:
          macAddress: "52:54:00:10:01:01"
          # DHCP plugin is not present on prod worker nodes yet; keep LAN1
          # host-local so VM networking converges reliably.
          ipamType: "host-local"
          isGateway: false
          ipMasq: false
          subnet: "169.254.101.0/24"
        ha:
          macAddress: "52:54:00:10:02:01"
        lan2:
          macAddress: "52:54:00:10:03:01"
  jira:
    enabled: true
    managed: true
  rapid7:
    enabled: true
    managed: true
    image: "ghcr.io/forwardnetworks/rapid7:20260317-r11"
    pullPolicy: "IfNotPresent"
    progressDeadlineSeconds: 3600
    backendTLS:
      enabled: true
      hostname: "rapid7"
      caConfigMapName: "rapid7-ca"
  elk:
    enabled: true
    managed: true
    env:
      ELASTICSEARCH_START: "1"
      LOGSTASH_START: "1"
      KIBANA_START: "1"
      SERVER_BASEPATH: "/elk"
      SERVER_REWRITEBASEPATH: "true"
      ES_JAVA_OPTS: "-Xms1024m -Xmx1024m"
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
      NODE_OPTIONS: "--max-old-space-size=512"

  # Forward in-cluster collector image + pull credentials.
  # Pin to a concrete tag to avoid drifting when `latest` is retagged.
  forward:
    enabled: true
  forwardCollector:
    image: harbor.local.forwardnetworks.com/forward/fwd_collector:26.3.0-18
    imagePullSecretName: ""
    imagePullSecretNamespace: ""
  forwardCluster:
    enabled: true
    hostname: "skyforge-fwd.local.forwardnetworks.com"
    tlsSecretName: "proxy-tls-fwd"
    serviceName: "fwd-appserver"
    serviceNamespace: "forward"
    servicePort: 8080
  observability:
    enabled: true
    managed:
      enabled: true
    dashboards:
      enabled: true

  # Enable Gitea provisioning for blueprint-backed workflows.
  # API URL is in-cluster; UI URL is the SSO-proxied external path.
  gitea:
    apiUrl: http://gitea:3000/api/v1
    url: /git

  # Pin the single netlab runtime image used by both create/apply phases.
  netlab:
    image: "ghcr.io/forwardnetworks/skyforge-netlab:20260317-kne-contract-hardcut-r1"
    pullPolicy: "IfNotPresent"

  # Skyforge deploys in-cluster topologies through KNE.
  kne:
    enabled: true
    meshnetMode: grpc
    controllers:
      enabled: true

  worker:
    replicas: 1
    autoscaling:
      enabled: false
    pdb:
      enabled: true
      minAvailable: 1
    tuning:
      interactiveConcurrency: 8
      interactiveQueueSize: 64
      backgroundConcurrency: 2
      backgroundQueueSize: 16
      heartbeatIntervalSeconds: 30
      reconcileQueuedIntervalSeconds: 30
      reconcileRunningIntervalSeconds: 300
      activationIntervalSeconds: 20
      activationMinQueuedAgeSeconds: 20
      activationBatchSize: 200
      diagStaleHeartbeatSeconds: 120
      diagOldestQueuedSeconds: 300

images:
  # Pin images in prod so upgrades are repeatable (avoid implicit "latest").
  skyforgeServer: "ghcr.io/forwardnetworks/skyforge-server:20260317-terminal-fix-r3"
  # Worker can run from the same image tag as the API container.
  skyforgeServerWorker: "ghcr.io/forwardnetworks/skyforge-server:20260317-terminal-fix-r3-worker"
  # Shared kubectl image pin used by lifecycle jobs when integration-specific image is unset.
  kubectl: "public.ecr.aws/bitnami/kubectl:1.35.2-debian-12-r1"

kubernetes:
  # Ensure private GHCR images can be pulled in the release namespace.
  imagePullSecrets: ["ghcr-pull"]

secrets:
  # Production/OSS baseline: secrets are pre-created in-cluster.
  create: false
  validatePrecreated: true
