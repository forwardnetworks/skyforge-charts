skyforge:
  backups:
    localSpread:
      enabled: true
    offsiteRaw:
      enabled: true
    forwardRaw:
      enabled: true
  hooks:
    authRuntimeSync:
      runOnUpgrade: false
    gatewayNodePortsReconcile:
      runOnUpgrade: false
    coderAdminBootstrap:
      runOnUpgrade: false
    giteaActionsRunnerTokenReconcile:
      runOnUpgrade: true
    dbProvision:
      runOnUpgrade: false
  priorityClasses:
    create: true
    core:
      name: "skyforge-core"
      value: 100000
    integrations:
      name: "skyforge-integrations"
      value: -100
    labs:
      name: "skyforge-lab"
      value: -1000
  corePriorityClassName: "skyforge-core"
  integrationsPriorityClassName: "skyforge-integrations"
  labPriorityClassName: "skyforge-lab"
  auth:
    mode: oidc
  db:
    storage:
      size: "50Gi"
  hostname: skyforge.local.forwardnetworks.com
  domain: forwardnetworks.com
  publicUrl: ""
  gateway:
    # Local Skyforge exposure uses the LB-IPAM/L2-announced VIP path.
    # Keep addresses empty so Cilium assigns the reserved Gateway VIP.
    addresses: []
    localNodePorts:
      enabled: false
  dex:
    replicas: 2
    pdb:
      enabled: true
      minAvailable: 1
    placement:
      requiredAntiAffinity: true
    manageConfig: true
    authMode: oidc
    oidc:
      issuer: "https://fn-prod.okta.com"
      clientID: "0oa108ytsjzRXoJw3698"
      insecureSkipEmailVerified: true
      # Secret remains pre-created in-cluster.
      clientSecretSecretName: "dex-oidc-client-secret"
      clientSecretSecretKey: "dex-oidc-client-secret"
      redirectURI: "https://skyforge.local.forwardnetworks.com/dex/callback"
  oidc:
    discoveryUrl: "http://dex:5556/dex"
    issuerUrl: "https://skyforge.local.forwardnetworks.com/dex"
    redirectUrl: "https://skyforge.local.forwardnetworks.com/api/auth/oidc/callback"
  awsSsoRegion: "us-east-1"
  awsSsoStartUrl: "https://d-9067d98db1.awsapps.com/start/#"

  # Comma-separated usernames/emails that should see admin-only UI + APIs.
  # NOTE: Server-side admin checks are exact-match (no wildcards).
  adminUsers: "skyforge,craigjohnson"

  encoreCfg:
    # Manage the API service typed config secret via Helm so feature flags and
    # defaults reliably propagate into the running pods.
    create: true

  # Provide ENCORE_RUNTIME_CONFIG from the chart's `files/infra.config.json`.
  # This keeps Skyforge server images portable (no baked-in infra config).
  encoreRuntimeConfig:
    # Deprecated: prefer `ENCORE_INFRA_CONFIG_PATH` which points at the mounted
    # `infra.config.json` ConfigMap. Leave these disabled to avoid version skew
    # and base64 encoding pitfalls across Encore runtime versions.
    create: false
    workerCreate: false

  netbox:
    enabled: true
    bootstrap:
      enabled: false
  netboxUrl: /netbox
  netboxSsoUrl: /netbox

  nautobot:
    enabled: true
  nautobotUrl: /nautobot
  nautobotSsoUrl: /nautobot

  # ReDoc image pulls can be rate-limited; keep this disabled
  # in production unless you pin a mirrored image.
  redoc:
    enabled: true

  # Keep registry integration enabled for GHCR-backed workflows.
  registry:
    url: https://ghcr.io

  # Staged integrations must be explicit in prod-shaped values.
  # They remain disabled until promoted.
  infoblox:
    enabled: true
    managed: true
    image: ghcr.io/forwardnetworks/kubevirt/infoblox-vnios:9.0.3-50212
    internalUrl: https://infoblox:443
    oidc:
      # Keep native appliance login/session flow. The OIDC sidecar path causes
      # Infoblox "Session Expired" behavior behind this route.
      enabled: false
    lifecycle:
      # Pin lifecycle controller tooling image in prod for deterministic reconcile behavior.
      image: public.ecr.aws/bitnami/kubectl:1.35.2-debian-12-r1
      # Local VM QA uses a non-production virtctl path; keep license bootstrap
      # disabled until a pinned, validated virtctl image is available.
      license:
        enabled: false
      autoStop:
        enabled: true
        # Keep Infoblox subordinate to core lab/platform workloads by
        # shrinking idle/runtime windows.
        maxIdleMinutes: 30
        maxRunMinutes: 240
    vm:
      cpuCores: 2
      memory: "8Gi"
      cpuModel: host-passthrough
      dedicatedCpuPlacement: false
      isolateEmulatorThread: false
      ioThreadsPolicy: auto
      networkInterfaceMultiqueue: true
      hugepages:
        enabled: false
        pageSize: 2Mi
      managementInterfaceModel: virtio
      managementMacAddress: "52:54:00:10:00:01"
      auxiliaryInterfaceModel: e1000
      # Avoid co-locating Infoblox VM with Forward worker pool by preference.
      # This keeps Forward cold-start/reboots from contending with a 32Gi VM.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: forwardnetworks.com/role
                    operator: DoesNotExist
      multus:
        enabled: true
        createNADs: true
        lan1:
          macAddress: "52:54:00:10:01:01"
          # DHCP plugin is not present on prod worker nodes yet; keep LAN1
          # host-local so VM networking converges reliably.
          ipamType: "host-local"
          isGateway: false
          ipMasq: false
          subnet: "169.254.101.0/24"
        ha:
          macAddress: "52:54:00:10:02:01"
        lan2:
          macAddress: "52:54:00:10:03:01"
  jira:
    enabled: true
    managed: true
  rapid7:
    enabled: true
    managed: true
    image: "ghcr.io/forwardnetworks/rapid7:20260317-r11"
    pullPolicy: "IfNotPresent"
    progressDeadlineSeconds: 3600
    priorityClassName: "skyforge-integrations"
    backendTLS:
      enabled: false
      hostname: "rapid7"
      caConfigMapName: "rapid7-ca"
  elk:
    enabled: false
    managed: true
    priorityClassName: "skyforge-integrations"
    env:
      ELASTICSEARCH_START: "1"
      LOGSTASH_START: "1"
      KIBANA_START: "1"
      SERVER_BASEPATH: "/elk"
      SERVER_REWRITEBASEPATH: "true"
      ES_JAVA_OPTS: "-Xms1024m -Xmx1024m"
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
      NODE_OPTIONS: "--max-old-space-size=512"
  keda:
    enabled: true
    requireCRD: true
    # Keep heavyweight integrations subordinate and cap at one replica.
    # Scale from zero based on activity signals. For services without native
    # request metrics in this stack, we keep an explicit Wake control in UI/API.
    netbox:
      enabled: true
      pollingInterval: 30
      cooldownPeriod: 3600
      minReplicaCount: 0
      maxReplicaCount: 1
      triggers:
        - type: prometheus
          metadata:
            serverAddress: "http://skyforge-prometheus.skyforge.svc.cluster.local:9090/prometheus"
            metricName: "netbox_manual_wake"
            query: "vector(0)"
            activationThreshold: "0.01"
            threshold: "0.1"
    nautobot:
      enabled: true
      pollingInterval: 30
      cooldownPeriod: 3600
      minReplicaCount: 0
      maxReplicaCount: 1
      triggers:
        - type: prometheus
          metadata:
            serverAddress: "http://skyforge-prometheus.skyforge.svc.cluster.local:9090/prometheus"
            metricName: "nautobot_manual_wake"
            query: "vector(0)"
            activationThreshold: "0.01"
            threshold: "0.1"
    rapid7:
      enabled: true
      pollingInterval: 30
      cooldownPeriod: 300
      minReplicaCount: 0
      maxReplicaCount: 1
      triggers:
        - type: prometheus
          metadata:
            serverAddress: "http://skyforge-prometheus.skyforge.svc.cluster.local:9090/prometheus"
            metricName: "rapid7_proxy_rps"
            query: "sum(rate(envoy_http_downstream_rq_total{envoy_http_conn_manager_prefix='ingress_http',pod=~'rapid7-sso-proxy-.*'}[2m]))"
            activationThreshold: "0.01"
            threshold: "0.1"
    elkProxy:
      enabled: true
      pollingInterval: 30
      cooldownPeriod: 300
      minReplicaCount: 0
      maxReplicaCount: 1
      triggers:
        - type: prometheus
          metadata:
            serverAddress: "http://skyforge-prometheus.skyforge.svc.cluster.local:9090/prometheus"
            metricName: "elk_proxy_rps"
            query: "sum(rate(envoy_http_downstream_rq_total{envoy_http_conn_manager_prefix='ingress_http',pod=~'elk-sso-proxy-.*'}[2m]))"
            activationThreshold: "0.01"
            threshold: "0.1"
  burst:
    hetzner:
      enabled: true
      provisioningEnabled: true
      apiTokenSecretName: "skyforge-hetzner-burst"
      apiTokenSecretKey: "api-token"
      hubPublicKeySecretName: "skyforge-hetzner-wireguard"
      hubPublicKeySecretKey: "public-key"
      k3sTokenSecretName: "skyforge-hetzner-k3s"
      k3sTokenSecretKey: "token"
      providerLabel: "hetzner"
      poolClass: "burst"
      location: "hil"
      networkZone: "us-west"
      networkCIDR: "10.30.0.0/16"
      workerSubnetCIDR: "10.30.0.0/24"
      serverType: "cpx11"
      image: "wireguard"
      minReplicas: 0
      maxReplicas: 4
      scaleDownCooldownMinutes: 30
      k3s:
        serverUrl: "https://10.128.16.73:6443"
      wireguard:
        mode: "outbound-to-gateway"
        endpointHost: "5.78.94.119"
        endpointPort: 51820
        listenPort: 51820
        interfaceName: "wg-burst0"
        tunnelCIDR: "10.31.0.0/24"
        localAddressCIDR: "10.31.0.1/24"
        gatewayNodeIP: "10.128.16.73"
        mtu: 1420
        allowedIPs:
          - "10.128.16.0/24"
          - "10.42.0.0/16"
          - "10.43.0.0/16"
          - "192.168.1.0/24"
        burstNodeCIDRs:
          - "10.30.0.0/24"
          - "192.168.1.0/24"
        hub:
          enabled: true
          image: "docker.io/linuxserver/wireguard:latest"
          imagePullPolicy: "IfNotPresent"
          privateKeySecretName: "skyforge-hetzner-wireguard"
          privateKeySecretKey: "private-key"
          peerConfigSecretName: "skyforge-hetzner-wireguard"
          peerConfigSecretKey: "peers.conf"
          intervalSeconds: 60
          enableIPv4Forwarding: true
          nodeSelector:
            skyforge-role: "control"
          tolerations:
            - key: "node-role.kubernetes.io/control-plane"
              operator: "Exists"
              effect: "NoSchedule"
          affinity: {}
      routeReconciler:
        enabled: true
        image: "docker.io/nicolaka/netshoot:v0.13"
        imagePullPolicy: "IfNotPresent"
        intervalSeconds: 60
        via: "10.128.16.73"
        dev: ""
        destinations:
          - "10.30.0.0/24"
          - "10.31.0.0/24"
          - "192.168.1.0/24"
        nodeSelector: {}
        tolerations:
          - key: "skyforge.forwardnetworks.com/disabled"
            operator: "Exists"
            effect: "NoSchedule"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: "node-role.kubernetes.io/control-plane"
                      operator: "DoesNotExist"


  # Forward in-cluster collector image + pull credentials.
  # Pin to a concrete tag to avoid drifting when `latest` is retagged.
  forward:
    enabled: true
    baseUrl: "https://fwd-appserver.forward.svc:8443"
    demoReset:
      schedule: "17 3 * * *"
      timeZone: "America/Chicago"
  forwardCollector:
    image: harbor.local.forwardnetworks.com/forward/fwd_collector:26.4.0-08
    imagePullSecretName: ""
    imagePullSecretNamespace: ""
  forwardCluster:
    enabled: true
    appserverProfiles: "K8S"
    hostname: "skyforge-fwd.local.forwardnetworks.com"
    tlsSecretName: "proxy-tls-fwd"
    serviceName: "fwd-appserver"
    serviceNamespace: "forward"
    servicePort: 8080
    # Keep the production profile on upstream worker ownership until the
    # rollout path stops the upstream Forward release from rendering the same
    # worker object names. The Skyforge-owned takeover profile lives in
    # values-prod-skyforge-local-forward-workers-skyforge.yaml.
    workers:
      owner: "upstream"
      adoptionAcknowledged: false
    upstreamWorkerRuntime:
      compute:
        memoryProfile: "ISOLATED_WORKER"
        memoryLimitMB: 16384
        podMemoryRequest: "8Gi"
        podMemoryLimit: "24Gi"
      search:
        memoryProfile: "ISOLATED_WORKER"
        memoryLimitMB: 8192
        podMemoryRequest: "4Gi"
        podMemoryLimit: "12Gi"
    nodeRoleReconciler:
      enabled: true
      schedule: "*/1 * * * *"
      # Local-path Forward state is pinned onto this master set. Keep every node
      # that owns critical Forward PVCs in `master`, and avoid shrinking this
      # set without first moving the underlying PVs.
      managedNodes:
        - "skyforge-worker-0"
        - "skyforge-worker-2"
        - "skyforge-worker-3"
        - "skyforge-worker-4"
        - "skyforge-worker-5"
      nodeRoles:
        master:
          - "skyforge-worker-2"
          - "skyforge-worker-3"
          - "skyforge-worker-4"
          - "skyforge-worker-5"
        monitoring:
          - "skyforge-worker-2"
        compute:
          - "skyforge-worker-0"
          - "skyforge-worker-2"
          - "skyforge-worker-3"
          - "skyforge-worker-4"
          - "skyforge-worker-5"
        search:
          - "skyforge-worker-0"
          - "skyforge-worker-2"
          - "skyforge-worker-3"
          - "skyforge-worker-4"
          - "skyforge-worker-5"
        forward:
          - "skyforge-worker-0"
          - "skyforge-worker-2"
          - "skyforge-worker-3"
          - "skyforge-worker-4"
          - "skyforge-worker-5"
      nodePools:
        control: []
        app:
          - "skyforge-worker-0"
          - "skyforge-worker-2"
          - "skyforge-worker-3"
          - "skyforge-worker-4"
          - "skyforge-worker-5"
        lab: []
  observability:
    enabled: true
    managed:
      enabled: true
    dashboards:
      enabled: true

  # Enable Gitea provisioning for blueprint-backed workflows.
  # Skyforge uses the routed /git API path so blueprint/LFS reads work from the
  # application pods and from browser-driven flows the same way.
  gitea:
    apiUrl: http://gitea.skyforge.svc.cluster.local:3000/api/v1
    url: https://skyforge.local.forwardnetworks.com/git

  # Pin the single netlab runtime image used by both create/apply phases.
  netlab:
    image: "ghcr.io/forwardnetworks/skyforge-netlab:20260414-kne-startup-sidecar-r1"
    pullPolicy: "IfNotPresent"
    runtimePrepull:
      enabled: true

  # Skyforge deploys in-cluster topologies through KNE.
  kne:
    enabled: true
    meshnetMode: grpc
    controllers:
      enabled: true
      ceoslab:
        enabled: true
      cdnos:
        enabled: false
      srlinux:
        enabled: false
      lemming:
        enabled: false

  worker:
    priorityClassName: "skyforge-core"
    replicas: 2
    placement:
      poolLabelKey: "skyforge.forwardnetworks.com/pool-class"
      preferredPoolClass: "app"
      pools:
        - control
        - app
        - lab
      poolWeight: 100
      requiredPoolClass: "app"
      requiredAntiAffinity: true
      nodeSelector: {}
      tolerations: []
      affinity: {}
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    pdb:
      enabled: true
      minAvailable: 1
    tuning:
      interactiveConcurrency: 12
      interactiveQueueSize: 128
      backgroundConcurrency: 8
      backgroundQueueSize: 128
      heartbeatIntervalSeconds: 30
      reconcileQueuedIntervalSeconds: 30
      reconcileRunningIntervalSeconds: 300
      activationIntervalSeconds: 20
      activationMinQueuedAgeSeconds: 20
      activationBatchSize: 200
      diagStaleHeartbeatSeconds: 120
      diagOldestQueuedSeconds: 300

  server:
    priorityClassName: "skyforge-core"
    placement:
      poolLabelKey: "skyforge.forwardnetworks.com/pool-class"
      pools:
        - app
      poolWeight: 100
      requiredPoolClass: "app"
      requiredAntiAffinity: true
      nodeSelector: {}
      tolerations: []
      affinity: {}

nsq:
  enabled: true
  replicas: 1
  pdb:
    enabled: true
    minAvailable: 1
  placement:
    poolLabelKey: "skyforge.forwardnetworks.com/pool-class"
    pools:
      - app
    poolWeight: 100
    requiredPoolClass: "app"
    requiredAntiAffinity: false
    nodeSelector: {}
    tolerations: []
    affinity: {}

images:
  # Pin images in prod so upgrades are repeatable (avoid implicit "latest").
  skyforgeServer: "ghcr.io/forwardnetworks/skyforge-server:20260414-git-reauth-r1"
  # Worker can run from the same image tag as the API container.
  skyforgeServerWorker: "ghcr.io/forwardnetworks/skyforge-server:20260414-git-reauth-r1-worker"
  atlas: "ghcr.io/forwardnetworks/atlas:1.1.6-alpine"
  # Shared kubectl image pin used by lifecycle jobs when integration-specific image is unset.
  kubectl: "public.ecr.aws/bitnami/kubectl:1.35.2-debian-12-r1"

kubernetes:
  # Ensure private GHCR images can be pulled in the release namespace.
  imagePullSecrets: ["ghcr-pull"]

secrets:
  # Production/OSS baseline: secrets are pre-created in-cluster.
  create: false
  validatePrecreated: true
