skyforge:
  hooks:
    authRuntimeSync:
      runOnUpgrade: false
    gatewayNodePortsReconcile:
      runOnUpgrade: false
    coderAdminBootstrap:
      runOnUpgrade: false
    giteaActionsRunnerTokenReconcile:
      runOnUpgrade: false
    dbProvision:
      runOnUpgrade: false
  priorityClasses:
    create: true
    core:
      name: "skyforge-core"
      value: 100000
    integrations:
      name: "skyforge-integrations"
      value: -100
  corePriorityClassName: "skyforge-core"
  integrationsPriorityClassName: "skyforge-integrations"
  auth:
    mode: oidc
  hostname: skyforge.local.forwardnetworks.com
  domain: forwardnetworks.com
  publicUrl: https://skyforge.local.forwardnetworks.com
  gateway:
    # Cilium Gateway runs in host-network mode in this environment.
    # Do not pin a static Gateway address here.
    addresses: []
    localNodePorts:
      enabled: false
  dex:
    manageConfig: true
    authMode: oidc
    oidc:
      issuer: "https://fn-prod.okta.com"
      clientID: "0oa108ytsjzRXoJw3698"
      insecureSkipEmailVerified: true
      # Secret remains pre-created in-cluster.
      clientSecretSecretName: "dex-oidc-client-secret"
      clientSecretSecretKey: "dex-oidc-client-secret"
  oidc:
    discoveryUrl: "http://dex:5556/dex"
    issuerUrl: "https://skyforge.local.forwardnetworks.com/dex"
    redirectUrl: "https://skyforge.local.forwardnetworks.com/api/auth/oidc/callback"

  # Comma-separated usernames/emails that should see admin-only UI + APIs.
  # NOTE: Server-side admin checks are exact-match (no wildcards).
  adminUsers: "skyforge,craigjohnson,craigjohnson@forwardnetworks.com"

  encoreCfg:
    # Manage the API service typed config secret via Helm so feature flags and
    # defaults reliably propagate into the running pods.
    create: true

  # Provide ENCORE_RUNTIME_CONFIG from the chart's `files/infra.config.json`.
  # This keeps Skyforge server images portable (no baked-in infra config).
  encoreRuntimeConfig:
    # Deprecated: prefer `ENCORE_INFRA_CONFIG_PATH` which points at the mounted
    # `infra.config.json` ConfigMap. Leave these disabled to avoid version skew
    # and base64 encoding pitfalls across Encore runtime versions.
    create: false
    workerCreate: false

  netbox:
    enabled: true
    bootstrap:
      enabled: false
  netboxUrl: /netbox
  netboxSsoUrl: /netbox

  nautobot:
    enabled: true
  nautobotUrl: /nautobot
  nautobotSsoUrl: /nautobot

  # ReDoc image pulls can be rate-limited; keep this disabled
  # in production unless you pin a mirrored image.
  redoc:
    enabled: true

  # Keep registry integration enabled for GHCR-backed workflows.
  registry:
    url: https://ghcr.io

  # Staged integrations must be explicit in prod-shaped values.
  # They remain disabled until promoted.
  infoblox:
    enabled: true
    managed: true
    image: ghcr.io/forwardnetworks/kubevirt/infoblox-vnios:9.0.3-50212
    internalUrl: https://infoblox:443
    oidc:
      # Keep native appliance login/session flow. The OIDC sidecar path causes
      # Infoblox "Session Expired" behavior behind this route.
      enabled: false
    lifecycle:
      # Pin lifecycle controller tooling image in prod for deterministic reconcile behavior.
      image: public.ecr.aws/bitnami/kubectl:1.35.2-debian-12-r1
      # Local VM QA uses a non-production virtctl path; keep license bootstrap
      # disabled until a pinned, validated virtctl image is available.
      license:
        enabled: false
      autoStop:
        enabled: true
        # Keep Infoblox subordinate to core lab/platform workloads by
        # shrinking idle/runtime windows.
        maxIdleMinutes: 30
        maxRunMinutes: 240
    vm:
      cpuCores: 2
      memory: "8Gi"
      cpuModel: host-passthrough
      dedicatedCpuPlacement: false
      isolateEmulatorThread: false
      ioThreadsPolicy: auto
      networkInterfaceMultiqueue: true
      hugepages:
        enabled: false
        pageSize: 2Mi
      managementInterfaceModel: virtio
      managementMacAddress: "52:54:00:10:00:01"
      auxiliaryInterfaceModel: e1000
      # Avoid co-locating Infoblox VM with Forward worker pool by preference.
      # This keeps Forward cold-start/reboots from contending with a 32Gi VM.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: forwardnetworks.com/role
                    operator: DoesNotExist
      multus:
        enabled: true
        createNADs: true
        lan1:
          macAddress: "52:54:00:10:01:01"
          # DHCP plugin is not present on prod worker nodes yet; keep LAN1
          # host-local so VM networking converges reliably.
          ipamType: "host-local"
          isGateway: false
          ipMasq: false
          subnet: "169.254.101.0/24"
        ha:
          macAddress: "52:54:00:10:02:01"
        lan2:
          macAddress: "52:54:00:10:03:01"
  jira:
    enabled: true
    managed: true
  rapid7:
    enabled: true
    managed: true
    image: "ghcr.io/forwardnetworks/rapid7:20260317-r11"
    pullPolicy: "IfNotPresent"
    progressDeadlineSeconds: 3600
    priorityClassName: "skyforge-integrations"
    backendTLS:
      enabled: false
      hostname: "rapid7"
      caConfigMapName: "rapid7-ca"
  elk:
    enabled: true
    managed: true
    priorityClassName: "skyforge-integrations"
    env:
      ELASTICSEARCH_START: "1"
      LOGSTASH_START: "1"
      KIBANA_START: "1"
      SERVER_BASEPATH: "/elk"
      SERVER_REWRITEBASEPATH: "true"
      ES_JAVA_OPTS: "-Xms1024m -Xmx1024m"
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
      NODE_OPTIONS: "--max-old-space-size=512"
  keda:
    enabled: true
    requireCRD: true
    # Keep heavyweight integrations subordinate and cap at one replica.
    # Scale from zero based on activity signals. For services without native
    # request metrics in this stack, we keep an explicit Wake control in UI/API.
    netbox:
      enabled: true
      pollingInterval: 30
      cooldownPeriod: 3600
      minReplicaCount: 0
      maxReplicaCount: 1
      triggers:
        - type: prometheus
          metadata:
            serverAddress: "http://skyforge-prometheus.skyforge.svc.cluster.local:9090/prometheus"
            metricName: "netbox_manual_wake"
            query: "vector(0)"
            activationThreshold: "0.01"
            threshold: "0.1"
    nautobot:
      enabled: true
      pollingInterval: 30
      cooldownPeriod: 3600
      minReplicaCount: 0
      maxReplicaCount: 1
      triggers:
        - type: prometheus
          metadata:
            serverAddress: "http://skyforge-prometheus.skyforge.svc.cluster.local:9090/prometheus"
            metricName: "nautobot_manual_wake"
            query: "vector(0)"
            activationThreshold: "0.01"
            threshold: "0.1"
    rapid7:
      enabled: true
      pollingInterval: 30
      cooldownPeriod: 300
      minReplicaCount: 0
      maxReplicaCount: 1
      triggers:
        - type: prometheus
          metadata:
            serverAddress: "http://skyforge-prometheus.skyforge.svc.cluster.local:9090/prometheus"
            metricName: "rapid7_proxy_rps"
            query: "sum(rate(envoy_http_downstream_rq_total{envoy_http_conn_manager_prefix='ingress_http',pod=~'rapid7-sso-proxy-.*'}[2m]))"
            activationThreshold: "0.01"
            threshold: "0.1"
    elkProxy:
      enabled: true
      pollingInterval: 30
      cooldownPeriod: 300
      minReplicaCount: 0
      maxReplicaCount: 1
      triggers:
        - type: prometheus
          metadata:
            serverAddress: "http://skyforge-prometheus.skyforge.svc.cluster.local:9090/prometheus"
            metricName: "elk_proxy_rps"
            query: "sum(rate(envoy_http_downstream_rq_total{envoy_http_conn_manager_prefix='ingress_http',pod=~'elk-sso-proxy-.*'}[2m]))"
            activationThreshold: "0.01"
            threshold: "0.1"

  # Forward in-cluster collector image + pull credentials.
  # Pin to a concrete tag to avoid drifting when `latest` is retagged.
  forward:
    enabled: true
  forwardCollector:
    image: harbor.local.forwardnetworks.com/forward/fwd_collector:26.3.3-02
    imagePullSecretName: ""
    imagePullSecretNamespace: ""
  forwardCluster:
    enabled: true
    hostname: "skyforge-fwd.local.forwardnetworks.com"
    tlsSecretName: "proxy-tls-fwd"
    serviceName: "fwd-appserver"
    serviceNamespace: "forward"
    servicePort: 8080
    nodeRoleReconciler:
      enabled: true
      schedule: "*/1 * * * *"
      managedNodes:
        - "skyforge-worker-1"
        - "skyforge-worker-2"
        - "skyforge-worker-3"
        - "skyforge-worker-4"
        - "skyforge-worker-5"
      nodeRoles:
        master:
          - "skyforge-worker-2"
        monitoring:
          - "skyforge-worker-2"
        compute:
          - "skyforge-worker-2"
          - "skyforge-worker-3"
          - "skyforge-worker-4"
          - "skyforge-worker-5"
        search:
          - "skyforge-worker-2"
          - "skyforge-worker-3"
          - "skyforge-worker-4"
          - "skyforge-worker-5"
        forward:
          - "skyforge-worker-1"
          - "skyforge-worker-2"
          - "skyforge-worker-3"
          - "skyforge-worker-4"
          - "skyforge-worker-5"
  observability:
    enabled: true
    managed:
      enabled: true
    dashboards:
      enabled: true

  # Enable Gitea provisioning for blueprint-backed workflows.
  # API URL is in-cluster; UI URL is the SSO-proxied external path.
  gitea:
    apiUrl: http://gitea:3000/api/v1
    url: /git

  # Pin the single netlab runtime image used by both create/apply phases.
  netlab:
    image: "ghcr.io/forwardnetworks/skyforge-netlab:20260325-vsrx-transitional-r9"
    pullPolicy: "IfNotPresent"
    runtimePrepull:
      enabled: true

  # Skyforge deploys in-cluster topologies through KNE.
  kne:
    enabled: true
    meshnetMode: grpc
    controllers:
      enabled: true

  worker:
    priorityClassName: "skyforge-core"
    replicas: 1
    placement:
      poolLabelKey: "skyforge.forwardnetworks.com/pool-class"
      preferredPoolClass: "app"
      pools:
        - control
        - app
        - lab
      poolWeight: 100
      requiredPoolClass: "app"
      requiredAntiAffinity: true
      nodeSelector: {}
      tolerations: []
      affinity: {}
    autoscaling:
      enabled: false
    pdb:
      enabled: true
      minAvailable: 1
    tuning:
      interactiveConcurrency: 8
      interactiveQueueSize: 64
      backgroundConcurrency: 2
      backgroundQueueSize: 16
      heartbeatIntervalSeconds: 30
      reconcileQueuedIntervalSeconds: 30
      reconcileRunningIntervalSeconds: 300
      activationIntervalSeconds: 20
      activationMinQueuedAgeSeconds: 20
      activationBatchSize: 200
      diagStaleHeartbeatSeconds: 120
      diagOldestQueuedSeconds: 300

  server:
    priorityClassName: "skyforge-core"
    placement:
      poolLabelKey: "skyforge.forwardnetworks.com/pool-class"
      pools:
        - app
      poolWeight: 100
      requiredPoolClass: "app"
      requiredAntiAffinity: true
      nodeSelector: {}
      tolerations: []
      affinity: {}

images:
  # Pin images in prod so upgrades are repeatable (avoid implicit "latest").
  skyforgeServer: "ghcr.io/forwardnetworks/skyforge-server:20260329-forward-bridge-selfheal-r4"
  # Worker can run from the same image tag as the API container.
  skyforgeServerWorker: "ghcr.io/forwardnetworks/skyforge-server:20260329-forward-bridge-selfheal-r4-worker"
  atlas: "ghcr.io/forwardnetworks/atlas:1.1.6-alpine"
  # Shared kubectl image pin used by lifecycle jobs when integration-specific image is unset.
  kubectl: "public.ecr.aws/bitnami/kubectl:1.35.2-debian-12-r1"

kubernetes:
  # Ensure private GHCR images can be pulled in the release namespace.
  imagePullSecrets: ["ghcr-pull"]

secrets:
  # Production/OSS baseline: secrets are pre-created in-cluster.
  create: false
  validatePrecreated: true
