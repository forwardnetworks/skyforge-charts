{{- $publicTunnel := default (dict) .Values.skyforge.publicTunnel -}}
{{- $cloudflare := default (dict) $publicTunnel.cloudflare -}}
{{- $provider := lower (trim (default "none" $publicTunnel.provider)) -}}
{{- if eq $provider "cloudflare" -}}
{{- $controllerNamespace := default "cloudflare-gateway" $cloudflare.controllerNamespace -}}
{{- $controllerName := printf "%s-cloudflare-gateway-controller" (include "skyforge.fullname" .) | trunc 63 | trimSuffix "-" -}}
{{- $serviceAccountName := $controllerName -}}
{{- $clusterRoleName := printf "%s-gatewayclass-role" $controllerName | trunc 63 | trimSuffix "-" -}}
{{- $clusterRoleBindingName := printf "%s-gatewayclass-rolebinding" $controllerName | trunc 63 | trimSuffix "-" -}}
{{- $namespaceRoleName := printf "%s-manager-role" $controllerName | trunc 63 | trimSuffix "-" -}}
{{- $namespaceRoleBindingName := printf "%s-manager-rolebinding" $controllerName | trunc 63 | trimSuffix "-" -}}
{{- $leaderRoleName := printf "%s-leader-election-role" $controllerName | trunc 63 | trimSuffix "-" -}}
{{- $leaderRoleBindingName := printf "%s-leader-election-rolebinding" $controllerName | trunc 63 | trimSuffix "-" -}}
{{- $gatewayClassName := default "cloudflare" $cloudflare.gatewayClassName -}}
{{- $gatewayName := default "skyforge-public" $cloudflare.gatewayName -}}
{{- $bridgeName := printf "%s-cloudflare-bridge" (include "skyforge.fullname" .) | trunc 63 | trimSuffix "-" -}}
{{- $bridgeConfigName := printf "%s-config" $bridgeName | trunc 63 | trimSuffix "-" -}}
{{- $routeName := printf "%s-cloudflare" (include "skyforge.fullname" .) | trunc 63 | trimSuffix "-" -}}
{{- $mainHost := .Values.skyforge.hostname -}}
{{- $gatewayAdditionalHostnames := .Values.skyforge.gateway.additionalHostnames | default (list) -}}
{{- $forwardEnabled := default false .Values.skyforge.forwardCluster.enabled -}}
{{- $forwardHost := default $mainHost .Values.skyforge.forwardCluster.hostname -}}
{{- $forwardAdditionalHostnames := .Values.skyforge.forwardCluster.additionalHostnames | default (list) -}}
{{- if ne $controllerNamespace .Release.Namespace }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $controllerNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-tunnel-controller
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $serviceAccountName }}
  namespace: {{ $controllerNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-tunnel-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $clusterRoleName }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-tunnel-controller
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "delete", "get", "list", "update", "watch"]
  - apiGroups: [""]
    resources: ["configmaps", "events", "secrets", "services"]
    verbs: ["create", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses", "gateways", "httproutes"]
    verbs: ["get", "list", "update", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses/finalizers", "gatewayclasses/status", "gateways/finalizers", "gateways/status"]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $clusterRoleBindingName }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-tunnel-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $clusterRoleName }}
subjects:
  - kind: ServiceAccount
    name: {{ $serviceAccountName }}
    namespace: {{ $controllerNamespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $namespaceRoleName }}
  namespace: {{ $controllerNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-tunnel-controller
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "delete", "get", "list", "update", "watch"]
  - apiGroups: [""]
    resources: ["configmaps", "events", "secrets", "services"]
    verbs: ["create", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes"]
    verbs: ["get", "list", "update", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways/finalizers", "gateways/status"]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $namespaceRoleBindingName }}
  namespace: {{ $controllerNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-tunnel-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $namespaceRoleName }}
subjects:
  - kind: ServiceAccount
    name: {{ $serviceAccountName }}
    namespace: {{ $controllerNamespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $leaderRoleName }}
  namespace: {{ $controllerNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-tunnel-controller
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $leaderRoleBindingName }}
  namespace: {{ $controllerNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-tunnel-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $leaderRoleName }}
subjects:
  - kind: ServiceAccount
    name: {{ $serviceAccountName }}
    namespace: {{ $controllerNamespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $controllerName }}
  namespace: {{ $controllerNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-tunnel-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $controllerName }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: {{ $controllerName }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: public-tunnel-controller
    spec:
      serviceAccountName: {{ $serviceAccountName }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- $pullSecrets := .Values.kubernetes.imagePullSecrets -}}
      {{- if $pullSecrets }}
      imagePullSecrets:
      {{- range $name := $pullSecrets }}
        - name: {{ $name | quote }}
      {{- end }}
      {{- end }}
      containers:
        - name: manager
          image: {{ default "ghcr.io/pl4nty/cloudflare-kubernetes-gateway:v0.8.2" $cloudflare.image | quote }}
          imagePullPolicy: {{ default "IfNotPresent" $cloudflare.imagePullPolicy | quote }}
          command:
            - /ko-app/cmd
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=0
            - --cluster-resource-namespace={{ $controllerNamespace }}
            - --zap-log-level={{ default "info" $cloudflare.logLevel }}
          env:
            - name: GATEWAY_IMAGE
              value: docker.io/cloudflare/cloudflared:2026.2.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with $cloudflare.resources }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
      terminationGracePeriodSeconds: 10
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ $gatewayClassName }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-tunnel-controller
spec:
  controllerName: {{ default "github.com/pl4nty/cloudflare-kubernetes-gateway" $cloudflare.controllerName | quote }}
  parametersRef:
    group: ""
    kind: Secret
    namespace: {{ $controllerNamespace }}
    name: {{ default "" $cloudflare.credentialsSecretName | quote }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $gatewayName }}
  namespace: {{ $controllerNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-tunnel
spec:
  gatewayClassName: {{ $gatewayClassName | quote }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $bridgeConfigName }}
  namespace: {{ $controllerNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-tunnel-bridge
data:
  nginx.conf: |
    pid /tmp/nginx.pid;
    worker_processes 1;
    events { worker_connections 1024; }
    http {
      server {
        listen 8080;
        server_name _;

        location / {
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-Proto https;
          proxy_set_header X-Forwarded-Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection upgrade;
          proxy_ssl_server_name on;
          proxy_ssl_name $host;
          proxy_ssl_verify off;
          proxy_pass https://cilium-gateway-skyforge.{{ .Release.Namespace }}.svc.cluster.local:443;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $bridgeName }}
  namespace: {{ $controllerNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-tunnel-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $bridgeName }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $bridgeName }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: public-tunnel-bridge
      annotations:
        checksum/nginx-config: {{ printf "%s|%s|%d" $mainHost $forwardHost (len $gatewayAdditionalHostnames) | sha256sum }}
    spec:
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: {{ $bridgeConfigName }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $bridgeName }}
  namespace: {{ $controllerNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-tunnel-bridge
spec:
  selector:
    app.kubernetes.io/name: {{ $bridgeName }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $routeName }}
  namespace: {{ $controllerNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: public-tunnel
spec:
  parentRefs:
    - name: {{ $gatewayName }}
  hostnames:
    - {{ $mainHost | quote }}
    {{- if and $forwardEnabled (ne $forwardHost $mainHost) }}
    - {{ $forwardHost | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $bridgeName }}
          port: 8080
{{- end }}
