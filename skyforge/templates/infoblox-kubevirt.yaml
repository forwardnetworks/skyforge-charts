{{- if and .Values.skyforge.infoblox.enabled .Values.skyforge.infoblox.managed }}
{{- if not (.Capabilities.APIVersions.Has "kubevirt.io/v1/VirtualMachine") -}}
{{- fail "skyforge.infoblox.managed=true requires KubeVirt CRDs (kubevirt.io/v1)" -}}
{{- end -}}
{{- $name := default "infoblox" .Values.skyforge.infoblox.serviceName -}}
{{- $servicePort := default 443 .Values.skyforge.infoblox.servicePort -}}
{{- $pullPolicy := default "IfNotPresent" .Values.skyforge.infoblox.pullPolicy -}}
{{- $cpuCores := default 4 .Values.skyforge.infoblox.vm.cpuCores -}}
{{- $memory := default "32Gi" .Values.skyforge.infoblox.vm.memory -}}
{{- $managementInterfaceModel := default "virtio" .Values.skyforge.infoblox.vm.managementInterfaceModel -}}
{{- $auxiliaryInterfaceModel := default $managementInterfaceModel .Values.skyforge.infoblox.vm.auxiliaryInterfaceModel -}}
{{- $podBinding := lower (default "masquerade" .Values.skyforge.infoblox.vm.podNetworkBinding) -}}
{{- if and (ne $podBinding "masquerade") (ne $podBinding "bridge") -}}
{{- fail "skyforge.infoblox.vm.podNetworkBinding must be one of: masquerade, bridge" -}}
{{- end -}}
{{- $multusEnabled := false -}}
{{- if and (hasKey .Values.skyforge.infoblox.vm "multus") (hasKey .Values.skyforge.infoblox.vm.multus "enabled") -}}
{{- $multusEnabled = .Values.skyforge.infoblox.vm.multus.enabled -}}
{{- end -}}
{{- $multus := default dict .Values.skyforge.infoblox.vm.multus -}}
{{- $lan1 := default dict (get $multus "lan1") -}}
{{- $ha := default dict (get $multus "ha") -}}
{{- $lan2 := default dict (get $multus "lan2") -}}
{{- $lan1NetworkName := default "infoblox-lan1" (get $lan1 "networkName") -}}
{{- $haNetworkName := default "infoblox-ha" (get $ha "networkName") -}}
{{- $lan2NetworkName := default "infoblox-lan2" (get $lan2 "networkName") -}}
{{- $defaultMac := default "" .Values.skyforge.infoblox.vm.managementMacAddress -}}
{{- $lan1Mac := default "" (get $lan1 "macAddress") -}}
{{- $haMac := default "" (get $ha "macAddress") -}}
{{- $lan2Mac := default "" (get $lan2 "macAddress") -}}
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: {{ $name }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: infoblox
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: infoblox
        kubevirt.io/domain: {{ $name }}
    spec:
      terminationGracePeriodSeconds: 180
      domain:
        cpu:
          cores: {{ $cpuCores }}
        resources:
          requests:
            memory: {{ $memory | quote }}
        devices:
          autoattachSerialConsole: true
          disks:
            - name: rootdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              {{- if eq $podBinding "bridge" }}
              bridge: {}
              {{- else }}
              masquerade: {}
              {{- end }}
              model: {{ $managementInterfaceModel | quote }}
              {{- if $defaultMac }}
              macAddress: {{ $defaultMac | quote }}
              {{- end }}
              {{- if eq $podBinding "masquerade" }}
              ports:
                - name: https
                  port: {{ $servicePort }}
                - name: http
                  port: 80
              {{- end }}
            {{- if $multusEnabled }}
            - name: lan1
              bridge: {}
              model: {{ $auxiliaryInterfaceModel | quote }}
              {{- if $lan1Mac }}
              macAddress: {{ $lan1Mac | quote }}
              {{- end }}
            - name: ha
              bridge: {}
              model: {{ $auxiliaryInterfaceModel | quote }}
              {{- if $haMac }}
              macAddress: {{ $haMac | quote }}
              {{- end }}
            - name: lan2
              bridge: {}
              model: {{ $auxiliaryInterfaceModel | quote }}
              {{- if $lan2Mac }}
              macAddress: {{ $lan2Mac | quote }}
              {{- end }}
            {{- end }}
      networks:
        - name: default
          pod: {}
        {{- if $multusEnabled }}
        - name: lan1
          multus:
            networkName: {{ $lan1NetworkName | quote }}
        - name: ha
          multus:
            networkName: {{ $haNetworkName | quote }}
        - name: lan2
          multus:
            networkName: {{ $lan2NetworkName | quote }}
        {{- end }}
      volumes:
        - name: rootdisk
          containerDisk:
            image: {{ required "skyforge.infoblox.image is required when skyforge.infoblox.managed=true" .Values.skyforge.infoblox.image | quote }}
            imagePullPolicy: {{ $pullPolicy | quote }}
      {{- with .Values.skyforge.infoblox.vm.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.skyforge.infoblox.vm.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
      {{- end }}
{{- if not .Values.skyforge.infoblox.proxyEnabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: infoblox
spec:
  type: ClusterIP
  selector:
    kubevirt.io/domain: {{ $name }}
  ports:
    - name: https
      appProtocol: https
      protocol: TCP
      port: {{ $servicePort }}
      targetPort: {{ $servicePort }}
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
{{- end }}
{{- end }}
