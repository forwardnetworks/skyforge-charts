{{- if .Values.skyforge.kne.enabled -}}
{{- $mode := default "grpc" .Values.skyforge.kne.meshnetMode -}}
{{- if and .Values.kubernetes.imagePullSecret.create (ne (trim .Values.kubernetes.imagePullSecret.dockerConfigJson) "") -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.kubernetes.imagePullSecret.name | default "ghcr-pull" | quote }}
  namespace: meshnet
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.kubernetes.imagePullSecret.dockerConfigJson | b64enc | quote }}
{{- end }}
{{ if eq $mode "grpc" -}}
{{ tpl (.Files.Get "files/manifests/kne-meshnet-grpc.yaml") . }}
{{- else if eq $mode "vxlan" -}}
{{ tpl (.Files.Get "files/manifests/kne-meshnet-vxlan.yaml") . }}
{{- end -}}
{{- end -}}
