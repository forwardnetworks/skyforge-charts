{{- if .Values.skyforge.coder.enabled -}}
{{- $coderBasePath := default "/coder" .Values.skyforge.coder.basePath | trim -}}
{{- if eq $coderBasePath "" }}{{- $coderBasePath = "/coder" -}}{{- end }}
{{- if not (hasPrefix "/" $coderBasePath) }}{{- $coderBasePath = printf "/%s" $coderBasePath -}}{{- end }}
{{- if and (ne $coderBasePath "/") (hasSuffix "/" $coderBasePath) }}{{- $coderBasePath = trimSuffix "/" $coderBasePath -}}{{- end }}
{{- $coderAccessURL := printf "https://%s%s" .Values.skyforge.hostname $coderBasePath -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: coder
  name: coder
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: coder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coder
    spec:
      automountServiceAccountToken: true
      serviceAccountName: coder
{{- with .Values.skyforge.coder.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
      initContainers:
        - name: wait-for-dex
          image: public.ecr.aws/docker/library/alpine:latest
          command:
            - sh
            - -c
            - |
              set -eu
              for i in $(seq 1 90); do
                if nc -z dex 5556 >/dev/null 2>&1; then
                  exit 0
                fi
                sleep 2
              done
              echo "dex did not become reachable in time" >&2
              exit 1
      containers:
        - name: coder
          image: {{ .Values.images.coder | quote }}
          env:
            - name: CODER_HTTP_ADDRESS
              value: "0.0.0.0:7080"
            - name: CODER_BASE_PATH
              value: {{ $coderBasePath | quote }}
            - name: CODER_ACCESS_URL
              value: {{ $coderAccessURL | quote }}
            - name: CODER_PG_CONNECTION_URL
              valueFrom:
                secretKeyRef:
                  name: coder-pg-connection-url
                  key: coder-pg-connection-url
            - name: CODER_OIDC_ISSUER_URL
              value: "http://dex:5556/dex"
            - name: CODER_OIDC_CLIENT_ID
              value: "coder"
            - name: CODER_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dex-client-coder-secret
                  key: dex-client-coder-secret
            - name: CODER_DANGEROUS_OIDC_SKIP_ISSUER_CHECKS
              value: "true"
            - name: CODER_OIDC_AUTO_LOGIN
              value: {{ .Values.skyforge.coder.oidcAutoLogin | quote }}
            - name: CODER_OIDC_ALLOW_SIGNUPS
              value: {{ .Values.skyforge.coder.oidcAllowSignups | quote }}
            - name: CODER_OIDC_USERNAME_FIELD
              value: {{ .Values.skyforge.coder.oidcUsernameField | quote }}
            - name: CODER_OIDC_SIGN_IN_TEXT
              value: {{ .Values.skyforge.coder.oidcSignInText | quote }}
            - name: CODER_DISABLE_PASSWORD_AUTH
              value: {{ .Values.skyforge.coder.disablePasswordAuth | quote }}
            - name: CODER_OAUTH2_GITHUB_DEFAULT_PROVIDER_ENABLE
              value: "false"
          ports:
            - containerPort: 7080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /healthz
              port: 7080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - mountPath: /var/lib/coder
              name: coder-data
      volumes:
        - name: coder-data
          persistentVolumeClaim:
            claimName: coder-data
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: coder
  name: coder
spec:
  ports:
    - name: http
      port: 7080
      targetPort: 7080
  selector:
    app.kubernetes.io/name: coder
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/name: coder-data
  name: coder-data
spec:
  accessModes:
    - ReadWriteOnce
  {{- with .Values.skyforge.coder.storage.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: 5Gi
{{- end }}
