{{- $cfg := dict -}}
{{- if .Values.skyforge.encoreCfg.workerJson }}
{{- $cfg = (fromJson (.Values.skyforge.encoreCfg.workerJson | trim)) -}}
{{- end }}
{{- $_ := set $cfg "TaskWorkerEnabled" true -}}
{{- $netlab := merge (get $cfg "Netlab" | default (dict)) (dict
  "SSHUser" (default "" .Values.skyforge.netlab.sshUser)
  "StateRoot" (default "" .Values.skyforge.netlab.stateRoot)
) -}}
{{- $_ := set $cfg "Netlab" $netlab -}}
{{- $userScopes := merge (get $cfg "UserScopes" | default (dict)) (dict
  "DataDir" (default "/var/lib/skyforge" .Values.skyforge.userDataDir)
  "GiteaAPIURL" (default "" .Values.skyforge.gitea.apiUrl | trimSuffix "/")
  "GiteaUsername" (default "" .Values.skyforge.gitea.username)
  "GiteaRepoPrivate" .Values.skyforge.gitea.repoPrivate
  "DeleteMode" (default "live" .Values.skyforge.userDeleteMode)
) -}}
{{- $_ := set $cfg "UserScopes" $userScopes -}}
{{- $objectStorage := merge (get $cfg "ObjectStorage" | default (dict)) (dict
  "Endpoint" (default "s3gw:7480" .Values.skyforge.objectStorage.endpoint | trimSuffix "/")
  "UseSSL" (default false .Values.skyforge.objectStorage.useSsl)
) -}}
{{- $_ := set $cfg "ObjectStorage" $objectStorage -}}
{{- $terraform := merge (get $cfg "Terraform" | default (dict)) (dict
  "BinaryPath" (default "" .Values.skyforge.terraform.path)
  "Version" (default "" .Values.skyforge.terraform.version)
  "URL" (default "" .Values.skyforge.terraform.url)
) -}}
{{- $_ := set $cfg "Terraform" $terraform -}}
{{- $netlabGenerator := merge (get $cfg "NetlabGenerator" | default (dict)) (dict
  "C9sGeneratorMode" "k8s"
  "GeneratorImage" (required "skyforge.netlabC9s.image is required" .Values.skyforge.netlabC9s.image)
  "PullPolicy" (default "IfNotPresent" .Values.skyforge.netlabC9s.pullPolicy)
) -}}
{{- $_ := set $cfg "NetlabGenerator" $netlabGenerator -}}
{{- $worker := merge (get $cfg "Worker" | default (dict)) (dict
  "InteractiveConcurrency" (default 8 .Values.skyforge.worker.tuning.interactiveConcurrency)
  "InteractiveQueueSize" (default 64 .Values.skyforge.worker.tuning.interactiveQueueSize)
  "BackgroundConcurrency" (default 2 .Values.skyforge.worker.tuning.backgroundConcurrency)
  "BackgroundQueueSize" (default 16 .Values.skyforge.worker.tuning.backgroundQueueSize)
  "HeartbeatIntervalSeconds" (default 30 .Values.skyforge.worker.tuning.heartbeatIntervalSeconds)
  "ReconcileQueuedIntervalSeconds" (default 30 .Values.skyforge.worker.tuning.reconcileQueuedIntervalSeconds)
  "ReconcileRunningIntervalSeconds" (default 300 .Values.skyforge.worker.tuning.reconcileRunningIntervalSeconds)
  "ActivationIntervalSeconds" (default 20 .Values.skyforge.worker.tuning.activationIntervalSeconds)
  "ActivationMinQueuedAgeSeconds" (default 20 .Values.skyforge.worker.tuning.activationMinQueuedAgeSeconds)
  "ActivationBatchSize" (default 200 .Values.skyforge.worker.tuning.activationBatchSize)
  "DiagStaleHeartbeatSeconds" (default 120 .Values.skyforge.worker.tuning.diagStaleHeartbeatSeconds)
  "DiagOldestQueuedSeconds" (default 300 .Values.skyforge.worker.tuning.diagOldestQueuedSeconds)
) -}}
{{- $_ := set $cfg "Worker" $worker -}}
{{- $forward := merge (get $cfg "Forward" | default (dict)) (dict
  "SNMPPlaceholderEnabled" .Values.skyforge.forward.snmpPlaceholderEnabled
) -}}
{{- $_ := set $cfg "Forward" $forward -}}
{{- $forwardCollector := merge (get $cfg "ForwardCollector" | default (dict)) (dict
  "Image" (default "" .Values.skyforge.forwardCollector.image)
  "PullPolicy" (default "IfNotPresent" .Values.skyforge.forwardCollector.pullPolicy)
  "ImagePullSecretName" (default "" .Values.skyforge.forwardCollector.imagePullSecretName)
  "ImagePullSecretNamespace" (default "" .Values.skyforge.forwardCollector.imagePullSecretNamespace)
  "HeapSizeGB" (default 0 .Values.skyforge.forwardCollector.heapSizeGB)
) -}}
{{- $_ := set $cfg "ForwardCollector" $forwardCollector -}}
{{- $features := merge (get $cfg "Features" | default (dict)) (dict
  "GiteaEnabled" .Values.skyforge.gitea.enabled
  "MinioEnabled" .Values.skyforge.s3gw.enabled
  "DexEnabled" .Values.skyforge.dex.enabled
  "CoderEnabled" .Values.skyforge.coder.enabled
  "YaadeEnabled" .Values.skyforge.yaade.enabled
  "SwaggerUIEnabled" false
  "ForwardEnabled" .Values.skyforge.forward.enabled
  "NetboxEnabled" .Values.skyforge.netbox.enabled
  "NautobotEnabled" .Values.skyforge.nautobot.enabled
  "DNSEnabled" .Values.skyforge.dns.enabled
) -}}
{{- $_ := set $cfg "Features" $features -}}
{{- $kube := merge (get $cfg "Kubernetes" | default (dict)) (dict
  "ImagePullSecretName" (default "ghcr-pull" .Values.kubernetes.imagePullSecret.name)
  "ImagePullSecretNamespace" .Release.Namespace
) -}}
{{- $_ := set $cfg "Kubernetes" $kube -}}
apiVersion: v1
kind: Secret
metadata:
  name: skyforge-encore-cfg-worker
type: Opaque
stringData:
  # NOTE: This is the typed Encore config payload for the `worker` service.
  # Encore expects ENCORE_CFG_<SERVICE> to contain a base64url-encoded JSON object
  # without padding. (Encore uses base64.RawURLEncoding.)
  # Keep it non-secret: do not include passwords/tokens here.
  ENCORE_CFG_WORKER: {{ toJson $cfg | b64enc | replace "+" "-" | replace "/" "_" | trimAll "=" | quote }}
