{{- $pullSecrets := .Values.kubernetes.imagePullSecrets -}}
{{- $existingDefault := lookup "v1" "ServiceAccount" .Release.Namespace "default" -}}
{{- if and $pullSecrets (not $existingDefault) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
imagePullSecrets:
{{- range $name := $pullSecrets }}
  - name: {{ $name | quote }}
{{- end }}
{{- end }}
