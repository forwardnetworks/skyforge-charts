{{- $ngrok := .Values.skyforge.publicTunnel.ngrok -}}
{{- if $ngrok.enabled }}
{{- $targetAddress := trim (default "" $ngrok.targetAddress) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ngrok-tunnel
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ngrok-tunnel
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ngrok-tunnel
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: edge-tunnel
    spec:
      automountServiceAccountToken: false
      {{- if $ngrok.hostNetwork }}
      hostNetwork: true
      {{- end }}
      {{- if $ngrok.dnsPolicy }}
      dnsPolicy: {{ $ngrok.dnsPolicy | quote }}
      {{- end }}
      {{- $pullSecrets := .Values.kubernetes.imagePullSecrets -}}
      {{- if $pullSecrets }}
      imagePullSecrets:
      {{- range $name := $pullSecrets }}
        - name: {{ $name | quote }}
      {{- end }}
      {{- end }}
      containers:
        - name: ngrok
          image: {{ required "skyforge.publicTunnel.ngrok.image is required" $ngrok.image | quote }}
          imagePullPolicy: {{ default "IfNotPresent" $ngrok.imagePullPolicy | quote }}
          env:
            - name: NGROK_AUTHTOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ required "skyforge.publicTunnel.ngrok.authtokenSecretName is required" $ngrok.authtokenSecretName | quote }}
                  key: {{ default "authtoken" $ngrok.authtokenSecretKey | quote }}
          {{- range $k, $v := (default dict $ngrok.env) }}
            - name: {{ $k | quote }}
              value: {{ $v | quote }}
          {{- end }}
          args:
            - "http"
            {{- if $targetAddress }}
            - "{{ $targetAddress }}"
            {{- else }}
            - "{{ required "skyforge.publicTunnel.ngrok.targetServiceName is required" $ngrok.targetServiceName }}.{{ default "kube-system" $ngrok.targetServiceNamespace }}.svc.cluster.local:{{ default 80 $ngrok.targetServicePort }}"
            {{- end }}
            - "--log=stdout"
          {{- range $arg := (default (list) $ngrok.extraArgs) }}
            - {{ $arg | quote }}
          {{- end }}
          {{- with $ngrok.resources }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
