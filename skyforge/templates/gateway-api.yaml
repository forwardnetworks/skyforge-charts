{{- $host := .Values.skyforge.hostname -}}
{{- $giteaEnabled := .Values.skyforge.gitea.enabled -}}
{{- $yaadeEnabled := .Values.skyforge.yaade.enabled -}}
{{- $redocEnabled := .Values.skyforge.redoc.enabled -}}
{{- $oidcGatewayEnabled := .Values.skyforge.dex.enabled -}}
{{- $coderEnabled := .Values.skyforge.coder.enabled -}}
{{- $filesBucket := .Values.skyforge.objectStorage.filesBucket | default "skyforge-files" -}}
{{- $gatewayAddresses := .Values.skyforge.gateway.addresses | default (list) -}}
{{- $gatewayAdditionalHostnames := .Values.skyforge.gateway.additionalHostnames | default (list) -}}
{{- $forwardClusterEnabled := .Values.skyforge.forwardCluster.enabled -}}
{{- $forwardHost := default $host .Values.skyforge.forwardCluster.hostname -}}
{{- $forwardAdditionalHostnames := .Values.skyforge.forwardCluster.additionalHostnames | default (list) -}}
{{- $forwardTlsSecretName := default "proxy-tls-fwd" .Values.skyforge.forwardCluster.tlsSecretName -}}
{{- $forwardSvcName := default "fwd-appserver" .Values.skyforge.forwardCluster.serviceName -}}
{{- $forwardSvcNamespace := default "forward" .Values.skyforge.forwardCluster.serviceNamespace -}}
{{- $forwardSvcPort := default 8080 .Values.skyforge.forwardCluster.servicePort -}}
{{- $forwardCrossNamespace := and $forwardClusterEnabled (ne $forwardSvcNamespace .Release.Namespace) -}}
{{- $publicTunnel := default (dict) .Values.skyforge.publicTunnel -}}
{{- $publicTunnelProvider := lower (trim (default "none" $publicTunnel.provider)) -}}
{{- $cloudflareGatewayName := default "skyforge-public" .Values.skyforge.publicTunnel.cloudflare.gatewayName -}}
{{- $obsEnabled := default false .Values.skyforge.observability.enabled -}}
{{- $obsNamespace := default .Release.Namespace .Values.skyforge.observability.namespace -}}
{{- $obsGrafanaPrefix := default "/grafana" .Values.skyforge.observability.grafana.externalPrefix -}}
{{- $obsGrafanaSvcName := default "skyforge-grafana" .Values.skyforge.observability.grafana.serviceName -}}
{{- $obsGrafanaSvcPort := default 3000 .Values.skyforge.observability.grafana.servicePort -}}
{{- $obsGrafanaRewriteTarget := default "/" .Values.skyforge.observability.grafana.rewritePrefixMatch -}}
{{- $obsPromPrefix := default "/prometheus" .Values.skyforge.observability.prometheus.externalPrefix -}}
{{- $obsPromSvcName := default "skyforge-prometheus" .Values.skyforge.observability.prometheus.serviceName -}}
{{- $obsPromSvcPort := default 9090 .Values.skyforge.observability.prometheus.servicePort -}}
{{- $obsPromRewriteTarget := default "/" .Values.skyforge.observability.prometheus.rewritePrefixMatch -}}

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: skyforge
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  gatewayClassName: cilium
  {{- if gt (len $gatewayAddresses) 0 }}
  addresses:
{{ toYaml $gatewayAddresses | nindent 4 }}
  {{- end }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          {{- if $forwardCrossNamespace }}
          from: All
          {{- else }}
          from: Same
          {{- end }}
    {{- if and $forwardClusterEnabled (ne $forwardHost $host) }}
    - name: https-main
      hostname: {{ $host | quote }}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: proxy-tls
      allowedRoutes:
        namespaces:
          {{- if $forwardCrossNamespace }}
          from: All
          {{- else }}
          from: Same
          {{- end }}
    {{- range $index, $name := $gatewayAdditionalHostnames }}
    - name: https-alt-{{ $index }}
      hostname: {{ $name | quote }}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: proxy-tls
      allowedRoutes:
        namespaces:
          {{- if $forwardCrossNamespace }}
          from: All
          {{- else }}
          from: Same
          {{- end }}
    {{- end }}
    - name: https-forward
      hostname: {{ $forwardHost | quote }}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ $forwardTlsSecretName }}
      allowedRoutes:
        namespaces:
          {{- if $forwardCrossNamespace }}
          from: All
          {{- else }}
          from: Same
          {{- end }}
{{- range $index, $name := $forwardAdditionalHostnames }}
    - name: https-forward-alt-{{ $index }}
      hostname: {{ $name | quote }}
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ $forwardTlsSecretName }}
      allowedRoutes:
        namespaces:
          {{- if $forwardCrossNamespace }}
          from: All
          {{- else }}
          from: Same
          {{- end }}
{{- end }}
    {{- else }}
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: proxy-tls
      allowedRoutes:
        namespaces:
          {{- if $forwardCrossNamespace }}
          from: All
          {{- else }}
          from: Same
          {{- end }}
    {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skyforge
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: skyforge
  hostnames:
    - {{ $host | quote }}
    {{- range $name := $gatewayAdditionalHostnames }}
    - {{ $name | quote }}
    {{- end }}
  rules:
    # Core Skyforge endpoints
    - matches:
        - path:
            type: PathPrefix
            value: /assets/skyforge/
      backendRefs:
        - name: skyforge-server
          port: 8085
    - matches:
        - path:
            type: PathPrefix
            value: /healthz
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: skyforge-server
          port: 8085

{{- if $oidcGatewayEnabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /dex
      backendRefs:
        - name: dex
          port: 5556
{{- end }}

    # Root landing: / -> /index.html
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /index.html
      backendRefs:
        - name: skyforge-server
          port: 8085
    # SPA deep-link rewrite for settings routes.
    - matches:
        - path:
            type: Exact
            value: /settings
        - path:
            type: PathPrefix
            value: /settings/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /index.html
      backendRefs:
        - name: skyforge-server
          port: 8085

    # Default catch-all to Skyforge server
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: skyforge-server
          port: 8085
{{- if $forwardClusterEnabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skyforge-forward
  namespace: {{ $forwardSvcNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: skyforge
      namespace: {{ .Release.Namespace }}
  hostnames:
    - {{ $forwardHost | quote }}
    {{- range $name := $forwardAdditionalHostnames }}
    - {{ $name | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: Exact
            value: /login
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: {{ $host | quote }}
            path:
              type: ReplaceFullPath
              replaceFullPath: /api/forward/session?next=%2F
    - matches:
        - path:
            type: PathPrefix
            value: /__skyforge/forward/session
      backendRefs:
        - name: skyforge-server
          namespace: {{ .Release.Namespace }}
          port: 8085
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $forwardSvcName }}
          port: {{ int $forwardSvcPort }}
{{- end }}
{{- if $obsEnabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skyforge-observability
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: skyforge
      namespace: {{ .Release.Namespace }}
  hostnames:
    - {{ $host | quote }}
    {{- range $name := $gatewayAdditionalHostnames }}
    - {{ $name | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ $obsGrafanaPrefix | quote }}
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Prefix
                value: {{ $obsGrafanaPrefix | quote }}
              - name: X-Skyforge-External-Prefix
                value: {{ $obsGrafanaPrefix | quote }}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: {{ $obsGrafanaRewriteTarget | quote }}
      backendRefs:
        - name: {{ $obsGrafanaSvcName }}
          {{- if ne $obsNamespace .Release.Namespace }}
          namespace: {{ $obsNamespace }}
          {{- end }}
          port: {{ int $obsGrafanaSvcPort }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ $obsPromPrefix | quote }}
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Prefix
                value: {{ $obsPromPrefix | quote }}
              - name: X-Skyforge-External-Prefix
                value: {{ $obsPromPrefix | quote }}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: {{ $obsPromRewriteTarget | quote }}
      backendRefs:
        - name: prometheus-sso-proxy
          port: 8080
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skyforge-tools
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: skyforge
  hostnames:
    - {{ $host | quote }}
    {{- range $name := $gatewayAdditionalHostnames }}
    - {{ $name | quote }}
    {{- end }}
  rules:
{{- if .Values.skyforge.s3gw.enabled }}
    # /files/* -> s3gw /<files-bucket>/*
    - matches:
        - path:
            type: PathPrefix
            value: /files/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: {{ printf "/%s/" $filesBucket }}
      backendRefs:
        - name: {{ .Values.skyforge.s3gw.serviceName }}
          port: {{ .Values.skyforge.s3gw.service.port }}
{{- end }}

{{- if $yaadeEnabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /api-testing
      backendRefs:
        - name: yaade
          port: 80
{{- end }}

{{- if .Values.skyforge.netbox.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /netbox/static/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /static/
      backendRefs:
        - name: netbox
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /netbox/media/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /media/
      backendRefs:
        - name: netbox
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /netbox
      backendRefs:
        - name: netbox
          port: 8080
{{- end }}

{{- if .Values.skyforge.nautobot.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /nautobot
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Prefix
                value: /nautobot
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: nautobot
          port: 8080
{{- end }}

{{- if $giteaEnabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /git
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Prefix
                value: /git
              - name: X-Forwarded-Proto
                value: https
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: gitea
          port: 3000
{{- end }}

{{- if $redocEnabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /redoc
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Skyforge-External-Prefix
                value: /redoc
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: redoc
          port: 80
{{- end }}

{{- if $coderEnabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /assets/skyforge
      backendRefs:
        - name: skyforge-server
          port: 8085
    - matches:
        - path:
            type: PathPrefix
            value: /assets
      backendRefs:
        - name: coder
          port: 7080
    - matches:
        - path:
            type: PathPrefix
            value: /favicons
      backendRefs:
        - name: coder
          port: 7080
    - matches:
        - path:
            type: Exact
            value: /coder/launch
      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 302
            path:
              type: ReplaceFullPath
              replaceFullPath: /coder/
    - matches:
        - path:
            type: PathPrefix
            value: /coder
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: coder
          port: 7080
    - matches:
        - path:
            type: PathPrefix
            value: /api/v2
      backendRefs:
        - name: coder
          port: 7080
{{- end }}

{{- if .Values.skyforge.dns.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /dns
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: technitium-dns
          port: 5380
{{- end }}
{{- $toolsExtraEnabled := or .Values.skyforge.infoblox.enabled .Values.skyforge.jira.enabled .Values.skyforge.rapid7.enabled .Values.skyforge.elk.enabled }}
{{- if $toolsExtraEnabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skyforge-tools-extra
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: skyforge
  hostnames:
    - {{ $host | quote }}
  rules:
{{- if .Values.skyforge.infoblox.enabled }}
    {{- $infobloxPrefix := default "/infoblox" .Values.skyforge.infoblox.externalPrefix }}
    {{- $infobloxOIDC := default (dict) .Values.skyforge.infoblox.oidc }}
    {{- $infobloxOIDCEnabled := true }}
    {{- if hasKey $infobloxOIDC "enabled" }}
    {{- $infobloxOIDCEnabled = (index $infobloxOIDC "enabled") }}
    {{- end }}
    {{- $infobloxServiceName := default (default "infoblox" .Values.skyforge.infoblox.serviceName) .Values.skyforge.infoblox.routeServiceName }}
    {{- $infobloxServicePort := default (default 443 .Values.skyforge.infoblox.servicePort) .Values.skyforge.infoblox.routeServicePort }}
    {{- $infobloxRewrite := true }}
    {{- if hasKey .Values.skyforge.infoblox "rewritePrefixToRoot" }}
    {{- $infobloxRewrite = .Values.skyforge.infoblox.rewritePrefixToRoot }}
    {{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ $infobloxPrefix | quote }}
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Prefix
                value: {{ $infobloxPrefix | quote }}
              - name: X-Skyforge-External-Prefix
                value: {{ $infobloxPrefix | quote }}
        {{- if $infobloxRewrite }}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        {{- end }}
      backendRefs:
        {{- if $infobloxOIDCEnabled }}
        - name: infoblox-sso-proxy
          port: 8080
        {{- else }}
        - name: {{ $infobloxServiceName }}
          port: {{ $infobloxServicePort }}
          {{- with .Values.skyforge.infoblox.serviceNamespace }}
          namespace: {{ . }}
          {{- end }}
        {{- end }}
{{- end }}
{{- if .Values.skyforge.jira.enabled }}
    {{- $jiraPrefix := default "/jira" .Values.skyforge.jira.externalPrefix }}
    {{- $jiraOIDC := default (dict) .Values.skyforge.jira.oidc }}
    {{- $jiraOIDCEnabled := true }}
    {{- if hasKey $jiraOIDC "enabled" }}
    {{- $jiraOIDCEnabled = (index $jiraOIDC "enabled") }}
    {{- end }}
    {{- $jiraServiceName := default "jira" .Values.skyforge.jira.serviceName }}
    {{- $jiraServicePort := default 8080 .Values.skyforge.jira.servicePort }}
    {{- $jiraRewrite := true }}
    {{- if hasKey .Values.skyforge.jira "rewritePrefixToRoot" }}
    {{- $jiraRewrite = .Values.skyforge.jira.rewritePrefixToRoot }}
    {{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ $jiraPrefix | quote }}
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Prefix
                value: {{ $jiraPrefix | quote }}
              - name: X-Skyforge-External-Prefix
                value: {{ $jiraPrefix | quote }}
        {{- if $jiraRewrite }}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        {{- end }}
      backendRefs:
        {{- if $jiraOIDCEnabled }}
        - name: jira-sso-proxy
          port: 8080
        {{- else }}
        - name: {{ $jiraServiceName }}
          port: {{ $jiraServicePort }}
          {{- with .Values.skyforge.jira.serviceNamespace }}
          namespace: {{ . }}
          {{- end }}
        {{- end }}
{{- end }}
{{- if .Values.skyforge.rapid7.enabled }}
    {{- $rapid7Prefix := default "/rapid7" .Values.skyforge.rapid7.externalPrefix }}
    {{- $rapid7OIDC := default (dict) .Values.skyforge.rapid7.oidc }}
    {{- $rapid7OIDCEnabled := true }}
    {{- if hasKey $rapid7OIDC "enabled" }}
    {{- $rapid7OIDCEnabled = (index $rapid7OIDC "enabled") }}
    {{- end }}
    {{- $rapid7Rewrite := true }}
    {{- if hasKey .Values.skyforge.rapid7 "rewritePrefixToRoot" }}
    {{- $rapid7Rewrite = .Values.skyforge.rapid7.rewritePrefixToRoot }}
    {{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ $rapid7Prefix | quote }}
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Prefix
                value: {{ $rapid7Prefix | quote }}
              - name: X-Skyforge-External-Prefix
                value: {{ $rapid7Prefix | quote }}
        {{- if $rapid7Rewrite }}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        {{- end }}
      backendRefs:
        {{- if $rapid7OIDCEnabled }}
        - name: rapid7-sso-proxy
          port: 8080
        {{- else }}
        - name: {{ default "rapid7" .Values.skyforge.rapid7.serviceName }}
          port: {{ default 3780 .Values.skyforge.rapid7.servicePort }}
          {{- with .Values.skyforge.rapid7.serviceNamespace }}
          namespace: {{ . }}
          {{- end }}
        {{- end }}
{{- end }}
{{- if .Values.skyforge.elk.enabled }}
    {{- $elkPrefix := default "/elk" .Values.skyforge.elk.externalPrefix }}
    {{- $elkOIDC := default (dict) .Values.skyforge.elk.oidc }}
    {{- $elkOIDCEnabled := true }}
    {{- if hasKey $elkOIDC "enabled" }}
    {{- $elkOIDCEnabled = (index $elkOIDC "enabled") }}
    {{- end }}
    {{- $elkRewrite := true }}
    {{- if hasKey .Values.skyforge.elk "rewritePrefixToRoot" }}
    {{- $elkRewrite = .Values.skyforge.elk.rewritePrefixToRoot }}
    {{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ $elkPrefix | quote }}
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Prefix
                value: {{ $elkPrefix | quote }}
              - name: X-Skyforge-External-Prefix
                value: {{ $elkPrefix | quote }}
        {{- if $elkRewrite }}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        {{- end }}
      backendRefs:
        {{- if $elkOIDCEnabled }}
        - name: elk-sso-proxy
          port: 8080
        {{- else }}
        - name: {{ default "kibana" .Values.skyforge.elk.serviceName }}
          port: {{ default 5601 .Values.skyforge.elk.servicePort }}
          {{- with .Values.skyforge.elk.serviceNamespace }}
          namespace: {{ . }}
          {{- end }}
        {{- end }}
{{- end }}
{{- end }}
