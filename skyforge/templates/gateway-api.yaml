{{- $host := .Values.skyforge.hostname -}}
{{- $giteaEnabled := .Values.skyforge.gitea.enabled -}}
{{- $yaadeEnabled := .Values.skyforge.yaade.enabled -}}
{{- $redocEnabled := .Values.skyforge.redoc.enabled -}}
{{- $oidcGatewayEnabled := .Values.skyforge.dex.enabled -}}
{{- $coderEnabled := .Values.skyforge.coder.enabled -}}
{{- $filesBucket := .Values.skyforge.objectStorage.filesBucket | default "skyforge-files" -}}
{{- $gatewayAddresses := .Values.skyforge.gateway.addresses | default (list) -}}
{{- $forwardClusterEnabled := .Values.skyforge.forwardCluster.enabled -}}
{{- $forwardHost := default $host .Values.skyforge.forwardCluster.hostname -}}
{{- $forwardSvcName := default "fwd-appserver" .Values.skyforge.forwardCluster.serviceName -}}
{{- $forwardSvcNamespace := default "forward" .Values.skyforge.forwardCluster.serviceNamespace -}}
{{- $forwardSvcPort := default 8080 .Values.skyforge.forwardCluster.servicePort -}}
{{- $forwardCrossNamespace := and $forwardClusterEnabled (ne $forwardSvcNamespace .Release.Namespace) -}}
{{- $forwardObservabilityUIEnabled := and $forwardClusterEnabled (default false .Values.skyforge.forwardCluster.observabilityUI.enabled) -}}
{{- $forwardGrafanaPrefix := default "/grafana" .Values.skyforge.forwardCluster.observabilityUI.grafana.externalPrefix -}}
{{- $forwardGrafanaSvcName := default "fwd-grafana-service" .Values.skyforge.forwardCluster.observabilityUI.grafana.serviceName -}}
{{- $forwardGrafanaSvcPort := default 3000 .Values.skyforge.forwardCluster.observabilityUI.grafana.servicePort -}}
{{- $forwardGrafanaRewriteTarget := default "/" .Values.skyforge.forwardCluster.observabilityUI.grafana.rewritePrefixMatch -}}
{{- $forwardPromPrefix := default "/prometheus" .Values.skyforge.forwardCluster.observabilityUI.prometheus.externalPrefix -}}
{{- $forwardPromSvcName := default "fwd-prometheus" .Values.skyforge.forwardCluster.observabilityUI.prometheus.serviceName -}}
{{- $forwardPromSvcPort := default 9090 .Values.skyforge.forwardCluster.observabilityUI.prometheus.servicePort -}}
{{- $forwardPromRewriteTarget := default "/" .Values.skyforge.forwardCluster.observabilityUI.prometheus.rewritePrefixMatch -}}

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: skyforge
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  gatewayClassName: cilium
  {{- if gt (len $gatewayAddresses) 0 }}
  addresses:
{{ toYaml $gatewayAddresses | nindent 4 }}
  {{- end }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          {{- if $forwardCrossNamespace }}
          from: All
          {{- else }}
          from: Same
          {{- end }}
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: proxy-tls
      allowedRoutes:
        namespaces:
          {{- if $forwardCrossNamespace }}
          from: All
          {{- else }}
          from: Same
          {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skyforge
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: skyforge
  hostnames:
    - {{ $host | quote }}
  rules:
    # Core Skyforge endpoints
    - matches:
        - path:
            type: PathPrefix
            value: /assets/skyforge/
      backendRefs:
        - name: skyforge-server
          port: 8085
    - matches:
        - path:
            type: PathPrefix
            value: /healthz
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: skyforge-server
          port: 8085

{{- if $oidcGatewayEnabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /dex
      backendRefs:
        - name: dex
          port: 5556
{{- end }}

    # Root landing: / -> /index.html
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /index.html
      backendRefs:
        - name: skyforge-server
          port: 8085
    # SPA deep-link rewrite for settings routes.
    - matches:
        - path:
            type: Exact
            value: /settings
        - path:
            type: PathPrefix
            value: /settings/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /index.html
      backendRefs:
        - name: skyforge-server
          port: 8085

    # Default catch-all to Skyforge server
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: skyforge-server
          port: 8085
{{- if $forwardClusterEnabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skyforge-forward
  namespace: {{ $forwardSvcNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: skyforge
      namespace: {{ .Release.Namespace }}
  hostnames:
    - {{ $forwardHost | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $forwardSvcName }}
          port: {{ int $forwardSvcPort }}
{{- end }}
{{- if $forwardObservabilityUIEnabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skyforge-forward-observability
  namespace: {{ $forwardSvcNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: skyforge
      namespace: {{ .Release.Namespace }}
  hostnames:
    - {{ $host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ $forwardGrafanaPrefix | quote }}
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Prefix
                value: {{ $forwardGrafanaPrefix | quote }}
              - name: X-Skyforge-External-Prefix
                value: {{ $forwardGrafanaPrefix | quote }}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: {{ $forwardGrafanaRewriteTarget | quote }}
      backendRefs:
        - name: {{ $forwardGrafanaSvcName }}
          port: {{ int $forwardGrafanaSvcPort }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ $forwardPromPrefix | quote }}
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Prefix
                value: {{ $forwardPromPrefix | quote }}
              - name: X-Skyforge-External-Prefix
                value: {{ $forwardPromPrefix | quote }}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: {{ $forwardPromRewriteTarget | quote }}
      backendRefs:
        - name: {{ $forwardPromSvcName }}
          port: {{ int $forwardPromSvcPort }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skyforge-tools
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: skyforge
  hostnames:
    - {{ $host | quote }}
  rules:
{{- if .Values.skyforge.s3gw.enabled }}
    # /files/* -> s3gw /<files-bucket>/*
    - matches:
        - path:
            type: PathPrefix
            value: /files/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: {{ printf "/%s/" $filesBucket }}
      backendRefs:
        - name: {{ .Values.skyforge.s3gw.serviceName }}
          port: {{ .Values.skyforge.s3gw.service.port }}
{{- end }}

{{- if $yaadeEnabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /api-testing
      backendRefs:
        - name: yaade
          port: 80
{{- end }}

{{- if .Values.skyforge.netbox.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /netbox/static/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /static/
      backendRefs:
        - name: netbox
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /netbox/media/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /media/
      backendRefs:
        - name: netbox
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /netbox
      backendRefs:
        - name: netbox-sso-proxy
          port: 8080
{{- end }}

{{- if .Values.skyforge.nautobot.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /nautobot
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: nautobot-sso-proxy
          port: 8080
{{- end }}

{{- if $giteaEnabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /git
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Skyforge-External-Prefix
                value: /git
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: gitea-sso-proxy
          port: 8080
{{- end }}

{{- if $redocEnabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /redoc
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Skyforge-External-Prefix
                value: /redoc
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: redoc-sso-proxy
          port: 8080
{{- end }}

{{- if $coderEnabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /assets/skyforge
      backendRefs:
        - name: skyforge-server
          port: 8085
    - matches:
        - path:
            type: PathPrefix
            value: /assets
      backendRefs:
        - name: coder
          port: 7080
    - matches:
        - path:
            type: PathPrefix
            value: /favicons
      backendRefs:
        - name: coder
          port: 7080
    - matches:
        - path:
            type: Exact
            value: /coder/launch
      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 302
            path:
              type: ReplaceFullPath
              replaceFullPath: /coder/
    - matches:
        - path:
            type: PathPrefix
            value: /coder
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: coder
          port: 7080
    - matches:
        - path:
            type: PathPrefix
            value: /api/v2
      backendRefs:
        - name: coder
          port: 7080
{{- end }}

{{- if .Values.skyforge.dns.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /dns
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: technitium-dns
          port: 5380
{{- end }}
{{- $toolsExtraEnabled := or .Values.skyforge.infoblox.enabled .Values.skyforge.jira.enabled .Values.skyforge.rapid7.enabled .Values.skyforge.elk.enabled }}
{{- if $toolsExtraEnabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skyforge-tools-extra
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: skyforge
  hostnames:
    - {{ $host | quote }}
  rules:
{{- if .Values.skyforge.infoblox.enabled }}
    {{- $infobloxPrefix := default "/infoblox" .Values.skyforge.infoblox.externalPrefix }}
    {{- $infobloxServiceName := default "infoblox" .Values.skyforge.infoblox.serviceName }}
    {{- $infobloxServicePort := default 443 .Values.skyforge.infoblox.servicePort }}
    {{- $infobloxRewrite := true }}
    {{- if hasKey .Values.skyforge.infoblox "rewritePrefixToRoot" }}
    {{- $infobloxRewrite = .Values.skyforge.infoblox.rewritePrefixToRoot }}
    {{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ $infobloxPrefix | quote }}
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Prefix
                value: {{ $infobloxPrefix | quote }}
              - name: X-Skyforge-External-Prefix
                value: {{ $infobloxPrefix | quote }}
        {{- if $infobloxRewrite }}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        {{- end }}
      backendRefs:
        - name: {{ $infobloxServiceName }}
          port: {{ $infobloxServicePort }}
          {{- with .Values.skyforge.infoblox.serviceNamespace }}
          namespace: {{ . }}
          {{- end }}
{{- end }}
{{- if .Values.skyforge.jira.enabled }}
    {{- $jiraPrefix := default "/jira" .Values.skyforge.jira.externalPrefix }}
    {{- $jiraServiceName := default "jira" .Values.skyforge.jira.serviceName }}
    {{- $jiraServicePort := default 8080 .Values.skyforge.jira.servicePort }}
    {{- $jiraRewrite := true }}
    {{- if hasKey .Values.skyforge.jira "rewritePrefixToRoot" }}
    {{- $jiraRewrite = .Values.skyforge.jira.rewritePrefixToRoot }}
    {{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ $jiraPrefix | quote }}
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Prefix
                value: {{ $jiraPrefix | quote }}
              - name: X-Skyforge-External-Prefix
                value: {{ $jiraPrefix | quote }}
        {{- if $jiraRewrite }}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        {{- end }}
      backendRefs:
        - name: {{ $jiraServiceName }}
          port: {{ $jiraServicePort }}
          {{- with .Values.skyforge.jira.serviceNamespace }}
          namespace: {{ . }}
          {{- end }}
{{- end }}
{{- if .Values.skyforge.rapid7.enabled }}
    {{- $rapid7Prefix := default "/rapid7" .Values.skyforge.rapid7.externalPrefix }}
    {{- $rapid7ServiceName := default "rapid7" .Values.skyforge.rapid7.serviceName }}
    {{- $rapid7ServicePort := default 3780 .Values.skyforge.rapid7.servicePort }}
    {{- $rapid7Rewrite := true }}
    {{- if hasKey .Values.skyforge.rapid7 "rewritePrefixToRoot" }}
    {{- $rapid7Rewrite = .Values.skyforge.rapid7.rewritePrefixToRoot }}
    {{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ $rapid7Prefix | quote }}
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Prefix
                value: {{ $rapid7Prefix | quote }}
              - name: X-Skyforge-External-Prefix
                value: {{ $rapid7Prefix | quote }}
        {{- if $rapid7Rewrite }}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        {{- end }}
      backendRefs:
        - name: {{ $rapid7ServiceName }}
          port: {{ $rapid7ServicePort }}
          {{- with .Values.skyforge.rapid7.serviceNamespace }}
          namespace: {{ . }}
          {{- end }}
{{- end }}
{{- if .Values.skyforge.elk.enabled }}
    {{- $elkPrefix := default "/elk" .Values.skyforge.elk.externalPrefix }}
    {{- $elkServiceName := default "kibana" .Values.skyforge.elk.serviceName }}
    {{- $elkServicePort := default 5601 .Values.skyforge.elk.servicePort }}
    {{- $elkRewrite := true }}
    {{- if hasKey .Values.skyforge.elk "rewritePrefixToRoot" }}
    {{- $elkRewrite = .Values.skyforge.elk.rewritePrefixToRoot }}
    {{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ $elkPrefix | quote }}
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Prefix
                value: {{ $elkPrefix | quote }}
              - name: X-Skyforge-External-Prefix
                value: {{ $elkPrefix | quote }}
        {{- if $elkRewrite }}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        {{- end }}
      backendRefs:
        - name: {{ $elkServiceName }}
          port: {{ $elkServicePort }}
          {{- with .Values.skyforge.elk.serviceNamespace }}
          namespace: {{ . }}
          {{- end }}
{{- end }}
{{- end }}
