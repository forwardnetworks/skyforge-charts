{{- if and .Values.skyforge.keda .Values.skyforge.keda.enabled -}}
{{- $requireCRD := true -}}
{{- if hasKey .Values.skyforge.keda "requireCRD" -}}
{{- $requireCRD = .Values.skyforge.keda.requireCRD -}}
{{- end -}}
{{- if and $requireCRD (not (.Capabilities.APIVersions.Has "keda.sh/v1alpha1/ScaledObject")) -}}
{{- fail "skyforge.keda.enabled=true requires KEDA CRDs (keda.sh/v1alpha1/ScaledObject)" -}}
{{- end -}}

{{- if .Values.skyforge.keda.worker.enabled }}
{{- $workerDBHost := default "db" .Values.skyforge.db.host -}}
{{- if not (contains "." $workerDBHost) -}}
{{- $workerDBHost = printf "%s.%s.svc.cluster.local" $workerDBHost .Release.Namespace -}}
{{- end -}}
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: skyforge-worker-postgresql-auth
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  secretTargetRef:
    - parameter: password
      name: db-skyforge-server-password
      key: db-skyforge-server-password
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: skyforge-server-worker
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: skyforge-server-worker
  pollingInterval: {{ default 15 .Values.skyforge.keda.worker.pollingInterval }}
  cooldownPeriod: {{ default 120 .Values.skyforge.keda.worker.cooldownPeriod }}
  minReplicaCount: {{ default 1 .Values.skyforge.keda.worker.minReplicaCount }}
  maxReplicaCount: {{ default 6 .Values.skyforge.keda.worker.maxReplicaCount }}
  triggers:
    - type: postgresql
      metadata:
        host: {{ $workerDBHost | quote }}
        port: {{ default "5432" .Values.skyforge.db.port | quote }}
        dbName: {{ default "skyforge_server" .Values.skyforge.db.name | quote }}
        userName: {{ default "skyforge_server" .Values.skyforge.db.user | quote }}
        sslmode: {{ default "disable" .Values.skyforge.db.sslmode | quote }}
        query: {{ default "SELECT COUNT(*) FROM sf_tasks WHERE status = 'queued'" .Values.skyforge.keda.worker.query | quote }}
        targetQueryValue: {{ printf "%v" (default "5" .Values.skyforge.keda.worker.targetQueryValue) | quote }}
        activationTargetQueryValue: {{ printf "%v" (default (default "1" .Values.skyforge.keda.worker.activationQueryValue) .Values.skyforge.keda.worker.activationTargetQueryValue) | quote }}
      authenticationRef:
        name: skyforge-worker-postgresql-auth
{{ end }}

{{- if and .Values.skyforge.jira.enabled .Values.skyforge.jira.managed .Values.skyforge.keda.jira.enabled }}
{{- $triggers := default (list) .Values.skyforge.keda.jira.triggers -}}
{{- if eq (len $triggers) 0 -}}
{{- fail "skyforge.keda.jira.enabled=true requires skyforge.keda.jira.triggers" -}}
{{- end -}}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: jira
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ default "jira" .Values.skyforge.jira.serviceName }}
  pollingInterval: {{ default 30 .Values.skyforge.keda.jira.pollingInterval }}
  cooldownPeriod: {{ default 900 .Values.skyforge.keda.jira.cooldownPeriod }}
  minReplicaCount: {{- if hasKey .Values.skyforge.keda.jira "minReplicaCount" }} {{ .Values.skyforge.keda.jira.minReplicaCount }}{{- else }} 1{{- end }}
  maxReplicaCount: {{- if hasKey .Values.skyforge.keda.jira "maxReplicaCount" }} {{ .Values.skyforge.keda.jira.maxReplicaCount }}{{- else }} 2{{- end }}
  triggers:
{{ toYaml $triggers | indent 4 }}
{{ end }}

{{ if and .Values.skyforge.netbox.enabled .Values.skyforge.keda.netbox.enabled }}
{{- $triggers := default (list) .Values.skyforge.keda.netbox.triggers -}}
{{- if eq (len $triggers) 0 -}}
{{- fail "skyforge.keda.netbox.enabled=true requires skyforge.keda.netbox.triggers" -}}
{{- end -}}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: netbox
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: netbox
  pollingInterval: {{ default 30 .Values.skyforge.keda.netbox.pollingInterval }}
  cooldownPeriod: {{ default 900 .Values.skyforge.keda.netbox.cooldownPeriod }}
  minReplicaCount: {{- if hasKey .Values.skyforge.keda.netbox "minReplicaCount" }} {{ .Values.skyforge.keda.netbox.minReplicaCount }}{{- else }} 1{{- end }}
  maxReplicaCount: {{- if hasKey .Values.skyforge.keda.netbox "maxReplicaCount" }} {{ .Values.skyforge.keda.netbox.maxReplicaCount }}{{- else }} 2{{- end }}
  triggers:
{{ toYaml $triggers | indent 4 }}
{{ end }}

{{ if and .Values.skyforge.nautobot.enabled .Values.skyforge.keda.nautobot.enabled }}
{{- $triggers := default (list) .Values.skyforge.keda.nautobot.triggers -}}
{{- if eq (len $triggers) 0 -}}
{{- fail "skyforge.keda.nautobot.enabled=true requires skyforge.keda.nautobot.triggers" -}}
{{- end -}}
