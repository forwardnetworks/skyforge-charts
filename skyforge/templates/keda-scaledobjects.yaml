{{- if and .Values.skyforge.keda .Values.skyforge.keda.enabled -}}
{{- if and (default true .Values.skyforge.keda.requireCRD) (not (.Capabilities.APIVersions.Has "keda.sh/v1alpha1/ScaledObject")) -}}
{{- fail "skyforge.keda.enabled=true requires KEDA CRDs (keda.sh/v1alpha1/ScaledObject)" -}}
{{- end -}}
{{- if and .Values.skyforge.rapid7.enabled .Values.skyforge.rapid7.managed .Values.skyforge.keda.rapid7.enabled }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: rapid7
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ default "rapid7" .Values.skyforge.rapid7.serviceName }}
  pollingInterval: {{ default 30 .Values.skyforge.keda.rapid7.pollingInterval }}
  cooldownPeriod: {{ default 300 .Values.skyforge.keda.rapid7.cooldownPeriod }}
  minReplicaCount: {{ default 0 .Values.skyforge.keda.rapid7.minReplicaCount }}
  maxReplicaCount: {{ default 1 .Values.skyforge.keda.rapid7.maxReplicaCount }}
  {{- if not .Values.skyforge.keda.rapid7.triggers }}
  {{- fail "skyforge.keda.rapid7.enabled=true requires skyforge.keda.rapid7.triggers" }}
  {{- end }}
  triggers:
{{ toYaml .Values.skyforge.keda.rapid7.triggers | indent 4 }}
{{- end }}
{{- if and .Values.skyforge.elk.enabled .Values.skyforge.keda.elkProxy.enabled }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: elk
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ default "kibana" .Values.skyforge.elk.serviceName }}
  pollingInterval: {{ default 30 .Values.skyforge.keda.elkProxy.pollingInterval }}
  cooldownPeriod: {{ default 300 .Values.skyforge.keda.elkProxy.cooldownPeriod }}
  minReplicaCount: {{ default 0 .Values.skyforge.keda.elkProxy.minReplicaCount }}
  maxReplicaCount: {{ default 1 .Values.skyforge.keda.elkProxy.maxReplicaCount }}
  {{- if not .Values.skyforge.keda.elkProxy.triggers }}
  {{- fail "skyforge.keda.elkProxy.enabled=true requires skyforge.keda.elkProxy.triggers" }}
  {{- end }}
  triggers:
{{ toYaml .Values.skyforge.keda.elkProxy.triggers | indent 4 }}
{{- end }}
{{- end }}
