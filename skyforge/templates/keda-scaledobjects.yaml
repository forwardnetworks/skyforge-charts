  pollingInterval: {{ default 30 .Values.skyforge.keda.nautobot.pollingInterval }}
  cooldownPeriod: {{ default 900 .Values.skyforge.keda.nautobot.cooldownPeriod }}
  minReplicaCount: {{- if hasKey .Values.skyforge.keda.nautobot "minReplicaCount" }} {{ .Values.skyforge.keda.nautobot.minReplicaCount }}{{- else }} 1{{- end }}
  maxReplicaCount: {{- if hasKey .Values.skyforge.keda.nautobot "maxReplicaCount" }} {{ .Values.skyforge.keda.nautobot.maxReplicaCount }}{{- else }} 2{{- end }}
  triggers:
{{ toYaml $triggers | indent 4 }}
{{ end }}

{{ if and .Values.skyforge.rapid7.enabled .Values.skyforge.rapid7.managed .Values.skyforge.keda.rapid7.enabled }}
{{- $triggers := default (list) .Values.skyforge.keda.rapid7.triggers -}}
{{- if eq (len $triggers) 0 -}}
{{- fail "skyforge.keda.rapid7.enabled=true requires skyforge.keda.rapid7.triggers" -}}
{{- end -}}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: rapid7
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ default "rapid7" .Values.skyforge.rapid7.serviceName }}
  pollingInterval: {{ default 30 .Values.skyforge.keda.rapid7.pollingInterval }}
  cooldownPeriod: {{ default 900 .Values.skyforge.keda.rapid7.cooldownPeriod }}
  minReplicaCount: {{- if hasKey .Values.skyforge.keda.rapid7 "minReplicaCount" }} {{ .Values.skyforge.keda.rapid7.minReplicaCount }}{{- else }} 1{{- end }}
  maxReplicaCount: {{- if hasKey .Values.skyforge.keda.rapid7 "maxReplicaCount" }} {{ .Values.skyforge.keda.rapid7.maxReplicaCount }}{{- else }} 2{{- end }}
  triggers:
{{ toYaml $triggers | indent 4 }}
{{ end }}

{{ if and .Values.skyforge.elk.enabled .Values.skyforge.keda.elkProxy.enabled }}
{{- if gt (int (default 1 .Values.skyforge.keda.elkProxy.maxReplicaCount)) 1 -}}
{{- fail "skyforge.keda.elkProxy.maxReplicaCount must be <= 1 because the bundled ELK stack is single-node and uses one RWO Elasticsearch data volume" -}}
{{- end -}}
{{- $triggers := default (list) .Values.skyforge.keda.elkProxy.triggers -}}
{{- if eq (len $triggers) 0 -}}
{{- fail "skyforge.keda.elkProxy.enabled=true requires skyforge.keda.elkProxy.triggers" -}}
{{- end -}}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: elk
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ default "kibana" .Values.skyforge.elk.serviceName }}
  pollingInterval: {{ default 30 .Values.skyforge.keda.elkProxy.pollingInterval }}
  cooldownPeriod: {{ default 900 .Values.skyforge.keda.elkProxy.cooldownPeriod }}
  minReplicaCount: {{- if hasKey .Values.skyforge.keda.elkProxy "minReplicaCount" }} {{ .Values.skyforge.keda.elkProxy.minReplicaCount }}{{- else }} 1{{- end }}
  maxReplicaCount: {{- if hasKey .Values.skyforge.keda.elkProxy "maxReplicaCount" }} {{ .Values.skyforge.keda.elkProxy.maxReplicaCount }}{{- else }} 2{{- end }}
  triggers:
{{ toYaml $triggers | indent 4 }}
{{ end }}

{{- end }}
