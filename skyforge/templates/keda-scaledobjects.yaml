{{- if and .Values.skyforge.keda .Values.skyforge.keda.enabled -}}
{{- $requireCRD := true -}}
{{- if hasKey .Values.skyforge.keda "requireCRD" -}}
{{- $requireCRD = .Values.skyforge.keda.requireCRD -}}
{{- end -}}
{{- if and $requireCRD (not (.Capabilities.APIVersions.Has "keda.sh/v1alpha1/ScaledObject")) -}}
{{- fail "skyforge.keda.enabled=true requires KEDA CRDs (keda.sh/v1alpha1/ScaledObject)" -}}
{{- end -}}

{{- if .Values.skyforge.keda.worker.enabled }}
{{- $workerDBHost := default "db" .Values.skyforge.db.host -}}
{{- if not (contains "." $workerDBHost) -}}
{{- $workerDBHost = printf "%s.%s.svc.cluster.local" $workerDBHost .Release.Namespace -}}
{{- end -}}
{{- $workerCfg := default (dict) .Values.skyforge.keda.worker -}}
{{- $labAware := default (dict) $workerCfg.labAware -}}
{{- $labAwareEnabled := default false $labAware.enabled -}}
{{- $labTaskTypes := default (list "netlab-run" "netlab-kne-run" "kne-run" "composite-run" "eve-ng-run") $labAware.taskTypes -}}
{{- $quotedTaskTypes := list -}}
{{- range $taskType := $labTaskTypes -}}
{{- $quotedTaskTypes = append $quotedTaskTypes (printf "'%s'" (replace "'" "''" (toString $taskType))) -}}
{{- end -}}
{{- $taskTypeSQLList := join ", " $quotedTaskTypes -}}
{{- $queuedWeight := int (default 3 $labAware.queuedWeight) -}}
{{- $runningWeight := int (default 1 $labAware.runningWeight) -}}
{{- $otherQueuedWeight := int (default 1 $labAware.otherQueuedWeight) -}}
{{- $reservationWindowMinutes := int (default 20 $labAware.reservationPrewarmMinutes) -}}
{{- $reservationClassWeights := default (dict "heavy" 3 "standard" 2 "default" 1) $labAware.reservationClassWeights -}}
{{- $reservationHeavyWeight := int (default 3 (index $reservationClassWeights "heavy")) -}}
{{- $reservationStandardWeight := int (default 2 (index $reservationClassWeights "standard")) -}}
{{- $reservationDefaultWeight := int (default 1 (index $reservationClassWeights "default")) -}}
{{- $workerQuery := trim (default "" $workerCfg.query) -}}
{{- if and (eq $workerQuery "") $labAwareEnabled -}}
{{- $workerQuery = printf "SELECT COALESCE(SUM(CASE WHEN status='queued' AND task_type IN (%s) THEN %d WHEN status='running' AND task_type IN (%s) THEN %d WHEN status='queued' THEN %d ELSE 0 END),0) + COALESCE((SELECT SUM(CASE resource_class WHEN 'heavy' THEN %d WHEN 'standard' THEN %d ELSE %d END) FROM sf_reservations r WHERE r.status='approved' AND r.type IN ('scheduled-future','immediate-interactive','persistent-sandbox') AND r.start_at <= now() + interval '%d minutes' AND r.end_at > now()),0) AS demand_score FROM sf_tasks WHERE status IN ('queued','running')" $taskTypeSQLList $queuedWeight $taskTypeSQLList $runningWeight $otherQueuedWeight $reservationHeavyWeight $reservationStandardWeight $reservationDefaultWeight $reservationWindowMinutes -}}
{{- end -}}
{{- if eq $workerQuery "" -}}
{{- $workerQuery = "SELECT COUNT(*) FROM sf_tasks WHERE status = 'queued'" -}}
{{- end -}}
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: skyforge-worker-postgresql-auth
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  secretTargetRef:
    - parameter: password
      name: db-skyforge-server-password
      key: db-skyforge-server-password
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: skyforge-server-worker
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: skyforge-server-worker
  pollingInterval: {{ default 15 .Values.skyforge.keda.worker.pollingInterval }}
  cooldownPeriod: {{ default 120 .Values.skyforge.keda.worker.cooldownPeriod }}
  minReplicaCount: {{ default 1 .Values.skyforge.keda.worker.minReplicaCount }}
  maxReplicaCount: {{ default 6 .Values.skyforge.keda.worker.maxReplicaCount }}
  triggers:
    - type: postgresql
      metadata:
        host: {{ $workerDBHost | quote }}
        port: {{ default "5432" .Values.skyforge.db.port | quote }}
        dbName: {{ default "skyforge_server" .Values.skyforge.db.name | quote }}
        userName: {{ default "skyforge_server" .Values.skyforge.db.user | quote }}
        sslmode: {{ default "disable" .Values.skyforge.db.sslmode | quote }}
        query: {{ $workerQuery | quote }}
        targetQueryValue: {{ printf "%v" (default "5" .Values.skyforge.keda.worker.targetQueryValue) | quote }}
        activationTargetQueryValue: {{ printf "%v" (default (default "1" .Values.skyforge.keda.worker.activationQueryValue) .Values.skyforge.keda.worker.activationTargetQueryValue) | quote }}
      authenticationRef:
        name: skyforge-worker-postgresql-auth
{{ end }}

{{- $forwardWorkersKeda := default (dict) .Values.skyforge.keda.forwardWorkers -}}
{{- if and .Values.skyforge.keda.enabled (default false $forwardWorkersKeda.enabled) }}
{{- $forwardNs := trim (default (default "forward" .Values.skyforge.forwardCluster.serviceNamespace) $forwardWorkersKeda.namespace) -}}
{{- $forwardCompute := default (dict) $forwardWorkersKeda.compute -}}
{{- $forwardSearch := default (dict) $forwardWorkersKeda.search -}}
{{- if default true $forwardCompute.enabled }}
{{- $computeTriggers := default (list (dict "type" "cpu" "metricType" "Utilization" "metadata" (dict "value" "70")) (dict "type" "memory" "metricType" "Utilization" "metadata" (dict "value" "80"))) $forwardCompute.triggers -}}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: fwd-compute-worker
  namespace: {{ $forwardNs }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ default "fwd-compute-worker" $forwardCompute.targetName | quote }}
  pollingInterval: {{ default 30 $forwardCompute.pollingInterval }}
  cooldownPeriod: {{ default 300 $forwardCompute.cooldownPeriod }}
  minReplicaCount: {{ default 1 $forwardCompute.minReplicaCount }}
  maxReplicaCount: {{ default 3 $forwardCompute.maxReplicaCount }}
  triggers:
{{ toYaml $computeTriggers | indent 4 }}
{{- end }}
{{- if default true $forwardSearch.enabled }}
{{- $searchTriggers := default (list (dict "type" "cpu" "metricType" "Utilization" "metadata" (dict "value" "70")) (dict "type" "memory" "metricType" "Utilization" "metadata" (dict "value" "80"))) $forwardSearch.triggers -}}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: fwd-search-worker
  namespace: {{ $forwardNs }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ default "fwd-search-worker" $forwardSearch.targetName | quote }}
  pollingInterval: {{ default 30 $forwardSearch.pollingInterval }}
  cooldownPeriod: {{ default 300 $forwardSearch.cooldownPeriod }}
  minReplicaCount: {{ default 1 $forwardSearch.minReplicaCount }}
  maxReplicaCount: {{ default 2 $forwardSearch.maxReplicaCount }}
  triggers:
{{ toYaml $searchTriggers | indent 4 }}
{{- end }}
{{- end }}

{{- if and .Values.skyforge.jira.enabled .Values.skyforge.jira.managed .Values.skyforge.keda.jira.enabled }}
{{- $triggers := default (list) .Values.skyforge.keda.jira.triggers -}}
{{- if eq (len $triggers) 0 -}}
{{- fail "skyforge.keda.jira.enabled=true requires skyforge.keda.jira.triggers" -}}
{{- end -}}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: jira
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ default "jira" .Values.skyforge.jira.serviceName }}
  pollingInterval: {{ default 30 .Values.skyforge.keda.jira.pollingInterval }}
  cooldownPeriod: {{ default 900 .Values.skyforge.keda.jira.cooldownPeriod }}
  minReplicaCount: {{- if hasKey .Values.skyforge.keda.jira "minReplicaCount" }} {{ .Values.skyforge.keda.jira.minReplicaCount }}{{- else }} 1{{- end }}
  maxReplicaCount: {{- if hasKey .Values.skyforge.keda.jira "maxReplicaCount" }} {{ .Values.skyforge.keda.jira.maxReplicaCount }}{{- else }} 2{{- end }}
  triggers:
{{ toYaml $triggers | indent 4 }}
{{ end }}

{{ if and .Values.skyforge.netbox.enabled .Values.skyforge.keda.netbox.enabled }}
{{- $triggers := default (list) .Values.skyforge.keda.netbox.triggers -}}
{{- if eq (len $triggers) 0 -}}
{{- fail "skyforge.keda.netbox.enabled=true requires skyforge.keda.netbox.triggers" -}}
{{- end -}}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: netbox
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: netbox
  pollingInterval: {{ default 30 .Values.skyforge.keda.netbox.pollingInterval }}
  cooldownPeriod: {{ default 900 .Values.skyforge.keda.netbox.cooldownPeriod }}
  minReplicaCount: {{- if hasKey .Values.skyforge.keda.netbox "minReplicaCount" }} {{ .Values.skyforge.keda.netbox.minReplicaCount }}{{- else }} 1{{- end }}
  maxReplicaCount: {{- if hasKey .Values.skyforge.keda.netbox "maxReplicaCount" }} {{ .Values.skyforge.keda.netbox.maxReplicaCount }}{{- else }} 2{{- end }}
  triggers:
{{ toYaml $triggers | indent 4 }}
{{ end }}

{{ if and .Values.skyforge.nautobot.enabled .Values.skyforge.keda.nautobot.enabled }}
{{- $triggers := default (list) .Values.skyforge.keda.nautobot.triggers -}}
{{- if eq (len $triggers) 0 -}}
{{- fail "skyforge.keda.nautobot.enabled=true requires skyforge.keda.nautobot.triggers" -}}
{{- end -}}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: nautobot
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: nautobot
  pollingInterval: {{ default 30 .Values.skyforge.keda.nautobot.pollingInterval }}
  cooldownPeriod: {{ default 900 .Values.skyforge.keda.nautobot.cooldownPeriod }}
  minReplicaCount: {{- if hasKey .Values.skyforge.keda.nautobot "minReplicaCount" }} {{ .Values.skyforge.keda.nautobot.minReplicaCount }}{{- else }} 1{{- end }}
  maxReplicaCount: {{- if hasKey .Values.skyforge.keda.nautobot "maxReplicaCount" }} {{ .Values.skyforge.keda.nautobot.maxReplicaCount }}{{- else }} 2{{- end }}
  triggers:
{{ toYaml $triggers | indent 4 }}
{{ end }}

{{ if and .Values.skyforge.rapid7.enabled .Values.skyforge.rapid7.managed .Values.skyforge.keda.rapid7.enabled }}
{{- $triggers := default (list) .Values.skyforge.keda.rapid7.triggers -}}
{{- if eq (len $triggers) 0 -}}
{{- fail "skyforge.keda.rapid7.enabled=true requires skyforge.keda.rapid7.triggers" -}}
{{- end -}}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: rapid7
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ default "rapid7" .Values.skyforge.rapid7.serviceName }}
  pollingInterval: {{ default 30 .Values.skyforge.keda.rapid7.pollingInterval }}
  cooldownPeriod: {{ default 900 .Values.skyforge.keda.rapid7.cooldownPeriod }}
  minReplicaCount: {{- if hasKey .Values.skyforge.keda.rapid7 "minReplicaCount" }} {{ .Values.skyforge.keda.rapid7.minReplicaCount }}{{- else }} 1{{- end }}
  maxReplicaCount: {{- if hasKey .Values.skyforge.keda.rapid7 "maxReplicaCount" }} {{ .Values.skyforge.keda.rapid7.maxReplicaCount }}{{- else }} 2{{- end }}
  triggers:
{{ toYaml $triggers | indent 4 }}
{{ end }}

{{ if and .Values.skyforge.elk.enabled .Values.skyforge.keda.elkProxy.enabled }}
{{- if gt (int (default 1 .Values.skyforge.keda.elkProxy.maxReplicaCount)) 1 -}}
{{- fail "skyforge.keda.elkProxy.maxReplicaCount must be <= 1 because the bundled ELK stack is single-node and uses one RWO Elasticsearch data volume" -}}
{{- end -}}
{{- $triggers := default (list) .Values.skyforge.keda.elkProxy.triggers -}}
{{- if eq (len $triggers) 0 -}}
{{- fail "skyforge.keda.elkProxy.enabled=true requires skyforge.keda.elkProxy.triggers" -}}
{{- end -}}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: elk
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ default "kibana" .Values.skyforge.elk.serviceName }}
  pollingInterval: {{ default 30 .Values.skyforge.keda.elkProxy.pollingInterval }}
  cooldownPeriod: {{ default 900 .Values.skyforge.keda.elkProxy.cooldownPeriod }}
  minReplicaCount: {{- if hasKey .Values.skyforge.keda.elkProxy "minReplicaCount" }} {{ .Values.skyforge.keda.elkProxy.minReplicaCount }}{{- else }} 1{{- end }}
  maxReplicaCount: {{- if hasKey .Values.skyforge.keda.elkProxy "maxReplicaCount" }} {{ .Values.skyforge.keda.elkProxy.maxReplicaCount }}{{- else }} 2{{- end }}
  triggers:
{{ toYaml $triggers | indent 4 }}
{{ end }}

{{- end }}
