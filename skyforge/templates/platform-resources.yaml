{{- /*
platform-resources.yaml prints a set of pre-rendered manifests stored under
components/charts/skyforge/files/manifests/*.yaml.

Important: keep optional stacks (NetBox/Nautobot/etc) gated behind Helm values.
Without gating, QA/OSS install drills cannot disable integrations and will hang
pulling images or waiting on hooks.
*/ -}}

{{- $files := list
  "db-deployment.yaml"
  "db-provision-job.yaml"
  "db-service.yaml"

  "redis-deployment.yaml"
  "redis-service.yaml"
  -}}

{{- if .Values.skyforge.s3gw.enabled }}
  {{- $files = concat $files (list
    "backup-postgres-s3-cronjob.yaml"
    "backup-local-spread-daemonset.yaml"
    "backup-offsite-raw-daemonset.yaml"
    "backup-forward-raw-daemonset.yaml"

    "s3gw-deployment.yaml"
    "s3gw-init-pod.yaml"
    "s3gw-service.yaml"
  ) -}}
{{- end }}

{{- if .Values.skyforge.gitea.enabled }}
  {{- $files = concat $files (list
    "gitea-admin-sync-deployment.yaml"
    "gitea-deployment.yaml"
    "gitea-ssh-service.yaml"
    "gitea-service.yaml"
  ) -}}
{{- end }}

{{- if .Values.skyforge.redoc.enabled }}
  {{- $files = concat $files (list
    "redoc-deployment.yaml"
    "redoc-service.yaml"
  ) -}}
{{- end }}

{{- if .Values.skyforge.yaade.enabled }}
  {{- $files = concat $files (list
    "yaade-admin-sync-deployment.yaml"
    "yaade-deployment.yaml"
    "yaade-service.yaml"
  ) -}}
{{- end }}

{{- if .Values.skyforge.netbox.enabled }}
  {{- $netboxBootstrapEnabled := true -}}
  {{- if and (hasKey .Values.skyforge.netbox "bootstrap") (hasKey .Values.skyforge.netbox.bootstrap "enabled") -}}
    {{- $netboxBootstrapEnabled = .Values.skyforge.netbox.bootstrap.enabled -}}
  {{- end }}
  {{- if $netboxBootstrapEnabled }}
    {{- $files = concat $files (list
      "netbox-admin-bootstrap-job.yaml"
    ) -}}
  {{- end }}

  {{- $files = concat $files (list
    "netbox-admin-sync-deployment.yaml"
    "netbox-deployment.yaml"
    "netbox-service.yaml"
  ) -}}
{{- end }}

{{- if .Values.skyforge.nautobot.enabled }}
  {{- if (default false .Values.skyforge.nautobot.bootstrap.enabled) }}
    {{- $files = concat $files (list
      "nautobot-admin-bootstrap-job.yaml"
    ) -}}
  {{- end }}

  {{- $files = concat $files (list
    "nautobot-admin-sync-deployment.yaml"
    "nautobot-deployment.yaml"
    "nautobot-service.yaml"
  ) -}}
{{- end }}

{{- range $files }}
{{- $path := printf "files/manifests/%s" . -}}
{{- if $.Files.Get $path }}
---
{{ if has . (list "db-deployment.yaml" "db-provision-job.yaml" "redis-deployment.yaml" "gitea-deployment.yaml" "gitea-admin-sync-deployment.yaml" "gitea-service.yaml" "gitea-ssh-service.yaml" "netbox-deployment.yaml" "netbox-admin-bootstrap-job.yaml" "nautobot-deployment.yaml" "nautobot-admin-sync-deployment.yaml" "yaade-admin-sync-deployment.yaml" "s3gw-deployment.yaml" "s3gw-init-pod.yaml" "s3gw-service.yaml" "backup-postgres-s3-cronjob.yaml" "backup-local-spread-daemonset.yaml" "backup-offsite-raw-daemonset.yaml" "backup-forward-raw-daemonset.yaml" "redoc-deployment.yaml") -}}
{{ printf "%s\n" (tpl ($.Files.Get $path) $) -}}
{{ else -}}
{{ printf "%s\n" ($.Files.Get $path) -}}
{{ end -}}
{{ end }}
{{- end }}
