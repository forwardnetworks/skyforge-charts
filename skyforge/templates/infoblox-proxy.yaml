{{- if and .Values.skyforge.infoblox.enabled .Values.skyforge.infoblox.proxyEnabled }}
{{- $upstreamHost := required "skyforge.infoblox.upstreamHost is required when infoblox is enabled" .Values.skyforge.infoblox.upstreamHost -}}
{{- $upstreamPort := default 443 .Values.skyforge.infoblox.upstreamPort -}}
{{- $upstreamScheme := lower (default "https" .Values.skyforge.infoblox.upstreamScheme) -}}
{{- $lanNetwork := default "infoblox-lan1" .Values.skyforge.infoblox.lanNetworkName -}}
{{- $externalPrefix := default "/infoblox" .Values.skyforge.infoblox.externalPrefix -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: infoblox-proxy-envoy
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
data:
  envoy.yaml: |
    admin:
      access_log_path: /tmp/admin_access.log
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901

    static_resources:
      listeners:
        - name: listener_http
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8080
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: infoblox_ingress
                    normalize_path: true
                    use_remote_address: true
                    stream_idle_timeout: 300s
                    route_config:
                      name: infoblox_route
                      virtual_hosts:
                        - name: infoblox
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: /
                              route:
                                cluster: infoblox_upstream
                                host_rewrite_literal: {{ $upstreamHost | quote }}
                    http_filters:
                      - name: envoy.filters.http.lua
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                          inline_code: |
                            local function ensure_prefix(path, prefix)
                              if prefix == nil or prefix == "" then
                                return path
                              end
                              if string.sub(path, 1, string.len(prefix)) == prefix then
                                return path
                              end
                              if string.sub(path, 1, 1) ~= "/" then
                                path = "/" .. path
                              end
                              return prefix .. path
                            end

                            function envoy_on_response(handle)
                              local prefix = handle:headers():get("x-skyforge-external-prefix")
                              if prefix == nil or prefix == "" then
                                prefix = "{{ $externalPrefix }}"
                              end
                              if prefix == nil or prefix == "" then
                                return
                              end

                              local location = handle:headers():get("location")
                              if location == nil or location == "" then
                                return
                              end

                              local upstream_http = "http://{{ $upstreamHost }}"
                              local upstream_https = "https://{{ $upstreamHost }}"
                              local rewritten = nil

                              if string.sub(location, 1, string.len(upstream_https)) == upstream_https then
                                rewritten = string.sub(location, string.len(upstream_https) + 1)
                              elseif string.sub(location, 1, string.len(upstream_http)) == upstream_http then
                                rewritten = string.sub(location, string.len(upstream_http) + 1)
                              elseif string.sub(location, 1, 1) == "/" then
                                rewritten = location
                              end

                              if rewritten ~= nil and rewritten ~= "" then
                                handle:headers():replace("location", ensure_prefix(rewritten, prefix))
                              end
                            end
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        - name: infoblox_upstream
          type: STATIC
          connect_timeout: 5s
          load_assignment:
            cluster_name: infoblox_upstream
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ $upstreamHost | quote }}
                          port_value: {{ $upstreamPort }}
          {{- if eq $upstreamScheme "https" }}
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              common_tls_context:
                validation_context:
                  trust_chain_verification: ACCEPT_UNTRUSTED
{{- if regexMatch "^[A-Za-z0-9.-]+$" $upstreamHost }}
              sni: {{ $upstreamHost | quote }}
{{- end }}
          {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infoblox-proxy
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infoblox-proxy
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infoblox-proxy
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: infoblox-proxy
      {{- if .Values.skyforge.infoblox.attachLanNetwork }}
      annotations:
        k8s.v1.cni.cncf.io/networks: {{ $lanNetwork | quote }}
      {{- end }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.skyforge.infoblox.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: envoy
          image: {{ (default "envoyproxy/envoy:v1.31.2" .Values.images.envoy) | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - "-c"
            - "/etc/envoy/envoy.yaml"
          ports:
            - name: http
              containerPort: 8080
            - name: admin
              containerPort: 9901
          readinessProbe:
            httpGet:
              path: /ready
              port: 9901
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /ready
              port: 9901
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          volumeMounts:
            - name: envoy-conf
              mountPath: /etc/envoy/envoy.yaml
              subPath: envoy.yaml
      volumes:
        - name: envoy-conf
          configMap:
            name: infoblox-proxy-envoy
---
apiVersion: v1
kind: Service
metadata:
  name: infoblox-proxy
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: infoblox-proxy
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
{{- end }}
