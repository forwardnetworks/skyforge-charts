{{- if .Values.skyforge.infoblox.enabled }}
{{- $serviceName := default "infoblox" .Values.skyforge.infoblox.serviceName -}}
{{- $serviceNamespace := default "" .Values.skyforge.infoblox.serviceNamespace -}}
{{- $servicePort := default 443 .Values.skyforge.infoblox.servicePort -}}
{{- $serviceAliasEnabled := true -}}
{{- if and (hasKey .Values.skyforge.infoblox "serviceAlias") (hasKey .Values.skyforge.infoblox.serviceAlias "enabled") -}}
{{- $serviceAliasEnabled = .Values.skyforge.infoblox.serviceAlias.enabled -}}
{{- end -}}
{{- if and (not .Values.skyforge.infoblox.managed) $serviceAliasEnabled (or (eq $serviceNamespace "") (eq $serviceNamespace .Release.Namespace)) }}
{{- $upstreamHost := required "skyforge.infoblox.upstreamHost is required when infoblox service alias is enabled and no in-cluster service exists" .Values.skyforge.infoblox.upstreamHost -}}
{{- $upstreamPort := default 443 .Values.skyforge.infoblox.upstreamPort -}}
{{- $isIPv4 := regexMatch "^([0-9]{1,3}\\.){3}[0-9]{1,3}$" $upstreamHost -}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $serviceName }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: infoblox
spec:
  type: {{- if $isIPv4 }} ClusterIP {{- else }} ExternalName {{- end }}
  ports:
    - name: https
      appProtocol: https
      protocol: TCP
      port: {{ $servicePort }}
      {{- if $isIPv4 }}
      targetPort: {{ $servicePort }}
      {{- end }}
  {{- if not $isIPv4 }}
  externalName: {{ $upstreamHost | quote }}
  {{- end }}
{{- if $isIPv4 }}
---
apiVersion: v1
kind: Endpoints
metadata:
  name: {{ $serviceName }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: infoblox
subsets:
  - addresses:
      - ip: {{ $upstreamHost | quote }}
    ports:
      - name: https
        port: {{ $upstreamPort }}
        protocol: TCP
{{- end }}
{{- end }}
{{- end }}
