{{- $fc := .Values.skyforge.forwardCluster -}}
{{- $core := default (dict) $fc.core -}}
{{- $owner := lower (trim (default "upstream" $core.owner)) -}}
{{- if and $fc.enabled (eq $owner "skyforge") -}}
{{- $ns := include "skyforge.forwardCore.namespace" . -}}
{{- $corePlacement := default (dict) $core.placement -}}
{{- $pullPolicy := default "IfNotPresent" $core.imagePullPolicy -}}
{{- $priorityClassName := default "" $core.priorityClassName -}}
{{- $runAsUser := default 1000 $core.securityContext.runAsUser -}}
{{- $fsGroup := default 1000 $core.securityContext.fsGroup -}}
{{- $usePVCs := default true $core.usePVCs -}}
{{- $alpineImage := default "quay.io/forwardnetworks/docker:alpine_3.18.3" $core.alpineImage -}}
{{- $rollout := default (dict) $core.rollout -}}
{{- $strategyType := default "" $rollout.strategyType -}}
{{- if eq $strategyType "" -}}
{{- if $usePVCs -}}
{{- $strategyType = "Recreate" -}}
{{- else -}}
{{- $strategyType = "RollingUpdate" -}}
{{- end -}}
{{- end -}}
{{- $mounts := default (dict) $core.containerMounts -}}
{{- $logsDir := default "/var/log/forward" $mounts.logs -}}
{{- $scratchDataDir := default "/scratch/data" $mounts.scratchDataDir -}}
{{- $aggregatedLogsDir := default "/mnt/aggregated-logs" $mounts.aggregatedLogs -}}
{{- $scratch := default (dict) $core.scratch -}}
{{- $scratchHostPath := default "/mnt/forward/extended/scratch/pods" $scratch.hostPath -}}
{{- $restoreHostPath := default "/mnt/forward/restore" $scratch.restoreHostPath -}}
{{- $backupsHostPath := default "/mnt/forward/backups" $scratch.backupsHostPath -}}
{{- $logForwarding := default (dict) $core.logForwarding -}}
{{- $logForwardingEnabled := default true $logForwarding.enabled -}}
{{- $fluentBitImage := default "quay.io/forwardnetworks/docker:fluent_fluent-bit_1.9.3" $logForwarding.fluentBitImage -}}
{{- $fluentBitHTTPPort := default 2020 $logForwarding.httpPort -}}
{{- $fluentBitOutputs := default (list) $logForwarding.outputs -}}
{{- $db := default (dict) .Values.skyforge.forwardCluster.workers.database -}}
{{- $dbMode := lower (trim (default "external" $db.mode)) -}}
{{- $dbCert := default "" $db.certificate -}}
{{- $memoryProfileConfigMapName := default "fwd-memory-profile-overrides" $core.memoryProfileConfigMapName -}}
{{- $app := default (dict) $core.appserver -}}
{{- $backend := default (dict) $core.backend -}}
{{- $logs := default (dict) $core.logAggregation -}}
{{- $logsEnabled := default true $logs.enabled -}}
{{- $cbr := default (dict) $core.cbr -}}
{{- $cbrEnabled := default false $cbr.enabled -}}
{{- $cbrServer := default (dict) $cbr.server -}}
{{- $cbrAgent := default (dict) $cbr.agent -}}
{{- $cbrS3Agent := default (dict) $cbr.s3Agent -}}
{{- $cbrS3Backup := default (dict) $cbr.s3Backup -}}
{{- $nqeAssist := default (dict) $core.nqeAssist -}}
{{- $baml := default (dict) (default (dict) $core.ai).baml -}}
{{- $aiCreds := default (dict) $core.aiCredentials -}}
{{- $aiCredsSecretName := default "forward-ai-bedrock-credentials" $aiCreds.secretName -}}
{{- $aiCredsAccessKeyIDKey := default "AWS_ACCESS_KEY_ID" $aiCreds.accessKeyIDKey -}}
{{- $aiCredsSecretAccessKeyKey := default "AWS_SECRET_ACCESS_KEY" $aiCreds.secretAccessKeyKey -}}
{{- $aiCredsSessionTokenKey := default "AWS_SESSION_TOKEN" $aiCreds.sessionTokenKey -}}
{{- $appserverImage := include "skyforge.forwardCore.appserverImage" . -}}
{{- $backendImage := include "skyforge.forwardCore.backendMasterImage" . -}}
{{- $logserverImage := include "skyforge.forwardCore.logserverImage" . -}}
{{- $cbrServerImage := include "skyforge.forwardCore.cbrServerImage" . -}}
{{- $cbrAgentImage := include "skyforge.forwardCore.cbrAgentImage" . -}}
{{- $cbrS3AgentImage := include "skyforge.forwardCore.cbrS3AgentImage" . -}}
{{- $nqeAssistImage := include "skyforge.forwardCore.nqeAssistImage" . -}}
{{- $bamlImage := include "skyforge.forwardCore.bamlImage" . -}}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $memoryProfileConfigMapName | quote }}
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-memory-profile-overrides
data: {}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fwd-appserver-user
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-appserver
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fwd-appserver-user-role
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods","configmaps","secrets","endpoints"]
    verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fwd-appserver-user-role-binding
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: fwd-appserver-user
    namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fwd-appserver-user-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fwd-appserver-user-cluster-role
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fwd-appserver-user-cluster-role-binding
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: fwd-appserver-user
    namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fwd-appserver-user-cluster-role
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fwd-backend-master-user
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-backend-master
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fwd-backend-master-user-cluster-role
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["endpoints","nodes"]
    verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fwd-backend-master-user-cluster-role-binding
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: fwd-backend-master-user
    namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fwd-backend-master-user-cluster-role
{{- if $logsEnabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fwd-log-aggregator-user
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-log-aggregator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fwd-log-aggregator-user-cluster-role
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["create","get","list","update","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fwd-log-aggregator-user-cluster-role-binding
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: fwd-log-aggregator-user
    namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fwd-log-aggregator-user-cluster-role
{{- end }}
{{- if $cbrEnabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fwd-cbr-settings-user
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-cbr-server
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fwd-cbr-settings-role
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps","secrets"]
    verbs: ["create","get","list","update","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fwd-cbr-settings-role-binding
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: fwd-cbr-settings-user
    namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fwd-cbr-settings-role
{{- if default false $cbrS3Backup.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fwd-s3-backup-settings
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-cbr-server
data:
  enabled: "true"
  backupTime: {{ default "01:30" $cbrS3Backup.backupTime | quote }}
  numDaysToRetain: {{ printf "%v" (default 30 $cbrS3Backup.numDaysToRetain) | quote }}
  includeSnapshots: {{ ternary "true" "false" (default false $cbrS3Backup.includeSnapshots) | quote }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: fwd-cbr-s3-settings-sync
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-cbr-server
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "skyforge.labels" . | nindent 8 }}
        app.kubernetes.io/name: fwd-cbr-s3-settings-sync
    spec:
      serviceAccountName: fwd-cbr-settings-user
      restartPolicy: Never
      containers:
        - name: sync
          image: {{ .Values.images.kubectl | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: SOURCE_NAMESPACE
              value: {{ default .Release.Namespace $cbrS3Backup.sourceSecretNamespace | quote }}
            - name: ACCESS_KEY_SECRET_NAME
              value: {{ required "skyforge.forwardCluster.core.cbr.s3Backup.accessKeySecretName is required when cbr.s3Backup.enabled=true" $cbrS3Backup.accessKeySecretName | quote }}
            - name: ACCESS_KEY_SECRET_KEY
              value: {{ required "skyforge.forwardCluster.core.cbr.s3Backup.accessKeySecretKey is required when cbr.s3Backup.enabled=true" $cbrS3Backup.accessKeySecretKey | quote }}
            - name: SECRET_KEY_SECRET_NAME
              value: {{ required "skyforge.forwardCluster.core.cbr.s3Backup.secretKeySecretName is required when cbr.s3Backup.enabled=true" $cbrS3Backup.secretKeySecretName | quote }}
            - name: SECRET_KEY_SECRET_KEY
              value: {{ required "skyforge.forwardCluster.core.cbr.s3Backup.secretKeySecretKey is required when cbr.s3Backup.enabled=true" $cbrS3Backup.secretKeySecretKey | quote }}
            - name: BUCKET_NAME
              value: {{ default "forward-platform-backups" $cbrS3Backup.bucketName | quote }}
            - name: SERVICE_ENDPOINT
              value: {{ required "skyforge.forwardCluster.core.cbr.s3Backup.serviceEndpoint is required when cbr.s3Backup.enabled=true" $cbrS3Backup.serviceEndpoint | quote }}
            - name: DISABLE_SSL_VALIDATION
              value: {{ ternary "true" "false" (default false $cbrS3Backup.disableSslValidation) | quote }}
            - name: DISABLE_CHECKSUM_VALIDATION
              value: {{ ternary "true" "false" (default false $cbrS3Backup.disableChecksumValidation) | quote }}
            - name: WRITE_ONLY
              value: {{ ternary "true" "false" (default false $cbrS3Backup.writeOnly) | quote }}
          command: ["/bin/sh","-c"]
          args:
            - |
              set -eu
              KUBECTL_BIN="/opt/bitnami/kubectl/bin/kubectl"
              if [ ! -x "${KUBECTL_BIN}" ]; then
                KUBECTL_BIN="$(command -v kubectl)"
              fi
              secret_value() {
                "${KUBECTL_BIN}" -n "${SOURCE_NAMESPACE}" get secret "$1" -o "jsonpath={.data['$2']}" | base64 -d
              }
              access_key="$(secret_value "${ACCESS_KEY_SECRET_NAME}" "${ACCESS_KEY_SECRET_KEY}")"
              secret_key="$(secret_value "${SECRET_KEY_SECRET_NAME}" "${SECRET_KEY_SECRET_KEY}")"
              "${KUBECTL_BIN}" -n {{ $ns | quote }} create secret generic fwd-s3-backup-settings \
                --from-literal=accessKey="${access_key}" \
                --from-literal=secretKey="${secret_key}" \
                --from-literal=bucketName="${BUCKET_NAME}" \
                --from-literal=serviceEndpoint="${SERVICE_ENDPOINT}" \
                --from-literal=disableSslValidation="${DISABLE_SSL_VALIDATION}" \
                --from-literal=certificate="" \
                --from-literal=writeOnly="${WRITE_ONLY}" \
                --from-literal=disableChecksumValidation="${DISABLE_CHECKSUM_VALIDATION}" \
                --dry-run=client -o yaml | "${KUBECTL_BIN}" apply -f -
{{- end }}
{{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: fwd-appserver
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-appserver
spec:
  selector:
    app.kubernetes.io/name: fwd-appserver
  ports:
    - name: http
      port: {{ default 8080 (default (dict) $app.service).httpPort }}
      targetPort: {{ default 8080 (default (dict) $app.service).httpPort }}
    - name: https
      port: {{ default 8443 (default (dict) $app.service).httpsPort }}
      targetPort: {{ default 8443 (default (dict) $app.service).httpsPort }}
---
apiVersion: v1
kind: Service
metadata:
  name: fwd-backend-master
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-backend-master
spec:
  selector:
    app.kubernetes.io/name: fwd-backend-master
  ports:
    - name: grpc
      port: {{ default 30040 (default (dict) $backend.service).port }}
      targetPort: {{ default 30040 (default (dict) $backend.service).port }}
{{- if $logsEnabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: fwd-log-aggregator
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-log-aggregator
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: fwd-log-aggregator
  ports:
    - name: forward
      port: {{ default 24224 (default (dict) $logs.service).port }}
      targetPort: {{ default 24224 (default (dict) $logs.service).port }}
{{- range $i, $_ := until (int (default 2 $logs.replicas)) }}
---
apiVersion: v1
kind: Service
metadata:
  name: fwd-log-aggregator-{{ $i }}
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" $ | nindent 4 }}
    app.kubernetes.io/name: fwd-log-aggregator
spec:
  selector:
    statefulset.kubernetes.io/pod-name: fwd-log-aggregator-{{ $i }}
  ports:
    - name: forward
      port: {{ default 24224 (default (dict) $logs.service).port }}
      targetPort: {{ default 24224 (default (dict) $logs.service).port }}
{{- end }}
{{- end }}
{{- if $cbrEnabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: fwd-cbr-server
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-cbr-server
spec:
  selector:
    app.kubernetes.io/name: fwd-cbr-server
  ports:
    - name: http
      port: {{ default 40099 (default (dict) $cbrServer.service).httpPort }}
      targetPort: {{ default 40099 (default (dict) $cbrServer.service).httpPort }}
    - name: grpc
      port: {{ default 40100 (default (dict) $cbrServer.service).grpcPort }}
      targetPort: {{ default 40100 (default (dict) $cbrServer.service).grpcPort }}
---
apiVersion: v1
kind: Service
metadata:
  name: fwd-cbr-agent-headless
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-cbr-agent
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: fwd-cbr-agent
  ports:
    - name: grpc
      port: {{ default 40101 (default (dict) $cbrAgent.service).grpcPort }}
      targetPort: {{ default 40101 (default (dict) $cbrAgent.service).grpcPort }}
{{- if default false $cbrS3Agent.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: fwd-cbr-s3-agent-headless
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-cbr-s3-agent
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: fwd-cbr-s3-agent
  ports:
    - name: grpc
      port: {{ default 40101 (default (dict) $cbrS3Agent.service).grpcPort }}
      targetPort: {{ default 40101 (default (dict) $cbrS3Agent.service).grpcPort }}
{{- end }}
{{- end }}
{{- if default false $nqeAssist.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: fwd-nqe-assist
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-nqe-assist
spec:
  selector:
    app.kubernetes.io/name: fwd-nqe-assist
  ports:
    - name: http
      port: {{ default 9988 $nqeAssist.port }}
      targetPort: http
{{- end }}
{{- if default false $baml.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: fwd-baml-server
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-baml-server
spec:
  selector:
    app.kubernetes.io/name: fwd-baml-server
  ports:
    - name: http
      port: {{ default 2024 $baml.port }}
      targetPort: http
{{- end }}

{{- if $logForwardingEnabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fwd-appserver-fluent-bit-config
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-appserver
data:
  {{- include "skyforge.forwardCore.appserverLogForwarderConfig" (dict "enabled" true "logsDir" $logsDir "outputs" $fluentBitOutputs) | nindent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fwd-backend-master-fluent-bit-config
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-backend-master
data:
  {{- include "skyforge.forwardWorker.logForwarderConfig" (dict
      "enabled" true
      "serviceTag" "backend_master"
      "serviceLogFile" "backend_master"
      "logsDir" $logsDir
      "outputs" $fluentBitOutputs
    ) | nindent 2 }}
{{- if $cbrEnabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fwd-cbr-server-fluent-bit-config
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-cbr-server
data:
  {{- include "skyforge.forwardWorker.logForwarderConfig" (dict
      "enabled" true
      "serviceTag" "cbr_server"
      "serviceLogFile" "cbr_server"
      "logsDir" $logsDir
      "outputs" $fluentBitOutputs
    ) | nindent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fwd-cbr-agent-fluent-bit-config
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-cbr-agent
data:
  {{- include "skyforge.forwardWorker.logForwarderConfig" (dict
      "enabled" true
      "serviceTag" "cbr_agent"
      "serviceLogFile" "cbr_agent"
      "logsDir" $logsDir
      "outputs" $fluentBitOutputs
    ) | nindent 2 }}
{{- if default false $cbrS3Agent.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fwd-cbr-s3-agent-fluent-bit-config
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-cbr-s3-agent
data:
  {{- include "skyforge.forwardWorker.logForwarderConfig" (dict
      "enabled" true
      "serviceTag" "cbr_s3_agent"
      "serviceLogFile" "cbr_s3_agent"
      "logsDir" $logsDir
      "outputs" $fluentBitOutputs
    ) | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}
{{- if $logsEnabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-aggregator-config
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-log-aggregator
data:
  fluent.conf: |
    <source>
      @type forward
      port {{ default 24224 (default (dict) $logs.service).port }}
      bind 0.0.0.0
    </source>
    <match **>
      @type file
      path {{ $aggregatedLogsDir }}/aggregated
      append true
      <buffer>
        flush_mode interval
        flush_interval 5s
      </buffer>
    </match>
{{- end }}

{{- if and $usePVCs $appserverImage }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-fwd-appserver
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ default "20Gi" (default (dict) $app.pvc).size }}
  {{- with (default "" (default (dict) $app.pvc).storageClassName) }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
{{- if and $usePVCs $backendImage }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-fwd-backend-master
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ default "20Gi" (default (dict) $backend.pvc).size }}
  {{- with (default "" (default (dict) $backend.pvc).storageClassName) }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
{{- if and $usePVCs $cbrEnabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-fwd-cbr-server
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ default "20Gi" (default (dict) $cbrServer.pvc).size }}
  {{- with (default "" (default (dict) $cbrServer.pvc).storageClassName) }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-fwd-cbr-agent
