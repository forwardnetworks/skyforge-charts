      {{- with include "skyforge.workloadPlacementSpec" (list $corePlacement) }}
{{ . | nindent 6 }}
      {{- end }}
      initContainers:
        - name: fix-permissions
          image: {{ $alpineImage | quote }}
          imagePullPolicy: {{ $pullPolicy | quote }}
          command: ["/bin/sh","-c"]
          args:
            - >-
              mkdir -p /mnt/scratch/tmp /mnt/scratch/logs /mnt/scratch/scratch-data &&
              chown {{ $runAsUser }}:{{ $fsGroup }} -R /mnt/scratch
          volumeMounts:
            - name: scratch
              mountPath: /mnt/scratch
      containers:
        - name: appserver
          image: {{ required "skyforge.forwardCluster.core.appserver.image or skyforge.forwardImages.tag is required when core.owner=skyforge" $appserverImage | quote }}
          imagePullPolicy: {{ $pullPolicy | quote }}
          securityContext:
            runAsUser: {{ $runAsUser }}
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          resources:
{{ toYaml $app.resources | nindent 12 }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh","-c","sleep {{ default 20 $rollout.preStopSleepSeconds }}"]
          ports:
            - name: http
              containerPort: {{ default 8080 (default (dict) $app.service).httpPort }}
            - name: https
              containerPort: {{ default 8443 (default (dict) $app.service).httpsPort }}
          volumeMounts:
            - name: scratch
              mountPath: {{ $logsDir }}
              subPath: fwd-appserver/logs
            - name: scratch
              mountPath: {{ $scratchDataDir }}
              subPath: fwd-appserver/scratch-data
            - name: scratch
              mountPath: /tmp
              subPath: fwd-appserver/tmp
            {{- include "skyforge.forwardWorker.dbVolumeMounts" (dict "mode" $dbMode "certificate" $dbCert) | nindent 12 }}
          {{- include "skyforge.forwardWorker.probes" (dict
              "port" (default 8080 (default (dict) $app.service).httpPort)
              "initialDelaySeconds" (default 10 $app.probes.initialDelaySeconds)
              "periodSeconds" (default 60 $app.probes.periodSeconds)
              "failureThreshold" (default 10 $app.probes.failureThreshold)
              "timeoutSeconds" (default 3 $app.probes.timeoutSeconds)
            ) | nindent 10 }}
          envFrom:
            - configMapRef:
                name: {{ $memoryProfileConfigMapName | quote }}
          env:
            - name: NAMESPACE
              value: {{ $ns | quote }}
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: APP_SERVER_PROFILES
              value: {{ default "K8S" $app.profiles | quote }}
            - name: MEMORY_PROFILE
              value: {{ default "" $app.memoryProfile | quote }}
            - name: APPSERVER_SETTINGS
              value: {{ include "skyforge.forwardCore.appserverSettings" . | quote }}
            - name: COLLECTOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: collector.credentials
                  key: password
            {{- if default false $nqeAssist.enabled }}
            - name: NQE_ASSIST_PARAMS
              value: {{ printf "-Dnqe_assist.url=http://fwd-nqe-assist.%s.svc.cluster.local:%v" $ns (default 9988 $nqeAssist.port) | quote }}
            {{- end }}
            {{- if default false $baml.enabled }}
            - name: AI_CHAT_PARAMS
              value: {{ printf "-Dai.chats.baml_url=http://fwd-baml-server.%s.svc.cluster.local:%v" $ns (default 2024 $baml.port) | quote }}
            {{- end }}
            {{- if gt (int (default 0 $app.memoryLimitMB)) 0 }}
            - name: APP_SERVER_MEMORY_LIMIT_MB
              value: {{ printf "%v" $app.memoryLimitMB | quote }}
            {{- end }}
            {{- if (default "" $app.memoryPctOverride) }}
            - name: APPSERVER_MEMORY_PCT_OVERRIDE
              value: {{ $app.memoryPctOverride | quote }}
            {{- end }}
            {{- include "skyforge.forwardWorker.postgresEnv" (dict "db" $db "mode" $dbMode) | nindent 12 }}
        {{- include "skyforge.forwardWorker.logForwarderContainer" (dict
            "enabled" $logForwardingEnabled
            "image" $fluentBitImage
            "pullPolicy" $pullPolicy
            "runAsUser" $runAsUser
            "httpPort" $fluentBitHTTPPort
            "logsDir" $logsDir
            "serviceName" "fwd-appserver"
            "configMapVolumeName" "log-forwarder-config"
          ) | nindent 8 }}
      volumes:
        - name: scratch
          {{- if $usePVCs }}
          persistentVolumeClaim:
            claimName: pvc-fwd-appserver
          {{- else }}
          hostPath:
            path: {{ $scratchHostPath | quote }}
            type: DirectoryOrCreate
          {{- end }}
        {{- if $logForwardingEnabled }}
        - name: log-forwarder-config
          configMap:
            name: fwd-appserver-fluent-bit-config
        {{- end }}
        {{- include "skyforge.forwardWorker.dbVolumes" (dict "mode" $dbMode "certificate" $dbCert) | nindent 8 }}

