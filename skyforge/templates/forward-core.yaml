          volumeMounts:
            - name: scratch
              mountPath: {{ $logsDir }}
              subPath: fwd-cbr-s3-agent/logs
            - name: scratch
              mountPath: {{ $scratchDataDir }}
              subPath: fwd-cbr-s3-agent/scratch-data
            - name: scratch
              mountPath: /tmp
              subPath: fwd-cbr-s3-agent/tmp
        {{- include "skyforge.forwardWorker.logForwarderContainer" (dict
            "enabled" $logForwardingEnabled
            "image" $fluentBitImage
            "pullPolicy" $pullPolicy
            "runAsUser" $runAsUser
            "httpPort" $fluentBitHTTPPort
            "logsDir" $logsDir
            "serviceName" "fwd-cbr-s3-agent"
            "configMapVolumeName" "log-forwarder-config"
          ) | nindent 8 }}
      volumes:
        - name: scratch
          {{- if $usePVCs }}
          persistentVolumeClaim:
            claimName: pvc-fwd-cbr-s3-agent
          {{- else }}
          hostPath:
            path: {{ $scratchHostPath | quote }}
            type: DirectoryOrCreate
          {{- end }}
        {{- if $logForwardingEnabled }}
        - name: log-forwarder-config
          configMap:
            name: fwd-cbr-s3-agent-fluent-bit-config
        {{- end }}
{{- end }}
{{- end }}

{{- if default false $nqeAssist.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fwd-nqe-assist
  namespace: {{ $ns }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/name: fwd-nqe-assist
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fwd-nqe-assist
  template:
    metadata:
      labels:
        {{- include "skyforge.labels" . | nindent 8 }}
        app.kubernetes.io/name: fwd-nqe-assist
    spec:
      {{- include "skyforge.forwardCore.imagePullSecrets" . | nindent 6 }}
      {{- with include "skyforge.workloadPlacementSpec" (list $corePlacement) }}
{{ . | nindent 6 }}
      {{- end }}
      initContainers:
        - name: ai-credentials-contract-check
          image: {{ $alpineImage | quote }}
          imagePullPolicy: {{ $pullPolicy | quote }}
          command: ["/bin/sh","-c"]
          args:
            - |
              set -eu
              [ -n "${AWS_ACCESS_KEY_ID:-}" ] || { echo "missing AWS_ACCESS_KEY_ID"; exit 1; }
              [ -n "${AWS_SECRET_ACCESS_KEY:-}" ] || { echo "missing AWS_SECRET_ACCESS_KEY"; exit 1; }
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $aiCredsSecretName | quote }}
                  key: {{ $aiCredsAccessKeyIDKey | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $aiCredsSecretName | quote }}
                  key: {{ $aiCredsSecretAccessKeyKey | quote }}
      containers:
        - name: nqe-assist
          image: {{ required "skyforge.forwardCluster.core.nqeAssist.image or skyforge.forwardImages.tag is required when nqeAssist.enabled=true" $nqeAssistImage | quote }}
          imagePullPolicy: {{ $pullPolicy | quote }}
          resources:
{{ toYaml $nqeAssist.resources | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ default 9988 $nqeAssist.port }}
          env:
            - name: FWD_URL
              value: {{ printf "https://fwd-appserver.%s.svc.cluster.local:8443" $ns | quote }}
            - name: AWS_REGION
              value: {{ default "us-west-2" $nqeAssist.awsRegion | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $aiCredsSecretName | quote }}
                  key: {{ $aiCredsAccessKeyIDKey | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $aiCredsSecretName | quote }}
                  key: {{ $aiCredsSecretAccessKeyKey | quote }}
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $aiCredsSecretName | quote }}
                  key: {{ $aiCredsSessionTokenKey | quote }}
                  optional: true
            - name: AWS_DEFAULT_REGION
              value: {{ default "us-west-2" $nqeAssist.awsRegion | quote }}
          envFrom:
            - secretRef:
                name: {{ default "fwd-app-creds-for-nqe-assist" $nqeAssist.appCredentialsSecretName | quote }}
{{- end }}

