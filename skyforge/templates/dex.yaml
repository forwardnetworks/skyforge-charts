{{- if .Values.skyforge.dex.enabled -}}
{{- $dexPlacement := default (dict) .Values.skyforge.dex.placement -}}
{{- $dexConfigChecksum := "" -}}
{{- if .Values.skyforge.dex.manageConfig -}}
  {{- $dexConfigChecksum = (include (print $.Template.BasePath "/dex-config-secret.yaml") . | sha256sum) -}}
{{- else -}}
  {{- $dexConfigValue := "" -}}
  {{- $dexConfigSecret := lookup "v1" "Secret" .Release.Namespace "dex-config" -}}
  {{- if and $dexConfigSecret (index $dexConfigSecret.data "config.yaml") -}}
    {{- $dexConfigValue = ((index $dexConfigSecret.data "config.yaml") | b64dec) -}}
  {{- else if and .Values.secrets .Values.secrets.items -}}
    {{- $dexConfig := (index .Values.secrets.items "dex-config") -}}
    {{- if $dexConfig -}}
      {{- $dexConfigValue = (index $dexConfig "config.yaml" | default "") -}}
    {{- end -}}
  {{- end -}}
  {{- $dexConfigChecksum = ($dexConfigValue | sha256sum) -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: dex
  name: dex
spec:
  replicas: {{ default 1 .Values.skyforge.dex.replicas }}
  strategy:
{{ toYaml (default (dict "type" "RollingUpdate" "rollingUpdate" (dict "maxUnavailable" 0 "maxSurge" 1)) .Values.skyforge.dex.strategy) | nindent 4 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: dex
  template:
    metadata:
      annotations:
        checksum/dex-config: {{ $dexConfigChecksum }}
        checksum/dex-config-patcher: {{ include (print $.Template.BasePath "/dex-config-patcher.yaml") . | sha256sum }}
      labels:
        app.kubernetes.io/name: dex
        skyforge.forwardnetworks.com/spread-group: skyforge-auth
    spec:
{{- with .Values.skyforge.dex.dnsConfig }}
      dnsConfig:
{{ toYaml . | nindent 8 }}
{{- end }}
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: {{ default "ScheduleAnyway" (index $dexPlacement "topologyWhenUnsatisfiable") }}
        labelSelector:
          matchLabels:
            skyforge.forwardnetworks.com/spread-group: skyforge-auth
      affinity:
        podAntiAffinity:
{{- if (default false (index $dexPlacement "requiredAntiAffinity")) }}
          requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: dex
{{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: dex
{{- end }}
{{- with include "skyforge.workloadNodeAffinity" (list $dexPlacement) }}
{{ . | nindent 8 }}
{{- end }}
{{- with include "skyforge.workloadPlacementSpec" (list $dexPlacement) }}
{{ . | nindent 6 }}
{{- end }}
      initContainers:
        - name: patch-config
          image: {{ .Values.images.python | quote }}
          env:
            - name: DEX_WEB_THEME
              value: {{ .Values.skyforge.dex.webTheme | default "" | quote }}
            - name: DEX_LOGO_URL
              value: {{ .Values.skyforge.dex.logoUrl | default "" | quote }}
          command:
            - sh
            - -c
            - python /config/patch.py
          volumeMounts:
            - name: dex-config-template
              mountPath: /config
              readOnly: true
            - name: dex-config-src
              mountPath: /etc/dex-src
              readOnly: true
            - name: dex-config
              mountPath: /etc/dex
      containers:
        - name: dex
          image: {{ .Values.images.dex | quote }}
          command: ["dex"]
          args: ["serve", "/etc/dex/config.yaml"]
          resources:
{{ toYaml .Values.skyforge.dex.resources | nindent 12 }}
          ports:
            - containerPort: 5556
          volumeMounts:
            - name: dex-config
              mountPath: /etc/dex
              readOnly: true
            - name: dex-data
              mountPath: /var/dex
      volumes:
        - name: dex-config
          emptyDir: {}
        - name: dex-data
          emptyDir: {}
        - name: dex-config-src
          secret:
            secretName: dex-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: dex-config-template
          configMap:
            name: dex-config-patcher
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: dex
  name: dex
spec:
  ports:
    - name: http
      port: 5556
      targetPort: 5556
  selector:
    app.kubernetes.io/name: dex
{{- end }}
