{{- if .Values.skyforge.coder.enabled -}}
{{- $publicCA := default (dict) .Values.skyforge.coder.personalWorkspace.publicCA -}}
{{- $secretName := default "" $publicCA.secretName -}}
{{- $secretKey := default "ca.crt" $publicCA.secretKey -}}
{{- $pem := default "" $publicCA.pem -}}
{{- $existing := dict -}}
{{- if ne $secretName "" -}}
  {{- $existing = (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
{{- end -}}
{{- if and (ne $secretName "") (or (ne $pem "") $existing) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  annotations:
    "helm.sh/resource-policy": keep
  labels:
{{ include "skyforge.labels" . | indent 4 }}
type: Opaque
data:
  {{ $secretKey }}: {{- if ne $pem "" }} {{ b64enc $pem | quote }}{{- else }} {{ default "" (index $existing.data $secretKey) | quote }}{{- end }}
{{- end }}
{{- end }}
