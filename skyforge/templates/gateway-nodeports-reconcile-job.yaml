{{- $nodePorts := .Values.skyforge.gateway.localNodePorts -}}
{{- if (default false $nodePorts.enabled) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: gateway-nodeports-reconcile
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-5"
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "skyforge.labels" . | nindent 8 }}
    spec:
      serviceAccountName: skyforge-server
      restartPolicy: Never
      automountServiceAccountToken: true
      containers:
        - name: reconcile
          image: {{ .Values.images.kubectl | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -euo pipefail
              ns="{{ .Release.Namespace }}"
              svc="{{ default "cilium-gateway-skyforge" $nodePorts.serviceName }}"
              http_np="{{ int (default 30080 $nodePorts.http) }}"
              https_np="{{ int (default 30443 $nodePorts.https) }}"

              echo "Waiting for ${ns}/${svc}"
              for i in $(seq 1 120); do
                if kubectl -n "${ns}" get service "${svc}" >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done
              kubectl -n "${ns}" get service "${svc}" >/dev/null

              patch='{"spec":{"ports":[{"name":"port-80","port":80,"protocol":"TCP","targetPort":80,"nodePort":'"${http_np}"'},{"name":"port-443","port":443,"protocol":"TCP","targetPort":443,"nodePort":'"${https_np}"'}]}}'
              kubectl -n "${ns}" patch service "${svc}" --type merge -p "${patch}" >/dev/null

              actual_http="$(kubectl -n "${ns}" get service "${svc}" -o jsonpath='{.spec.ports[?(@.name=="port-80")].nodePort}')"
              actual_https="$(kubectl -n "${ns}" get service "${svc}" -o jsonpath='{.spec.ports[?(@.name=="port-443")].nodePort}')"

              if [ "${actual_http}" != "${http_np}" ] || [ "${actual_https}" != "${https_np}" ]; then
                echo "nodePort reconcile failed: have http=${actual_http} https=${actual_https} want http=${http_np} https=${https_np}" >&2
                exit 1
              fi

              echo "Gateway nodePorts pinned: http=${actual_http} https=${actual_https}"
{{- end }}
