{{- $nodePorts := .Values.skyforge.gateway.localNodePorts -}}
{{- if (default false $nodePorts.enabled) }}
{{- $hookEvents := list "post-install" -}}
{{- if .Values.skyforge.hooks.gatewayNodePortsReconcile.runOnUpgrade -}}
{{- $hookEvents = append $hookEvents "post-upgrade" -}}
{{- end -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: gateway-nodeports-reconcile
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: {{ join "," $hookEvents | quote }}
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
    helm.sh/hook-weight: "-5"
spec:
  backoffLimit: {{ default 1 .Values.skyforge.hooks.gatewayNodePortsReconcile.backoffLimit }}
  activeDeadlineSeconds: {{ default 300 .Values.skyforge.hooks.gatewayNodePortsReconcile.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "skyforge.labels" . | nindent 8 }}
    spec:
      serviceAccountName: skyforge-server
      restartPolicy: Never
      automountServiceAccountToken: true
      containers:
        - name: reconcile
          image: {{ .Values.images.kubectl | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              KUBECTL_BIN="/opt/bitnami/kubectl/bin/kubectl"
              if [ ! -x "${KUBECTL_BIN}" ]; then
                KUBECTL_BIN="$(command -v kubectl || true)"
              fi
              if [ -z "${KUBECTL_BIN}" ]; then
                echo "kubectl binary not found in hook image" >&2
                exit 1
              fi
              ns="{{ .Release.Namespace }}"
              svc="{{ default "cilium-gateway-skyforge" $nodePorts.serviceName }}"
              http_np="{{ int (default 30080 $nodePorts.http) }}"
              https_np="{{ int (default 30443 $nodePorts.https) }}"

              echo "Waiting for ${ns}/${svc}"
              for i in $(seq 1 120); do
                if "${KUBECTL_BIN}" -n "${ns}" get service "${svc}" >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done
              "${KUBECTL_BIN}" -n "${ns}" get service "${svc}" >/dev/null

              patch='{"spec":{"ports":[{"name":"port-80","port":80,"protocol":"TCP","targetPort":80,"nodePort":'"${http_np}"'},{"name":"port-443","port":443,"protocol":"TCP","targetPort":443,"nodePort":'"${https_np}"'}]}}'
              "${KUBECTL_BIN}" -n "${ns}" patch service "${svc}" --type merge -p "${patch}" >/dev/null

              actual_http="$("${KUBECTL_BIN}" -n "${ns}" get service "${svc}" -o jsonpath='{.spec.ports[?(@.name=="port-80")].nodePort}')"
              actual_https="$("${KUBECTL_BIN}" -n "${ns}" get service "${svc}" -o jsonpath='{.spec.ports[?(@.name=="port-443")].nodePort}')"

              if [ "${actual_http}" != "${http_np}" ] || [ "${actual_https}" != "${https_np}" ]; then
                echo "nodePort reconcile failed: have http=${actual_http} https=${actual_https} want http=${http_np} https=${https_np}" >&2
                exit 1
              fi

              echo "Gateway nodePorts pinned: http=${actual_http} https=${actual_https}"
{{- end }}
