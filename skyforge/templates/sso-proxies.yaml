{{- /*
SSO reverse proxies for tool UIs behind Cilium Gateway API.

Goal:
- No Traefik.
- No NGINX.
- Still enforce Skyforge SSO and inject identity headers for tools that don't natively speak OIDC.

Approach:
- Run small Envoy proxies per tool that:
  1) call Skyforge auth endpoint via `envoy.filters.http.ext_authz`
  2) inject returned identity headers into the upstream request
  3) redirect unauthenticated users to the auth-mode-specific Skyforge login entry
     (`/status?signin=1...` for password mode, `/api/auth/oidc/login?...` for oidc mode)

We keep these proxies per-tool so redirects preserve each tool's external prefix
(/git, /nautobot, etc.) even when the Gateway URL-rewrites the prefix away.
*/ -}}

{{- define "skyforge.ssoProxyEnvoy" -}}
{{- $root := .root -}}
{{- $name := .name -}}
{{- $upstreamServiceEnv := .upstreamServiceEnv -}}
{{- $upstreamHost := default "" .upstreamHost -}}
{{- $upstreamPort := .upstreamPort -}}
{{- $externalPrefix := .externalPrefix -}}
{{- $responsePrefixRewrite := .responsePrefixRewrite -}}
{{- $skyforgeHost := default "skyforge.local.forwardnetworks.com" $root.Values.skyforge.hostname -}}
{{- $enableAccessLog := default false $root.Values.skyforge.debug.ssoProxyAccessLog -}}
{{- $envoyImage := default "envoyproxy/envoy:v1.31.2" $root.Values.images.envoy -}}
{{- $busyboxImage := default "docker.io/library/busybox:1.36.1" $root.Values.images.busybox -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-envoy
  labels:
    {{- include "skyforge.labels" $root | nindent 4 }}
data:
  envoy.yaml.tmpl: |
    admin:
      access_log_path: /tmp/admin_access.log
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901

    static_resources:
      listeners:
        - name: listener_http
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8080
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    normalize_path: true
                    use_remote_address: true
                    stream_idle_timeout: 300s
                    {{- if $enableAccessLog }}
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                          log_format:
                            text_format_source:
                              inline_string: >-
                                [%START_TIME%] %REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% host=%REQ(:AUTHORITY)% xf_host=%REQ(X-FORWARDED-HOST)% xf_proto=%REQ(X-FORWARDED-PROTO)% xf_prefix=%REQ(X-FORWARDED-PREFIX)% -> %RESPONSE_CODE% loc=%RESP(LOCATION)% upstream=%UPSTREAM_HOST%\n
                    {{- end }}
                    upgrade_configs:
                      - upgrade_type: websocket
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: local_service
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: /
                              route:
                                cluster: upstream
                    http_filters:
                      - name: envoy.filters.http.lua
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                          inlineCode: |
                            local host = {{ $skyforgeHost | quote }}
                            local proto = "https"
                            local prefix = {{ default "" $externalPrefix | quote }}
                            local response_prefix = {{ default "" $responsePrefixRewrite | quote }}
                            local response_host = {{ printf "https://%s" $skyforgeHost | quote }}

                            function envoy_on_request(handle)
                              local headers = handle:headers()
                              headers:replace("x-forwarded-proto", proto)
                              headers:replace("x-forwarded-host", host)
                              if prefix ~= nil and prefix ~= "" then
                                headers:replace("x-forwarded-prefix", prefix)
                                headers:replace("x-skyforge-external-prefix", prefix)
                              end
                            end

                            local function rewrite_location(location)
                              if response_prefix == nil or response_prefix == "" then
                                return location
                              end
                              if location == nil or location == "" then
                                return location
                              end
                              if string.sub(location, 1, #response_host) == response_host then
                                local rest = string.sub(location, #response_host + 1)
                                if string.sub(rest, 1, #response_prefix) == response_prefix then
                                  return location
                                end
                                if string.sub(rest, 1, 1) == "/" then
                                  return response_host .. response_prefix .. rest
                                end
                                return location
                              end
                              if string.sub(location, 1, #response_prefix) == response_prefix then
                                return location
                              end
                              if string.sub(location, 1, 1) == "/" then
                                return response_prefix .. location
                              end
                              return location
                            end

                            function envoy_on_response(handle)
                              local headers = handle:headers()
                              local location = headers:get("location")
                              local rewritten = rewrite_location(location)
                              if rewritten ~= nil and rewritten ~= location then
                                headers:replace("location", rewritten)
                              end
                            end
                      - name: envoy.filters.http.ext_authz
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                          transport_api_version: V3
                          failure_mode_allow: false
                          http_service:
                            server_uri:
                              uri: http://${SKYFORGE_SERVER_HOST}:8085
                              cluster: skyforge_server
                              timeout: 2s
                            path_prefix: /api/auth/forwardauth/envoy
                            authorization_request:
                              allowed_headers:
                                patterns:
                                  - exact: cookie
                                  - exact: x-forwarded-proto
                                  - exact: x-forwarded-host
                                  - exact: x-forwarded-for
                                  - exact: x-forwarded-uri
                                  - exact: x-forwarded-prefix
                                  - exact: user-agent
                                  - exact: accept
                                  - exact: accept-language
                                  - exact: x-skyforge-external-prefix
                            authorization_response:
                              allowed_upstream_headers:
                                patterns:
                                  - exact: remote-user
                                  - exact: remote-user-group
                                  - exact: remote-user-email
                                  - exact: remote-user-first-name
                                  - exact: remote-user-last-name
                                  - exact: x-forwarded-user
                                  - exact: x-forwarded-email
                                  - exact: x-forwarded-first-name
                                  - exact: x-forwarded-last-name
                              allowed_client_headers:
                                patterns:
                                  - exact: location
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        - name: skyforge_server
          type: STATIC
          connect_timeout: 2s
          load_assignment:
            cluster_name: skyforge_server
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: ${SKYFORGE_SERVER_HOST}
                          port_value: 8085

        - name: upstream
          type: STRICT_DNS
          dns_lookup_family: V4_ONLY
          connect_timeout: 5s
          load_assignment:
            cluster_name: upstream
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: ${UPSTREAM_HOST}
                          port_value: {{ $upstreamPort }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "skyforge.labels" $root | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        app.kubernetes.io/component: sso-proxy
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: render-envoy-config
          image: {{ $busyboxImage | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ceu
            - |
              : "${SKYFORGE_SERVER_SERVICE_HOST:?missing SKYFORGE_SERVER_SERVICE_HOST}"
              upstream_host={{ $upstreamHost | quote }}
              if [ -z "${upstream_host}" ]; then
                {{- if $upstreamServiceEnv }}
                upstream_host="$(printenv {{ $upstreamServiceEnv | quote }})"
                : "${upstream_host:?missing {{ $upstreamServiceEnv }}}"
                {{- else }}
                echo "missing upstreamHost or upstreamServiceEnv for {{ $name }}" >&2
                exit 1
                {{- end }}
              fi
              export SKYFORGE_SERVER_HOST="${SKYFORGE_SERVER_SERVICE_HOST}"
              export UPSTREAM_HOST="${upstream_host}"
              sed \
                -e "s|\${SKYFORGE_SERVER_HOST}|${SKYFORGE_SERVER_HOST}|g" \
                -e "s|\${UPSTREAM_HOST}|${UPSTREAM_HOST}|g" \
                /etc/envoy-template/envoy.yaml.tmpl > /etc/envoy-rendered/envoy.yaml
          volumeMounts:
            - name: envoy-template
              mountPath: /etc/envoy-template
            - name: envoy-rendered
              mountPath: /etc/envoy-rendered
      containers:
        - name: envoy
          image: {{ $envoyImage | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - "-c"
            - "/etc/envoy-rendered/envoy.yaml"
          ports:
            - name: http
              containerPort: 8080
            - name: admin
              containerPort: 9901
          readinessProbe:
            httpGet:
              path: /ready
              port: 9901
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /ready
              port: 9901
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          volumeMounts:
            - name: envoy-rendered
              mountPath: /etc/envoy-rendered
      volumes:
        - name: envoy-template
          configMap:
            name: {{ $name }}-envoy
        - name: envoy-rendered
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "skyforge.labels" $root | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ $root.Release.Name }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
{{- end }}

{{ if .Values.skyforge.netbox.enabled }}
{{ include "skyforge.ssoProxyEnvoy" (dict "root" $ "name" "netbox-sso-proxy" "upstreamServiceEnv" "NETBOX_SERVICE_HOST" "upstreamPort" 8080 "externalPrefix" "") }}
{{ end }}

{{ if .Values.skyforge.nautobot.enabled }}
{{ include "skyforge.ssoProxyEnvoy" (dict "root" $ "name" "nautobot-sso-proxy" "upstreamServiceEnv" "NAUTOBOT_SERVICE_HOST" "upstreamPort" 8080 "responsePrefixRewrite" "/nautobot") }}
{{ end }}

{{ if .Values.skyforge.gitea.enabled }}
{{ include "skyforge.ssoProxyEnvoy" (dict "root" $ "name" "gitea-sso-proxy" "upstreamServiceEnv" "GITEA_SERVICE_HOST" "upstreamPort" 3000 "externalPrefix" "/git") }}
{{ end }}

{{ if .Values.skyforge.redoc.enabled }}
{{ include "skyforge.ssoProxyEnvoy" (dict "root" $ "name" "redoc-sso-proxy" "upstreamServiceEnv" "REDOC_SERVICE_HOST" "upstreamPort" 80 "externalPrefix" "/redoc") }}
{{ end }}
