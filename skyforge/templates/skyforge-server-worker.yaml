{{- $workerPriorityClass := default .Values.skyforge.corePriorityClassName .Values.skyforge.worker.priorityClassName -}}
{{- $forwardClusterEnabled := default false .Values.skyforge.forwardCluster.enabled -}}
{{- $forwardTlsSecretName := default "proxy-tls-fwd" .Values.skyforge.forwardCluster.tlsSecretName -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skyforge-server-worker
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ default 1 .Values.skyforge.worker.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: skyforge
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "skyforge.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
        skyforge.forwardnetworks.com/spread-group: skyforge-core
      annotations:
        checksum/values: {{ sha256sum (toJson .Values) | quote }}
        checksum/infra-worker: {{ sha256sum (.Files.Get "files/infra.config.json") | quote }}
        checksum/encore-cfg-worker: {{ include (print $.Template.BasePath "/encore-cfg-worker-secret.yaml") . | sha256sum | quote }}
        checksum/encore-runtime-worker: {{ include (print $.Template.BasePath "/encore-runtime-config-worker-secret.yaml") . | sha256sum | quote }}
    spec:
      serviceAccountName: skyforge-server
{{- if $workerPriorityClass }}
      priorityClassName: {{ $workerPriorityClass | quote }}
{{- end }}
      imagePullSecrets:
        - name: ghcr-pull
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              skyforge.forwardnetworks.com/spread-group: skyforge-core
      affinity:
        podAntiAffinity:
{{- if .Values.skyforge.worker.placement.requiredAntiAffinity }}
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: skyforge
                  app.kubernetes.io/component: worker
{{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: skyforge
                    app.kubernetes.io/component: worker
{{- end }}
{{- with include "skyforge.workloadNodeAffinity" (list .Values.skyforge.worker.placement) }}
{{ . | nindent 8 }}
{{- end }}
{{- with include "skyforge.workloadPlacementSpec" (list .Values.skyforge.worker.placement) }}
{{ . | nindent 6 }}
{{- end }}
      containers:
        - name: skyforge-server-worker
          image: {{ .Values.images.skyforgeServerWorker | default .Values.images.skyforgeServer | quote }}
          imagePullPolicy: IfNotPresent
          startupProbe:
            httpGet:
              path: /healthz
              port: 8085
            failureThreshold: 60
            periodSeconds: 2
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8085
            failureThreshold: 6
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8085
            failureThreshold: 3
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            {{- toYaml .Values.skyforge.worker.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: skyforge-config
          env:
            - name: SKYFORGE_ROLE
              value: "worker"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Prefer passing an infra config file path instead of ENCORE_RUNTIME_CONFIG.
            # This keeps the Helm config schema-aligned across Encore versions.
            - name: ENCORE_INFRA_CONFIG_PATH
              value: /encore/infra.config.json
            - name: ENCORE_CFG_WORKER
              valueFrom:
                secretKeyRef:
                  name: skyforge-encore-cfg-worker
                  key: ENCORE_CFG_WORKER
                  optional: true
            - name: ENCORE_CFG_SKYFORGE
              valueFrom:
                secretKeyRef:
                  name: skyforge-encore-cfg
                  key: ENCORE_CFG_SKYFORGE
                  optional: true
            - name: SKYFORGE_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: skyforge-session-secret
                  key: skyforge-session-secret
            - name: SKYFORGE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skyforge-admin-shared
                  key: password
            - name: SKYFORGE_GITEA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skyforge-admin-shared
                  key: password
            - name: SKYFORGE_GITEA_API_URL
              valueFrom:
                configMapKeyRef:
                  name: skyforge-config
                  key: SKYFORGE_GITEA_API_URL
            - name: SKYFORGE_AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.skyforge.cloudPricingCredentials.secretName | quote }}
                  key: {{ .Values.skyforge.cloudPricingCredentials.azureTenantIdKey | quote }}
                  optional: true
            - name: SKYFORGE_AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.skyforge.cloudPricingCredentials.secretName | quote }}
                  key: {{ .Values.skyforge.cloudPricingCredentials.azureClientIdKey | quote }}
                  optional: true
            - name: SKYFORGE_AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.skyforge.cloudPricingCredentials.secretName | quote }}
                  key: {{ .Values.skyforge.cloudPricingCredentials.azureClientSecretKey | quote }}
                  optional: true
            - name: SKYFORGE_GCP_SERVICE_ACCOUNT_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.skyforge.cloudPricingCredentials.secretName | quote }}
                  key: {{ .Values.skyforge.cloudPricingCredentials.gcpServiceAccountJSONKey | quote }}
                  optional: true
            - name: SKYFORGE_AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.skyforge.cloudPricingCredentials.secretName | quote }}
                  key: {{ .Values.skyforge.cloudPricingCredentials.awsAccessKeyIdKey | quote }}
                  optional: true
            - name: SKYFORGE_AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.skyforge.cloudPricingCredentials.secretName | quote }}
                  key: {{ .Values.skyforge.cloudPricingCredentials.awsSecretAccessKeyKey | quote }}
                  optional: true
            - name: SKYFORGE_HETZNER_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.skyforge.burst.hetzner.apiTokenSecretName | quote }}
                  key: {{ .Values.skyforge.burst.hetzner.apiTokenSecretKey | quote }}
                  optional: true
            - name: SKYFORGE_HETZNER_WIREGUARD_HUB_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.skyforge.burst.hetzner.hubPublicKeySecretName | quote }}
                  key: {{ .Values.skyforge.burst.hetzner.hubPublicKeySecretKey | quote }}
                  optional: true
            - name: SKYFORGE_HETZNER_K3S_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.skyforge.burst.hetzner.k3sTokenSecretName | quote }}
                  key: {{ .Values.skyforge.burst.hetzner.k3sTokenSecretKey | quote }}
                  optional: true
            - name: SKYFORGE_GITEA_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: skyforge-config
                  key: SKYFORGE_GITEA_USERNAME
            - name: SKYFORGE_REGISTRY_URL
              valueFrom:
                configMapKeyRef:
                  name: skyforge-config
                  key: SKYFORGE_REGISTRY_URL
            - name: SKYFORGE_REGISTRY_REPO_PREFIXES
              valueFrom:
                configMapKeyRef:
                  name: skyforge-config
                  key: SKYFORGE_REGISTRY_REPO_PREFIXES
            - name: SKYFORGE_REGISTRY_SKIP_TLS_VERIFY
              valueFrom:
                configMapKeyRef:
                  name: skyforge-config
                  key: SKYFORGE_REGISTRY_SKIP_TLS_VERIFY
            - name: SKYFORGE_REGISTRY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.skyforge.registry.usernameSecretName }}
                  key: {{ .Values.skyforge.registry.usernameSecretKey }}
                  optional: true
            - name: SKYFORGE_REGISTRY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.skyforge.registry.passwordSecretName }}
                  key: {{ .Values.skyforge.registry.passwordSecretKey }}
                  optional: true
            - name: SKYFORGE_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: skyforge-config
                  key: SKYFORGE_DB_HOST
            - name: SKYFORGE_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: skyforge-config
                  key: SKYFORGE_DB_PORT
            - name: SKYFORGE_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: skyforge-config
                  key: SKYFORGE_DB_NAME
            - name: SKYFORGE_DB_USER
              valueFrom:
                configMapKeyRef:
                  name: skyforge-config
                  key: SKYFORGE_DB_USER
            - name: SKYFORGE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-skyforge-server-password
                  key: db-skyforge-server-password
            - name: SKYFORGE_DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: skyforge-config
                  key: SKYFORGE_DB_SSLMODE
            - name: SKYFORGE_OBJECT_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.skyforge.objectStorage.accessKeySecretName | quote }}
                  key: {{ .Values.skyforge.objectStorage.accessKeySecretKey | quote }}
            - name: SKYFORGE_OBJECT_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.skyforge.objectStorage.secretKeySecretName | quote }}
                  key: {{ .Values.skyforge.objectStorage.secretKeySecretKey | quote }}
            - name: SKYFORGE_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: skyforge-internal-token
                  key: skyforge-internal-token
                  optional: true
            - name: SKYFORGE_KNE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skyforge-kne-jwt-secret
                  key: skyforge-kne-jwt-secret
                  optional: true
            - name: SKYFORGE_QUICK_DEPLOY_FORWARD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: skyforge-quick-deploy-forward-username
                  key: skyforge-quick-deploy-forward-username
                  optional: true
            - name: SKYFORGE_QUICK_DEPLOY_FORWARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skyforge-quick-deploy-forward-password
                  key: skyforge-quick-deploy-forward-password
                  optional: true
            - name: SKYFORGE_NETLAB_SERVERS_FILE
              value: /run/secrets/skyforge-netlab-servers
            - name: SKYFORGE_SROS_LICENSE_B64
              valueFrom:
                secretKeyRef:
                  name: sros-license
                  key: sros-license-b64
                  optional: true
            - name: SKYFORGE_NETLAB_SSH_KEY_FILE
              value: /run/secrets/netlab-runner-rsa
            - name: PORT
              value: "8085"
            - name: SSL_CERT_FILE
              value: /etc/skyforge/ca/ca-certificates.crt
          volumeMounts:
            - mountPath: /encore/infra.config.json
              name: skyforge-server-infra-config-worker
              readOnly: true
              subPath: infra.config.json
            - mountPath: /run/secrets
              name: run-secrets
              readOnly: true
            - mountPath: /var/lib/skyforge
              name: skyforge-worker-data
            - mountPath: /data
              name: skyforge-worker-platform
            - mountPath: /tools
              name: terraform-bin
              readOnly: true
            - mountPath: /tmp
              name: skyforge-tmp
            - name: skyforge-ca-bundle
              mountPath: /etc/skyforge/ca
      volumes:
        - name: skyforge-server-infra-config-worker
          configMap:
            name: skyforge-server-infra-config-worker
        - name: run-secrets
          projected:
            sources:
              - secret:
                  name: skyforge-netlab-servers
                  optional: true
                  items:
                    - key: skyforge-netlab-servers
                      path: skyforge-netlab-servers
              - secret:
                  name: netlab-runner-rsa
                  optional: true
                  items:
                    - key: netlab-runner-rsa
                      path: netlab-runner-rsa
        - name: skyforge-worker-data
          emptyDir: {}
        - name: skyforge-worker-platform
          emptyDir: {}
        - name: terraform-bin
          emptyDir: {}
        - name: skyforge-tmp
          emptyDir: {}
        - name: skyforge-ca-cert
          secret:
            secretName: skyforge-ca-cert
        - name: proxy-tls
          secret:
            secretName: proxy-tls
{{- if and $forwardClusterEnabled (ne $forwardTlsSecretName "proxy-tls") }}
        - name: proxy-tls-forward
          secret:
            secretName: {{ $forwardTlsSecretName }}
{{- end }}
        - name: skyforge-ca-bundle
          emptyDir: {}
      initContainers:
        - name: skyforge-ca-bundle
          image: {{ .Values.images.alpine | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              cat /etc/ssl/certs/ca-certificates.crt \
                /etc/skyforge/skyforge-ca-cert \
                /etc/proxy-main/tls.crt \
{{- if and $forwardClusterEnabled (ne $forwardTlsSecretName "proxy-tls") }}
                /etc/proxy-forward/tls.crt \
{{- end }}
                > /work/ca-certificates.crt
          volumeMounts:
            - name: skyforge-ca-cert
              mountPath: /etc/skyforge
              readOnly: true
            - name: proxy-tls
              mountPath: /etc/proxy-main
              readOnly: true
{{- if and $forwardClusterEnabled (ne $forwardTlsSecretName "proxy-tls") }}
            - name: proxy-tls-forward
              mountPath: /etc/proxy-forward
              readOnly: true
{{- end }}
            - name: skyforge-ca-bundle
              mountPath: /work
        - name: wait-for-nsq
          image: {{ .Values.images.alpine | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              host="nsq"
              for i in $(seq 1 90); do
                if nc -z "${host}" 4150 >/dev/null 2>&1; then
                  exit 0
                fi
                sleep 2
              done
              echo "nsq did not become reachable in time" >&2
              exit 1
        - name: terraform-bin
          image: {{ .Values.images.terraform | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              cp /bin/terraform /work/terraform
              chmod 0555 /work/terraform
          volumeMounts:
            - name: terraform-bin
              mountPath: /work
