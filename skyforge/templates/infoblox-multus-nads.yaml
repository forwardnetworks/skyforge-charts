{{- if and .Values.skyforge.infoblox.enabled .Values.skyforge.infoblox.managed .Values.skyforge.infoblox.vm.multus.enabled .Values.skyforge.infoblox.vm.multus.createNADs }}
{{- if not (.Capabilities.APIVersions.Has "k8s.cni.cncf.io/v1/NetworkAttachmentDefinition") -}}
{{- fail "skyforge.infoblox.vm.multus.createNADs=true requires Multus CRDs (k8s.cni.cncf.io/v1)" -}}
{{- end -}}
{{- $lan1NADName := default "infoblox-lan1" .Values.skyforge.infoblox.vm.multus.lan1.nadName -}}
{{- $lan1Bridge := default "br-infoblox-lan1" .Values.skyforge.infoblox.vm.multus.lan1.bridgeName -}}
{{- $lan1Subnet := default "169.254.101.0/24" .Values.skyforge.infoblox.vm.multus.lan1.subnet -}}
{{- $haNADName := default "infoblox-ha" .Values.skyforge.infoblox.vm.multus.ha.nadName -}}
{{- $haBridge := default "br-infoblox-ha" .Values.skyforge.infoblox.vm.multus.ha.bridgeName -}}
{{- $haSubnet := default "169.254.102.0/24" .Values.skyforge.infoblox.vm.multus.ha.subnet -}}
{{- $lan2NADName := default "infoblox-lan2" .Values.skyforge.infoblox.vm.multus.lan2.nadName -}}
{{- $lan2Bridge := default "br-infoblox-lan2" .Values.skyforge.infoblox.vm.multus.lan2.bridgeName -}}
{{- $lan2Subnet := default "169.254.103.0/24" .Values.skyforge.infoblox.vm.multus.lan2.subnet -}}
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: {{ $lan1NADName }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: infoblox
spec:
  config: |
    {{ dict
      "cniVersion" "0.4.0"
      "type" "bridge"
      "bridge" $lan1Bridge
      "promiscMode" true
      "hairpinMode" true
      "ipMasq" false
      "ipam" (dict "type" "host-local" "ranges" (list (list (dict "subnet" $lan1Subnet))))
      | toJson }}
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: {{ $haNADName }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: infoblox
spec:
  config: |
    {{ dict
      "cniVersion" "0.4.0"
      "type" "bridge"
      "bridge" $haBridge
      "promiscMode" true
      "hairpinMode" true
      "ipMasq" false
      "ipam" (dict "type" "host-local" "ranges" (list (list (dict "subnet" $haSubnet))))
      | toJson }}
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: {{ $lan2NADName }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: infoblox
spec:
  config: |
    {{ dict
      "cniVersion" "0.4.0"
      "type" "bridge"
      "bridge" $lan2Bridge
      "promiscMode" true
      "hairpinMode" true
      "ipMasq" false
      "ipam" (dict "type" "host-local" "ranges" (list (list (dict "subnet" $lan2Subnet))))
      | toJson }}
{{- end }}
