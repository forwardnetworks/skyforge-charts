{{- $pullSecrets := .Values.kubernetes.imagePullSecrets -}}
{{- if $pullSecrets }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default-serviceaccount-pullsecrets
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: default-serviceaccount-pullsecrets
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    resourceNames: ["default"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: default-serviceaccount-pullsecrets
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: default-serviceaccount-pullsecrets
subjects:
  - kind: ServiceAccount
    name: default-serviceaccount-pullsecrets
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: default-serviceaccount-pullsecrets
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: default-serviceaccount-pullsecrets
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default-serviceaccount-pullsecrets
      containers:
        - name: patch
          image: {{ .Values.images.kubectl | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              kubectl -n {{ .Release.Namespace | quote }} patch serviceaccount default --type=merge -p '{{ dict "imagePullSecrets" (list) | toJson }}'
              kubectl -n {{ .Release.Namespace | quote }} patch serviceaccount default --type=merge -p '{"imagePullSecrets":[{{- range $idx, $name := $pullSecrets }}{{ if $idx }},{{ end }}{"name":{{ $name | quote }}}{{- end }}]}'
{{- end }}
