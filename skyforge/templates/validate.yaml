{{- /*
Chart validation guardrails.

This file intentionally renders no Kubernetes objects; it only fails Helm installs
early when required configuration is missing.
*/ -}}
{{- $host := .Values.skyforge.hostname -}}
{{- $forwardClusterEnabled := .Values.skyforge.forwardCluster.enabled -}}
{{- $forwardHost := default $host .Values.skyforge.forwardCluster.hostname -}}
{{- $forwardTlsSecretName := default "proxy-tls-fwd" .Values.skyforge.forwardCluster.tlsSecretName -}}
{{- $forwardWorkers := default (dict) .Values.skyforge.forwardCluster.workers -}}
{{- $forwardWorkerOwner := lower (trim (default "upstream" $forwardWorkers.owner)) -}}
{{- $forwardCore := default (dict) .Values.skyforge.forwardCluster.core -}}
{{- $forwardCoreOwner := lower (trim (default "upstream" $forwardCore.owner)) -}}
{{- $forwardCollectorImage := include "skyforge.forwardCollector.image" . -}}
{{- $forwardCoreAppserverImage := include "skyforge.forwardCore.appserverImage" . -}}
{{- $forwardCoreBackendImage := include "skyforge.forwardCore.backendMasterImage" . -}}
{{- $forwardCoreLogserverImage := include "skyforge.forwardCore.logserverImage" . -}}
{{- $forwardCoreCbrServerImage := include "skyforge.forwardCore.cbrServerImage" . -}}
{{- $forwardCoreCbrAgentImage := include "skyforge.forwardCore.cbrAgentImage" . -}}
{{- $forwardCoreCbrS3AgentImage := include "skyforge.forwardCore.cbrS3AgentImage" . -}}
{{- $forwardCoreNqeAssist := default (dict) $forwardCore.nqeAssist -}}
{{- $forwardCoreNqeAssistImage := include "skyforge.forwardCore.nqeAssistImage" . -}}
{{- $forwardCoreBaml := default (dict) (default (dict) $forwardCore.ai).baml -}}
{{- $forwardCoreBamlImage := include "skyforge.forwardCore.bamlImage" . -}}
{{- $forwardCoreAICredentials := default (dict) $forwardCore.aiCredentials -}}
{{- $forwardCoreAICredentialsSecretName := trim (default "" $forwardCoreAICredentials.secretName) -}}
{{- $forwardCoreAICredentialsAccessKeyIDKey := trim (default "" $forwardCoreAICredentials.accessKeyIDKey) -}}
{{- $forwardCoreAICredentialsSecretAccessKeyKey := trim (default "" $forwardCoreAICredentials.secretAccessKeyKey) -}}
{{- $forwardComputeImage := include "skyforge.forwardWorker.computeImage" . -}}
{{- $forwardSearchImage := include "skyforge.forwardWorker.searchImage" . -}}
{{- $obsEnabled := default false .Values.skyforge.observability.enabled -}}
{{- $obsManagedEnabled := default false .Values.skyforge.observability.managed.enabled -}}
{{- $obsGrafanaOIDC := default (dict) .Values.skyforge.observability.grafana.oidc -}}
{{- $kedaCfg := default (dict) .Values.skyforge.keda -}}
{{- $kedaEnabled := default false $kedaCfg.enabled -}}
{{- $kedaForwardWorkers := default (dict) $kedaCfg.forwardWorkers -}}
{{- $cloudflareTunnel := default (dict) .Values.skyforge.cloudflareTunnel -}}
{{- $obsGrafanaOIDCEnabled := true -}}
{{- $edition := lower (trim (default "enterprise" .Values.skyforge.edition)) -}}
{{- $forwardEnabled := and (ne $edition "oss") .Values.skyforge.forward.enabled -}}
{{- $giteaSSH := default (dict) .Values.skyforge.gitea.ssh -}}
{{- $giteaSSHConfiguredEnabled := true -}}
{{- if hasKey $giteaSSH "enabled" -}}
  {{- $giteaSSHConfiguredEnabled = $giteaSSH.enabled -}}
{{- end -}}
{{- $giteaSSHEnabled := and .Values.skyforge.gitea.enabled $giteaSSHConfiguredEnabled -}}
{{- $giteaSSHServicePort := int (default 22 $giteaSSH.servicePort) -}}
{{- $managementSSH := default (dict) .Values.skyforge.managementAccess.ssh -}}
{{- $managementSSHService := default (dict) $managementSSH.service -}}
{{- $managementSSHServiceEnabled := and (default false $managementSSH.enabled) (default false $managementSSHService.enabled) -}}
{{- $managementSSHServicePort := int (default 22 $managementSSHService.port) -}}
{{- $gatewayAddressesForSSH := .Values.skyforge.gateway.addresses | default (list) -}}
{{- $gatewayLBIPAMForSSH := default (dict) .Values.skyforge.gateway.ciliumLBIPAM -}}
{{- $sharedSSHIP := default "" $gatewayLBIPAMForSSH.sharedIP -}}
{{- if eq (trim $sharedSSHIP) "" -}}
  {{- range $addr := $gatewayAddressesForSSH -}}
    {{- if and (eq (default "" $addr.type) "IPAddress") (ne (trim (default "" $addr.value)) "") -}}
      {{- $sharedSSHIP = $addr.value -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- if hasKey $obsGrafanaOIDC "enabled" -}}
  {{- $obsGrafanaOIDCEnabled = (index $obsGrafanaOIDC "enabled") -}}
{{- end -}}

{{- if and $giteaSSHEnabled $managementSSHServiceEnabled (eq $giteaSSHServicePort $managementSSHServicePort) -}}
  {{- $managementAnnotations := default (dict) $managementSSHService.annotations -}}
  {{- $managementExplicitIP := trim (default "" $managementSSHService.loadBalancerIP) -}}
  {{- if eq $managementExplicitIP "" -}}
    {{- $managementExplicitIP = trim (default "" (index $managementAnnotations "lbipam.cilium.io/ips")) -}}
  {{- end -}}
  {{- if or (eq $managementExplicitIP "") (and (ne (trim $sharedSSHIP) "") (eq $managementExplicitIP (trim $sharedSSHIP))) -}}
    {{- fail (printf "skyforge.managementAccess.ssh.service.port=%d conflicts with enabled Gitea SSH on the same external port; disable skyforge.gitea.ssh.enabled or assign management access a distinct LoadBalancer IP" $managementSSHServicePort) -}}
  {{- end -}}
{{- end -}}

{{- if default false $kedaForwardWorkers.enabled -}}
  {{- if not $kedaEnabled -}}
    {{- fail "skyforge.keda.forwardWorkers.enabled=true requires skyforge.keda.enabled=true" -}}
  {{- end -}}
  {{- if not $forwardClusterEnabled -}}
    {{- fail "skyforge.keda.forwardWorkers.enabled=true requires skyforge.forwardCluster.enabled=true" -}}
  {{- end -}}
{{- end -}}

{{- if .Values.skyforge.encoreCfg.create -}}
  {{- if not (trim (default "" .Values.skyforge.netlab.image)) -}}
    {{- fail "skyforge.netlab.image must be set (required for in-cluster netlab/kne mode)" -}}
  {{- end -}}
  {{- if and $forwardEnabled (not (trim $forwardCollectorImage)) -}}
    {{- fail "Forward integration enabled requires skyforge.forwardCollector.image or skyforge.forwardImages.tag to be set (set skyforge.edition=oss to force-disable Forward)" -}}
  {{- end -}}
  {{- if hasKey .Values.skyforge "netlabKNE" -}}
    {{- fail "skyforge.netlabKNE is removed; use skyforge.netlab.image and skyforge.netlab.pullPolicy" -}}
  {{- end -}}
{{- end -}}

{{- if not .Values.skyforge.gitea.enabled -}}
  {{- if not (trim (default "" .Values.skyforge.gitea.apiUrl)) -}}
    {{- fail "skyforge.gitea.enabled=false requires skyforge.gitea.apiUrl to be set (external Git server API URL)" -}}
  {{- end -}}
{{- end -}}

{{- if .Values.skyforge.gitea.enabled -}}
  {{- if not (trim (default "" .Values.skyforge.gitea.apiUrl)) -}}
    {{- fail "skyforge.gitea.enabled=true requires skyforge.gitea.apiUrl to be set" -}}
  {{- end -}}
  {{- if not (trim (default "" .Values.skyforge.gitea.url)) -}}
    {{- fail "skyforge.gitea.enabled=true requires skyforge.gitea.url to be set" -}}
  {{- end -}}
{{- end -}}

{{- if not .Values.skyforge.s3gw.enabled -}}
  {{- if eq (trim (default "" .Values.skyforge.objectStorage.endpoint)) "s3gw:7480" -}}
    {{- fail "skyforge.s3gw.enabled=false requires skyforge.objectStorage.endpoint to be set to an external S3 endpoint (not s3gw:7480)" -}}
  {{- end -}}
{{- end -}}

{{- $uiAuthMode := default "local" .Values.skyforge.auth.mode -}}
{{- if and (ne $uiAuthMode "local") (ne $uiAuthMode "oidc") -}}
  {{- fail (printf "skyforge.auth.mode must be one of local or oidc (got %q)" $uiAuthMode) -}}
{{- end -}}
{{- if and (eq $uiAuthMode "oidc") (not .Values.skyforge.dex.enabled) -}}
  {{- fail "skyforge.auth.mode=oidc requires skyforge.dex.enabled=true; supported browser OIDC topology is Skyforge -> Dex -> IdP" -}}
{{- end -}}
{{- if (default false $cloudflareTunnel.enabled) -}}
  {{- if not (trim (default "" $cloudflareTunnel.tokenSecretName)) -}}
    {{- fail "skyforge.cloudflareTunnel.enabled=true requires skyforge.cloudflareTunnel.tokenSecretName" -}}
  {{- end -}}
{{- end -}}
{{- if and (ne $edition "enterprise") (ne $edition "oss") -}}
  {{- fail (printf "skyforge.edition must be one of enterprise or oss (got %q)" $edition) -}}
{{- end -}}
{{- if and (eq $edition "oss") $forwardClusterEnabled -}}
  {{- fail "skyforge.edition=oss does not support skyforge.forwardCluster.enabled=true" -}}
{{- end -}}
{{- if $forwardClusterEnabled -}}
  {{- if not (trim (default "" .Values.skyforge.forwardCluster.hostname)) -}}
    {{- fail "skyforge.forwardCluster.enabled=true requires skyforge.forwardCluster.hostname to be set explicitly and distinct from skyforge.hostname" -}}
  {{- end -}}
  {{- if eq $forwardHost $host -}}
    {{- fail "skyforge.forwardCluster.hostname must be distinct from skyforge.hostname to avoid HTTPRoute hostname collisions" -}}
  {{- end -}}
  {{- if .Values.secrets.create -}}
    {{- $secretItems := default (dict) .Values.secrets.items -}}
    {{- $forwardTlsItem := index $secretItems $forwardTlsSecretName -}}
    {{- $forwardTlsCrt := "" -}}
    {{- if $forwardTlsItem -}}
      {{- $forwardTlsCrt = (trim (default "" (index $forwardTlsItem "tls.crt"))) -}}
    {{- end -}}
    {{- if not $forwardTlsCrt -}}
      {{- fail (printf "skyforge.forwardCluster.enabled=true with secrets.create=true requires secrets.items.%s.tls.crt" $forwardTlsSecretName) -}}
    {{- end -}}
    {{- $certCount := len (regexFindAll "-----BEGIN CERTIFICATE-----" $forwardTlsCrt -1) -}}
    {{- if lt $certCount 2 -}}
      {{- fail (printf "secrets.items.%s.tls.crt must include full certificate chain (leaf + intermediate); found %d certificate block(s)" $forwardTlsSecretName $certCount) -}}
    {{- end -}}
  {{- else if and (default false .Values.secrets.validatePrecreated) (not (.Capabilities.APIVersions.Has "helm.sh/lint")) -}}
    {{- $forwardTlsSecret := lookup "v1" "Secret" .Release.Namespace $forwardTlsSecretName -}}
    {{- if and $forwardTlsSecret (hasKey $forwardTlsSecret.data "tls.crt") -}}
      {{- $existingCrt := (trim ((index $forwardTlsSecret.data "tls.crt") | b64dec)) -}}
      {{- $existingCount := len (regexFindAll "-----BEGIN CERTIFICATE-----" $existingCrt -1) -}}
      {{- if lt $existingCount 2 -}}
        {{- fail (printf "precreated Secret %s/%s tls.crt must include full certificate chain (leaf + intermediate); found %d certificate block(s)" .Release.Namespace $forwardTlsSecretName $existingCount) -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- if and (ne $forwardWorkerOwner "upstream") (ne $forwardWorkerOwner "skyforge") -}}
  {{- fail (printf "skyforge.forwardCluster.workers.owner must be one of upstream or skyforge (got %q)" $forwardWorkerOwner) -}}
{{- end -}}
{{- if and (ne $forwardCoreOwner "upstream") (ne $forwardCoreOwner "skyforge") -}}
  {{- fail (printf "skyforge.forwardCluster.core.owner must be one of upstream or skyforge (got %q)" $forwardCoreOwner) -}}
{{- end -}}
{{- if eq $forwardWorkerOwner "skyforge" -}}
  {{- if not $forwardClusterEnabled -}}
    {{- fail "skyforge.forwardCluster.workers.owner=skyforge requires skyforge.forwardCluster.enabled=true" -}}
  {{- end -}}
  {{- if not (default false $forwardWorkers.adoptionAcknowledged) -}}
    {{- fail "skyforge.forwardCluster.workers.owner=skyforge requires skyforge.forwardCluster.workers.adoptionAcknowledged=true because the upstream Forward release must stop managing fwd-compute-worker and fwd-search-worker first" -}}
  {{- end -}}
  {{- if not (trim $forwardComputeImage) -}}
    {{- fail "skyforge.forwardCluster.workers.owner=skyforge requires skyforge.forwardCluster.workers.compute.image or skyforge.forwardImages.tag" -}}
  {{- end -}}
  {{- if not (trim $forwardSearchImage) -}}
    {{- fail "skyforge.forwardCluster.workers.owner=skyforge requires skyforge.forwardCluster.workers.search.image or skyforge.forwardImages.tag" -}}
  {{- end -}}
  {{- if not (trim (default "" $forwardWorkers.scratch.hostPath)) -}}
    {{- fail "skyforge.forwardCluster.workers.owner=skyforge requires skyforge.forwardCluster.workers.scratch.hostPath" -}}
  {{- end -}}
  {{- $dbMode := lower (trim (default "external" $forwardWorkers.database.mode)) -}}
  {{- if and (ne $dbMode "external") (ne $dbMode "internal") -}}
    {{- fail (printf "skyforge.forwardCluster.workers.database.mode must be one of external or internal (got %q)" $dbMode) -}}
  {{- end -}}
  {{- if and (default true $forwardWorkers.logForwarding.enabled) (eq (len (default (list) $forwardWorkers.logForwarding.outputs)) 0) -}}
    {{- fail "skyforge.forwardCluster.workers.owner=skyforge with log forwarding enabled requires at least one skyforge.forwardCluster.workers.logForwarding.outputs entry" -}}
  {{- end -}}
{{- end -}}
{{- if eq $forwardCoreOwner "skyforge" -}}
  {{- if not $forwardClusterEnabled -}}
    {{- fail "skyforge.forwardCluster.core.owner=skyforge requires skyforge.forwardCluster.enabled=true" -}}
  {{- end -}}
  {{- if not (default false $forwardCore.adoptionAcknowledged) -}}
    {{- fail "skyforge.forwardCluster.core.owner=skyforge requires skyforge.forwardCluster.core.adoptionAcknowledged=true because the upstream Forward release must stop managing the same core resource names first" -}}
  {{- end -}}
  {{- if ne $forwardWorkerOwner "skyforge" -}}
    {{- fail "skyforge.forwardCluster.core.owner=skyforge requires skyforge.forwardCluster.workers.owner=skyforge so the native Forward stack has a single owner" -}}
  {{- end -}}
  {{- $dbMode := lower (trim (default "external" (default (dict) $forwardWorkers.database).mode)) -}}
  {{- if ne $dbMode "external" -}}
    {{- fail "skyforge.forwardCluster.core.owner=skyforge currently supports only skyforge.forwardCluster.workers.database.mode=external" -}}
  {{- end -}}
  {{- if not (trim $forwardCoreAppserverImage) -}}
    {{- fail "skyforge.forwardCluster.core.owner=skyforge requires skyforge.forwardCluster.core.appserver.image or skyforge.forwardImages.tag" -}}
  {{- end -}}
  {{- if not (trim $forwardCoreBackendImage) -}}
    {{- fail "skyforge.forwardCluster.core.owner=skyforge requires skyforge.forwardCluster.core.backend.image or skyforge.forwardImages.tag" -}}
  {{- end -}}
  {{- if default true (default true (default (dict) $forwardCore.logAggregation).enabled) -}}
    {{- if not (trim $forwardCoreLogserverImage) -}}
      {{- fail "skyforge.forwardCluster.core.owner=skyforge with log aggregation enabled requires skyforge.forwardCluster.core.logAggregation.image or skyforge.forwardImages.tag" -}}
    {{- end -}}
  {{- end -}}
  {{- $cbr := default (dict) $forwardCore.cbr -}}
  {{- if and (default false $cbr.enabled) (not (trim $forwardCoreCbrServerImage)) -}}
    {{- fail "skyforge.forwardCluster.core.cbr.enabled=true requires skyforge.forwardCluster.core.cbr.server.image or skyforge.forwardImages.tag" -}}
  {{- end -}}
  {{- if and (default false $cbr.enabled) (not (trim $forwardCoreCbrAgentImage)) -}}
    {{- fail "skyforge.forwardCluster.core.cbr.enabled=true requires skyforge.forwardCluster.core.cbr.agent.image or skyforge.forwardImages.tag" -}}
  {{- end -}}
  {{- if and (default false (default (dict) $cbr.s3Agent).enabled) (not (trim $forwardCoreCbrS3AgentImage)) -}}
    {{- fail "skyforge.forwardCluster.core.cbr.s3Agent.enabled=true requires skyforge.forwardCluster.core.cbr.s3Agent.image or skyforge.forwardImages.tag" -}}
  {{- end -}}
  {{- if and (default false $forwardCoreNqeAssist.enabled) (not (trim $forwardCoreNqeAssistImage)) -}}
    {{- fail "skyforge.forwardCluster.core.nqeAssist.enabled=true requires skyforge.forwardCluster.core.nqeAssist.image or skyforge.forwardImages.tag" -}}
  {{- end -}}
  {{- if and (default false $forwardCoreBaml.enabled) (not (trim $forwardCoreBamlImage)) -}}
    {{- fail "skyforge.forwardCluster.core.ai.baml.enabled=true requires skyforge.forwardCluster.core.ai.baml.image" -}}
  {{- end -}}
  {{- if or (default false $forwardCoreNqeAssist.enabled) (default false $forwardCoreBaml.enabled) -}}
    {{- if not $forwardCoreAICredentialsSecretName -}}
      {{- fail "Forward AI runtime requires skyforge.forwardCluster.core.aiCredentials.secretName when nqe-assist or baml is enabled" -}}
    {{- end -}}
    {{- if not $forwardCoreAICredentialsAccessKeyIDKey -}}
      {{- fail "Forward AI runtime requires skyforge.forwardCluster.core.aiCredentials.accessKeyIDKey when nqe-assist or baml is enabled" -}}
    {{- end -}}
    {{- if not $forwardCoreAICredentialsSecretAccessKeyKey -}}
      {{- fail "Forward AI runtime requires skyforge.forwardCluster.core.aiCredentials.secretAccessKeyKey when nqe-assist or baml is enabled" -}}
    {{- end -}}
  {{- end -}}
  {{- if and (default true (default (dict) $forwardCore.logForwarding).enabled) (eq (len (default (list) (default (dict) $forwardCore.logForwarding).outputs)) 0) -}}
    {{- fail "skyforge.forwardCluster.core.owner=skyforge with log forwarding enabled requires at least one skyforge.forwardCluster.core.logForwarding.outputs entry" -}}
  {{- end -}}
{{- end -}}
{{- $hetznerBurst := default (dict) .Values.skyforge.burst.hetzner -}}
{{- $hetznerBurstEnabled := default false $hetznerBurst.enabled -}}
{{- $hetznerWireguard := default (dict) $hetznerBurst.wireguard -}}
{{- $hetznerWireguardHub := default (dict) $hetznerWireguard.hub -}}
{{- $hetznerRouteReconciler := default (dict) $hetznerBurst.routeReconciler -}}
{{- if and (eq $edition "oss") $hetznerBurstEnabled -}}
  {{- fail "skyforge.edition=oss does not support skyforge.burst.hetzner.enabled=true" -}}
{{- end -}}
{{- if $hetznerBurstEnabled -}}
  {{- if not $forwardEnabled -}}
    {{- fail "skyforge.burst.hetzner.enabled=true requires Forward-enabled deployment mode" -}}
  {{- end -}}
  {{- if not (trim (default "" $hetznerBurst.apiTokenSecretName)) -}}
    {{- fail "skyforge.burst.hetzner.enabled=true requires skyforge.burst.hetzner.apiTokenSecretName" -}}
  {{- end -}}
  {{- if not (trim (default "" $hetznerBurst.location)) -}}
    {{- fail "skyforge.burst.hetzner.enabled=true requires skyforge.burst.hetzner.location" -}}
  {{- end -}}
  {{- if not (trim (default "" $hetznerBurst.networkZone)) -}}
    {{- fail "skyforge.burst.hetzner.enabled=true requires skyforge.burst.hetzner.networkZone" -}}
  {{- end -}}
  {{- if not (trim (default "" $hetznerBurst.networkCIDR)) -}}
    {{- fail "skyforge.burst.hetzner.enabled=true requires skyforge.burst.hetzner.networkCIDR" -}}
  {{- end -}}
  {{- if not (trim (default "" $hetznerBurst.workerSubnetCIDR)) -}}
    {{- fail "skyforge.burst.hetzner.enabled=true requires skyforge.burst.hetzner.workerSubnetCIDR" -}}
  {{- end -}}
  {{- if not (trim (default "" $hetznerBurst.serverType)) -}}
    {{- fail "skyforge.burst.hetzner.enabled=true requires skyforge.burst.hetzner.serverType" -}}
  {{- end -}}
  {{- if not (trim (default "" $hetznerBurst.image)) -}}
    {{- fail "skyforge.burst.hetzner.enabled=true requires skyforge.burst.hetzner.image" -}}
  {{- end -}}
  {{- if not (trim (default "" $hetznerBurst.k3s.serverUrl)) -}}
    {{- fail "skyforge.burst.hetzner.enabled=true requires skyforge.burst.hetzner.k3s.serverUrl" -}}
  {{- end -}}
  {{- if not (trim (default "" $hetznerBurst.wireguard.endpointHost)) -}}
    {{- fail "skyforge.burst.hetzner.enabled=true requires skyforge.burst.hetzner.wireguard.endpointHost" -}}
  {{- end -}}
  {{- if not (trim (default "" $hetznerBurst.wireguard.tunnelCIDR)) -}}
    {{- fail "skyforge.burst.hetzner.enabled=true requires skyforge.burst.hetzner.wireguard.tunnelCIDR" -}}
  {{- end -}}
  {{- if not (trim (default "" $hetznerBurst.wireguard.localAddressCIDR)) -}}
    {{- fail "skyforge.burst.hetzner.enabled=true requires skyforge.burst.hetzner.wireguard.localAddressCIDR" -}}
  {{- end -}}
  {{- if not (trim (default "" $hetznerBurst.wireguard.gatewayNodeIP)) -}}
    {{- fail "skyforge.burst.hetzner.enabled=true requires skyforge.burst.hetzner.wireguard.gatewayNodeIP" -}}
  {{- end -}}
{{- end -}}
{{- if and (default false $hetznerWireguardHub.enabled) (not (trim (default "" $hetznerWireguardHub.privateKeySecretName))) -}}
  {{- fail "skyforge.burst.hetzner.wireguard.hub.enabled=true requires skyforge.burst.hetzner.wireguard.hub.privateKeySecretName" -}}
{{- end -}}
{{- if and (default false $hetznerWireguardHub.enabled) (not (trim (default "" $hetznerWireguard.localAddressCIDR))) -}}
  {{- fail "skyforge.burst.hetzner.wireguard.hub.enabled=true requires skyforge.burst.hetzner.wireguard.localAddressCIDR" -}}
{{- end -}}
{{- if and (default false $hetznerWireguardHub.enabled) (eq (len (default (dict) $hetznerWireguardHub.nodeSelector)) 0) -}}
  {{- fail "skyforge.burst.hetzner.wireguard.hub.enabled=true requires skyforge.burst.hetzner.wireguard.hub.nodeSelector" -}}
{{- end -}}
{{- if and (default false $hetznerRouteReconciler.enabled) (not (trim (default "" $hetznerRouteReconciler.via))) -}}
  {{- fail "skyforge.burst.hetzner.routeReconciler.enabled=true requires skyforge.burst.hetzner.routeReconciler.via" -}}
{{- end -}}
{{- if and (default false $hetznerRouteReconciler.enabled) (eq (len (default (list) $hetznerRouteReconciler.destinations)) 0) -}}
  {{- fail "skyforge.burst.hetzner.routeReconciler.enabled=true requires skyforge.burst.hetzner.routeReconciler.destinations" -}}
{{- end -}}
{{- if and .Values.skyforge.netbox.enabled (not .Values.skyforge.dex.enabled) -}}
  {{- fail "skyforge.netbox.enabled=true requires skyforge.dex.enabled=true (native OIDC login path)" -}}
{{- end -}}
{{- if and .Values.skyforge.nautobot.enabled (not .Values.skyforge.dex.enabled) -}}
  {{- fail "skyforge.nautobot.enabled=true requires skyforge.dex.enabled=true (native OIDC login path)" -}}
{{- end -}}
{{- if and .Values.skyforge.gitea.enabled (not .Values.skyforge.dex.enabled) -}}
  {{- fail "skyforge.gitea.enabled=true requires skyforge.dex.enabled=true (native OIDC login path)" -}}
{{- end -}}
{{- $jiraOIDC := default (dict) .Values.skyforge.jira.oidc -}}
{{- $jiraOIDCEnabled := true -}}
{{- if hasKey $jiraOIDC "enabled" -}}
  {{- $jiraOIDCEnabled = (index $jiraOIDC "enabled") -}}
{{- end -}}
{{- $jiraOIDCEnabled = and .Values.skyforge.jira.enabled $jiraOIDCEnabled -}}
{{- $rapid7OIDC := default (dict) .Values.skyforge.rapid7.oidc -}}
{{- $rapid7OIDCEnabled := true -}}
{{- if hasKey $rapid7OIDC "enabled" -}}
  {{- $rapid7OIDCEnabled = (index $rapid7OIDC "enabled") -}}
{{- end -}}
{{- $rapid7OIDCEnabled = and .Values.skyforge.rapid7.enabled $rapid7OIDCEnabled -}}
{{- $elkOIDC := default (dict) .Values.skyforge.elk.oidc -}}
{{- $elkOIDCEnabled := true -}}
{{- if hasKey $elkOIDC "enabled" -}}
  {{- $elkOIDCEnabled = (index $elkOIDC "enabled") -}}
{{- end -}}
{{- $elkOIDCEnabled = and .Values.skyforge.elk.enabled $elkOIDCEnabled -}}
{{- $infobloxOIDC := default (dict) .Values.skyforge.infoblox.oidc -}}
{{- $infobloxOIDCEnabled := true -}}
{{- if hasKey $infobloxOIDC "enabled" -}}
  {{- $infobloxOIDCEnabled = (index $infobloxOIDC "enabled") -}}
{{- end -}}
{{- $infobloxOIDCEnabled = and .Values.skyforge.infoblox.enabled $infobloxOIDCEnabled -}}
{{- if and (or $jiraOIDCEnabled $rapid7OIDCEnabled $elkOIDCEnabled $infobloxOIDCEnabled) (not .Values.skyforge.dex.enabled) -}}
  {{- fail "integration OIDC gate (jira/rapid7/elk/infoblox) requires skyforge.dex.enabled=true" -}}
{{- end -}}
{{- if and (or $jiraOIDCEnabled $rapid7OIDCEnabled $elkOIDCEnabled $infobloxOIDCEnabled) (ne $uiAuthMode "oidc") -}}
  {{- fail "integration OIDC gate (jira/rapid7/elk/infoblox) requires skyforge.auth.mode=oidc" -}}
{{- end -}}
{{- if $obsEnabled -}}
  {{- if not (trim (default "" .Values.skyforge.observability.grafana.serviceName)) -}}
    {{- fail "skyforge.observability.enabled=true requires skyforge.observability.grafana.serviceName" -}}
  {{- end -}}
  {{- if not (trim (default "" .Values.skyforge.observability.prometheus.serviceName)) -}}
    {{- fail "skyforge.observability.enabled=true requires skyforge.observability.prometheus.serviceName" -}}
  {{- end -}}
{{- end -}}
{{- if and $obsEnabled $obsManagedEnabled $obsGrafanaOIDCEnabled (not .Values.skyforge.dex.enabled) -}}
  {{- fail "skyforge.observability.managed.enabled=true with Grafana OIDC requires skyforge.dex.enabled=true" -}}
{{- end -}}

{{- if .Values.skyforge.kne.enabled -}}
  {{- $meshnetMode := lower (trim (default "grpc" .Values.skyforge.kne.meshnetMode)) -}}
  {{- if and (ne $meshnetMode "grpc") (ne $meshnetMode "vxlan") -}}
    {{- fail "skyforge.kne.meshnetMode must be one of: grpc, vxlan" -}}
  {{- end -}}
{{- end -}}

{{- $forwardContract := default (dict) .Values.skyforge.forwardCluster.contractValidation -}}
{{- $forwardContractEnabled := and $forwardClusterEnabled (default false $forwardContract.enabled) -}}
{{- if and $forwardContractEnabled (not (.Capabilities.APIVersions.Has "helm.sh/lint")) -}}
  {{- $expectedRoleLabel := default "forwardnetworks.com/role" $forwardContract.expectedForwardRoleLabel -}}
  {{- $expectedRoleValue := default "forward" $forwardContract.expectedForwardRoleValue -}}
  {{- $expectedPoolClass := default "app" $forwardContract.expectedForwardPoolClass -}}
  {{- $minimumForwardNodeCount := int (default 1 $forwardContract.minimumForwardNodeCount) -}}
  {{- $expectedComputeReplicaCount := int (default 0 $forwardContract.expectedComputeReplicaCount) -}}
  {{- $expectedSearchReplicaCount := int (default 0 $forwardContract.expectedSearchReplicaCount) -}}
  {{- $allowForwardOnControlPlane := default false $forwardContract.allowForwardOnControlPlane -}}
  {{- $nodes := lookup "v1" "Node" "" "" -}}
  {{- if not $nodes -}}
    {{- fail "skyforge.forwardCluster.contractValidation.enabled=true requires Node list access" -}}
  {{- end -}}
  {{- $nodeItems := default (list) $nodes.items -}}
  {{- $forwardNodeNames := list -}}
  {{- range $node := $nodeItems -}}
    {{- $nodeName := default "" $node.metadata.name -}}
    {{- $labels := default (dict) $node.metadata.labels -}}
    {{- if and $nodeName (eq (default "" (index $labels $expectedRoleLabel)) $expectedRoleValue) -}}
      {{- $forwardNodeNames = append $forwardNodeNames $nodeName -}}
      {{- if ne (default "" (index $labels "skyforge.forwardnetworks.com/pool-class")) $expectedPoolClass -}}
        {{- fail (printf "Forward contract violation: node %q has %s=%q; expected %q" $nodeName "skyforge.forwardnetworks.com/pool-class" (default "" (index $labels "skyforge.forwardnetworks.com/pool-class")) $expectedPoolClass) -}}
      {{- end -}}
      {{- if and (not $allowForwardOnControlPlane) (hasKey $labels "node-role.kubernetes.io/control-plane") -}}
        {{- fail (printf "Forward contract violation: node %q is control-plane but labeled %s=%s" $nodeName $expectedRoleLabel $expectedRoleValue) -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
  {{- if lt (len $forwardNodeNames) $minimumForwardNodeCount -}}
    {{- fail (printf "skyforge.forwardCluster.contractValidation.enabled=true found %d nodes labeled %s=%s (minimum required: %d)" (len $forwardNodeNames) $expectedRoleLabel $expectedRoleValue $minimumForwardNodeCount) -}}
  {{- end -}}
  {{- if gt $expectedComputeReplicaCount 0 -}}
    {{- $computeReplicas := int (default 0 (default (dict) $forwardWorkers.compute).replicas) -}}
    {{- if ne $computeReplicas $expectedComputeReplicaCount -}}
      {{- fail (printf "Forward contract violation: skyforge.forwardCluster.workers.compute.replicas=%d (expected %d)" $computeReplicas $expectedComputeReplicaCount) -}}
    {{- end -}}
  {{- end -}}
  {{- if gt $expectedSearchReplicaCount 0 -}}
    {{- $searchReplicas := int (default 0 (default (dict) $forwardWorkers.search).replicas) -}}
    {{- if ne $searchReplicas $expectedSearchReplicaCount -}}
      {{- fail (printf "Forward contract violation: skyforge.forwardCluster.workers.search.replicas=%d (expected %d)" $searchReplicas $expectedSearchReplicaCount) -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- $rapid7BackendTLS := default (dict) .Values.skyforge.rapid7.backendTLS -}}
{{- if and .Values.skyforge.rapid7.enabled (default false (index $rapid7BackendTLS "enabled")) -}}
  {{- if not (trim (default "" (index $rapid7BackendTLS "hostname"))) -}}
    {{- fail "skyforge.rapid7.backendTLS.enabled=true requires skyforge.rapid7.backendTLS.hostname" -}}
  {{- end -}}
  {{- if not (trim (default "" (index $rapid7BackendTLS "caConfigMapName"))) -}}
    {{- fail "skyforge.rapid7.backendTLS.enabled=true requires skyforge.rapid7.backendTLS.caConfigMapName" -}}
  {{- end -}}
  {{- $rapid7SvcNs := default .Release.Namespace .Values.skyforge.rapid7.serviceNamespace -}}
  {{- if ne $rapid7SvcNs .Release.Namespace -}}
    {{- fail "skyforge.rapid7.backendTLS.enabled=true requires skyforge.rapid7.serviceNamespace to match the release namespace (BackendTLSPolicy targetRef is namespace-local)" -}}
  {{- end -}}
{{- end -}}

{{- if and (not .Values.secrets.create) .Values.secrets.validatePrecreated (not (.Capabilities.APIVersions.Has "helm.sh/lint")) -}}
  {{- $requiredSecrets := list
    "proxy-tls"
    "skyforge-admin-shared"
    "skyforge-session-secret"
    "skyforge-audit-export-signing-key"
    "skyforge-internal-token"
    "postgres-skyforge-password"
    "db-skyforge-server-password"
    "db-dex-password"
    "db-coder-password"
    "db-gitea-password"
    "skyforge-ca-cert"
    "dex-client-coder-secret"
    "yaade-admin-password"
    "gitea-secret-key"
    "skyforge-netlab-servers"
    "netlab-runner-rsa"
    "object-storage-root-user"
    "object-storage-root-password"
  -}}
  {{- if and .Values.skyforge.dex.enabled .Values.skyforge.dex.manageConfig -}}
    {{- $requiredSecrets = append $requiredSecrets "skyforge-oidc-client-id" -}}
    {{- $requiredSecrets = append $requiredSecrets "skyforge-oidc-client-secret" -}}
  {{- end -}}
  {{- if not .Values.skyforge.dex.manageConfig -}}
    {{- $requiredSecrets = append $requiredSecrets "dex-config" -}}
  {{- end -}}
  {{- if .Values.skyforge.netbox.enabled -}}
    {{- $requiredSecrets = concat $requiredSecrets (list "db-netbox-password" "netbox-superuser-api-token" "netbox-api-token-peppers" "netbox-secret-key" "dex-client-netbox-secret") -}}
  {{- end -}}
  {{- if .Values.skyforge.nautobot.enabled -}}
    {{- $requiredSecrets = concat $requiredSecrets (list "db-nautobot-password" "nautobot-superuser-api-token" "nautobot-secret-key" "dex-client-nautobot-secret") -}}
  {{- end -}}
  {{- if .Values.skyforge.gitea.enabled -}}
    {{- $requiredSecrets = append $requiredSecrets "dex-client-gitea-secret" -}}
  {{- end -}}
  {{- if and .Values.skyforge.jira.enabled .Values.skyforge.jira.managed -}}
    {{- $requiredSecrets = append $requiredSecrets (default "db-jira-password" .Values.skyforge.jira.database.secretName) -}}
  {{- end -}}
  {{- if .Values.skyforge.yaade.enabled -}}
    {{- $requiredSecrets = append $requiredSecrets "dex-client-yaade-secret" -}}
  {{- end -}}
  {{- if and $obsEnabled $obsManagedEnabled $obsGrafanaOIDCEnabled -}}
    {{- $requiredSecrets = append $requiredSecrets "dex-client-grafana-secret" -}}
  {{- end -}}
  {{- if $forwardClusterEnabled -}}
    {{- $requiredSecrets = concat $requiredSecrets (list "db-forward-app-password" "db-forward-fdb-password") -}}
    {{- if and (ne $forwardHost $host) (ne $forwardTlsSecretName "proxy-tls") -}}
      {{- $requiredSecrets = append $requiredSecrets $forwardTlsSecretName -}}
    {{- end -}}
  {{- end -}}
  {{- range $name := $requiredSecrets -}}
    {{- $existing := lookup "v1" "Secret" $.Release.Namespace $name -}}
    {{- if not $existing -}}
      {{- fail (printf "secrets.create=false requires precreated Secret %q in namespace %q" $name $.Release.Namespace) -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
