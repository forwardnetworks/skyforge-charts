{{- if and .Values.nsq.enabled (ne (int (default 1 .Values.nsq.replicas)) 1) -}}
{{- fail "nsq.replicas must remain 1 in Encore-native mode; scale skyforge.worker replicas/autoscaling instead" -}}
{{- end }}
{{- if .Values.nsq.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: nsq
  labels:
    app.kubernetes.io/name: nsq
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nsq
  ports:
    - name: tcp
      port: 4150
      targetPort: 4150
      protocol: TCP
    - name: http
      port: 4151
      targetPort: 4151
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nsq
  labels:
    app.kubernetes.io/name: nsq
spec:
  replicas: {{ default 1 .Values.nsq.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: nsq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nsq
        skyforge.forwardnetworks.com/spread-group: skyforge-core
    spec:
{{- with .Values.kubernetes.imagePullSecrets }}
      imagePullSecrets:
{{- range . }}
        - name: {{ . | quote }}
{{- end }}
{{- end }}
{{- if .Values.skyforge.corePriorityClassName }}
      priorityClassName: {{ .Values.skyforge.corePriorityClassName | quote }}
{{- end }}
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            skyforge.forwardnetworks.com/spread-group: skyforge-core
      affinity:
        podAntiAffinity:
{{- if .Values.nsq.placement.requiredAntiAffinity }}
          requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: nsq
{{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: nsq
{{- end }}
{{- with include "skyforge.workloadNodeAffinity" (list .Values.nsq.placement) }}
{{ . | nindent 8 }}
{{- end }}
{{- with include "skyforge.workloadPlacementSpec" (list .Values.nsq.placement) }}
{{ . | nindent 6 }}
{{- end }}
      containers:
        - name: nsqd
          image: {{ .Values.images.nsq | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - /nsqd
          args:
            - --tcp-address=0.0.0.0:4150
            - --http-address=0.0.0.0:4151
            - --mem-queue-size=10000
            - --data-path=/var/lib/nsq
          ports:
            - name: tcp
              containerPort: 4150
            - name: http
              containerPort: 4151
          volumeMounts:
            - name: data
              mountPath: /var/lib/nsq
          readinessProbe:
            tcpSocket:
              port: 4150
            initialDelaySeconds: 2
            periodSeconds: 2
          livenessProbe:
            tcpSocket:
              port: 4150
            initialDelaySeconds: 10
            periodSeconds: 10
{{- with .Values.nsq.resources }}
          resources:
{{ toYaml . | nindent 12 }}
{{- end }}
      volumes:
        - name: data
          emptyDir: {}
{{- if .Values.nsq.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nsq
  labels:
    app.kubernetes.io/name: nsq
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nsq
{{- if .Values.nsq.pdb.minAvailable }}
  minAvailable: {{ .Values.nsq.pdb.minAvailable }}
{{- else }}
  maxUnavailable: 1
{{- end }}
{{- end }}
{{- end }}
