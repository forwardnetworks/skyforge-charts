{{- if and .Values.skyforge.infoblox.enabled .Values.skyforge.infoblox.managed .Values.skyforge.infoblox.lifecycle.enabled }}
{{- if not (.Capabilities.APIVersions.Has "kubevirt.io/v1/VirtualMachine") -}}
{{- fail "skyforge.infoblox.lifecycle.enabled=true requires KubeVirt CRDs (kubevirt.io/v1)" -}}
{{- end -}}
{{- $name := default "infoblox" .Values.skyforge.infoblox.serviceName -}}
{{- $stateCM := default "infoblox-vm-lifecycle-state" .Values.skyforge.infoblox.lifecycle.stateConfigMapName -}}
{{- $sa := printf "%s-vm-lifecycle" $name -}}
{{- $image := default .Values.images.kubectl .Values.skyforge.infoblox.lifecycle.image -}}
{{- $pullPolicy := default "IfNotPresent" .Values.skyforge.infoblox.lifecycle.pullPolicy -}}
{{- $autoStop := default dict .Values.skyforge.infoblox.lifecycle.autoStop -}}
{{- $autoStopMaxIdleMinutes := default 45 $autoStop.maxIdleMinutes -}}
{{- $autoStopMaxRunMinutes := default 360 $autoStop.maxRunMinutes -}}
{{- $autoStopSuspend := default false $autoStop.suspend -}}
{{- $reseed := default dict .Values.skyforge.infoblox.lifecycle.reseed -}}
{{- $reseedSuspend := default false $reseed.suspend -}}
{{- $license := default dict .Values.skyforge.infoblox.lifecycle.license -}}
{{- $licenseSuspend := default false $license.suspend -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: infoblox
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $sa }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: infoblox
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch", "update"]
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachines"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachineinstances"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["subresources.kubevirt.io"]
    resources: ["virtualmachineinstances/console"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $sa }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: infoblox
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $sa }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $stateCM }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: infoblox
data:
  last_reset_epoch: "0"
  last_auto_stop_epoch: "0"
  last_reseed_reason: ""
  last_access_epoch: "0"
  license_pending: "false"
  license_last_apply_epoch: "0"
{{- if $autoStop.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $name }}-vm-autostop
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: infoblox
spec:
  schedule: {{ $autoStop.schedule | quote }}
  suspend: {{ $autoStopSuspend }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            {{- include "skyforge.labels" . | nindent 12 }}
            app.kubernetes.io/component: infoblox
        spec:
          serviceAccountName: {{ $sa }}
          enableServiceLinks: false
          restartPolicy: OnFailure
          containers:
            - name: autostop
              image: {{ $image | quote }}
              imagePullPolicy: {{ $pullPolicy | quote }}
              env:
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: VM_NAME
                  value: {{ $name | quote }}
                - name: STATE_CM
                  value: {{ $stateCM | quote }}
                - name: MAX_RUN_MINUTES
                  value: {{ $autoStopMaxRunMinutes | quote }}
                - name: MAX_IDLE_MINUTES
                  value: {{ $autoStopMaxIdleMinutes | quote }}
              command:
                - /bin/sh
                - -ec
                - |
                  set -eu

                  log() {
                    printf '[infoblox-license] %s\n' "$*" >&2
                  }

                  ensure_state_configmap() {
                    if kubectl -n "${POD_NAMESPACE}" get configmap "${STATE_CM}" >/dev/null 2>&1; then
                      return 0
                    fi
                    cat <<EOF | kubectl -n "${POD_NAMESPACE}" apply -f -
                  apiVersion: v1
                  kind: ConfigMap
                  metadata:
                    name: ${STATE_CM}
                  data:
                    last_reset_epoch: "0"
                    last_auto_stop_epoch: "0"
                    last_reseed_reason: ""
                    last_access_epoch: "0"
                    license_pending: "false"
                    license_last_apply_epoch: "0"
                  EOF
                  }

                  set_state_value() {
                    key="$1"
                    value="$2"
                    kubectl -n "${POD_NAMESPACE}" patch configmap "${STATE_CM}" --field-manager=infoblox-lifecycle --type=merge -p "{\"data\":{\"${key}\":\"${value}\"}}" >/dev/null
                  }

                  get_state_value() {
                    key="$1"
                    kubectl -n "${POD_NAMESPACE}" get configmap "${STATE_CM}" -o jsonpath="{.data.${key}}" 2>/dev/null || true
                  }

                  ensure_state_configmap
                  run_strategy="$(kubectl -n "${POD_NAMESPACE}" get vm "${VM_NAME}" -o jsonpath='{.spec.runStrategy}' 2>/dev/null || true)"
                  if [ "${run_strategy}" != "Always" ]; then
                    exit 0
                  fi

                  created_at="$(kubectl -n "${POD_NAMESPACE}" get vmi "${VM_NAME}" -o jsonpath='{.metadata.creationTimestamp}' 2>/dev/null || true)"
                  if [ -z "${created_at}" ]; then
                    exit 0
                  fi

                  now_epoch="$(date -u +%s)"
                  start_epoch="$(date -u -d "${created_at}" +%s 2>/dev/null || true)"
                  if ! echo "${start_epoch}" | grep -Eq '^[0-9]+$'; then
                    exit 0
                  fi

                  last_access="$(get_state_value "last_access_epoch")"
                  if ! echo "${last_access}" | grep -Eq '^[0-9]+$'; then
                    last_access="0"
                  fi
                  pending="$(get_state_value "license_pending")"
                  if [ "${pending}" = "true" ]; then
                    exit 0
                  fi
                  if [ "${last_access}" -le 0 ]; then
                    last_access="${start_epoch}"
                    set_state_value "last_access_epoch" "${last_access}"
                  fi

                  max_runtime_seconds="$((MAX_RUN_MINUTES * 60))"
                  max_idle_seconds="$((MAX_IDLE_MINUTES * 60))"
                  runtime_elapsed="$((now_epoch - start_epoch))"
                  idle_elapsed="$((now_epoch - last_access))"

                  stop_reason=""
                  if [ "${max_runtime_seconds}" -gt 0 ] && [ "${runtime_elapsed}" -ge "${max_runtime_seconds}" ]; then
                    stop_reason="max_runtime"
                  fi
                  if [ -z "${stop_reason}" ] && [ "${max_idle_seconds}" -gt 0 ] && [ "${idle_elapsed}" -ge "${max_idle_seconds}" ]; then
                    stop_reason="idle_timeout"
                  fi
                  if [ -z "${stop_reason}" ]; then
                    exit 0
                  fi

                  kubectl -n "${POD_NAMESPACE}" patch vm "${VM_NAME}" --field-manager=infoblox-lifecycle --type=merge -p '{"spec":{"runStrategy":"Halted"}}' >/dev/null
                  set_state_value "last_auto_stop_epoch" "${now_epoch}"
                  set_state_value "last_reseed_reason" "${stop_reason}"
{{- end }}
{{- if $reseed.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $name }}-vm-reseed
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: infoblox
spec:
  schedule: {{ $reseed.schedule | quote }}
  suspend: {{ $reseedSuspend }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            {{- include "skyforge.labels" . | nindent 12 }}
            app.kubernetes.io/component: infoblox
        spec:
          serviceAccountName: {{ $sa }}
          enableServiceLinks: false
          restartPolicy: OnFailure
          containers:
            - name: reseed
              image: {{ $image | quote }}
              imagePullPolicy: {{ $pullPolicy | quote }}
              env:
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: VM_NAME
                  value: {{ $name | quote }}
                - name: STATE_CM
                  value: {{ $stateCM | quote }}
                - name: RESET_AFTER_DAYS
                  value: {{ default 60 $reseed.resetAfterDays | quote }}
                - name: HALT_WAIT_SECONDS
                  value: {{ default 30 $reseed.haltWaitSeconds | quote }}
              command:
                - /bin/sh
                - -ec
                - |
                  set -eu

                  log() {
                    printf '[infoblox-license] %s\n' "$*" >&2
                  }

                  ensure_state_configmap() {
                    if kubectl -n "${POD_NAMESPACE}" get configmap "${STATE_CM}" >/dev/null 2>&1; then
                      return 0
                    fi
                    cat <<EOF | kubectl -n "${POD_NAMESPACE}" apply -f -
                  apiVersion: v1
                  kind: ConfigMap
                  metadata:
                    name: ${STATE_CM}
                  data:
                    last_reset_epoch: "0"
                    last_auto_stop_epoch: "0"
                    last_reseed_reason: ""
                    last_access_epoch: "0"
                    license_pending: "false"
                    license_last_apply_epoch: "0"
                  EOF
                  }

                  set_state_value() {
                    key="$1"
                    value="$2"
                    kubectl -n "${POD_NAMESPACE}" patch configmap "${STATE_CM}" --field-manager=infoblox-lifecycle --type=merge -p "{\"data\":{\"${key}\":\"${value}\"}}" >/dev/null
                  }

                  ensure_state_configmap
                  now_epoch="$(date -u +%s)"
                  last_reset="$(kubectl -n "${POD_NAMESPACE}" get configmap "${STATE_CM}" -o jsonpath='{.data.last_reset_epoch}' 2>/dev/null || true)"
                  if ! echo "${last_reset}" | grep -Eq '^[0-9]+$'; then
                    last_reset="0"
                  fi

                  if [ "${last_reset}" -le 0 ]; then
                    set_state_value "last_reset_epoch" "${now_epoch}"
                    exit 0
                  fi

                  age_days="$(((now_epoch - last_reset) / 86400))"
                  if [ "${age_days}" -lt "${RESET_AFTER_DAYS}" ]; then
                    exit 0
                  fi

                  kubectl -n "${POD_NAMESPACE}" patch vm "${VM_NAME}" --field-manager=infoblox-lifecycle --type=merge -p '{"spec":{"runStrategy":"Halted"}}' >/dev/null || true
                  sleep "${HALT_WAIT_SECONDS}"
                  kubectl -n "${POD_NAMESPACE}" delete vmi "${VM_NAME}" --ignore-not-found=true >/dev/null || true
                  kubectl -n "${POD_NAMESPACE}" patch vm "${VM_NAME}" --field-manager=infoblox-lifecycle --type=merge -p '{"spec":{"runStrategy":"Always"}}' >/dev/null

                  set_state_value "last_reset_epoch" "${now_epoch}"
                  set_state_value "last_reseed_reason" "temp_license_renewal"
                  set_state_value "license_pending" "true"
                  set_state_value "last_access_epoch" "${now_epoch}"
{{- end }}
{{- if $license.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $name }}-vm-license
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: infoblox
spec:
  schedule: {{ $license.schedule | quote }}
  suspend: {{ $licenseSuspend }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            {{- include "skyforge.labels" . | nindent 12 }}
            app.kubernetes.io/component: infoblox
        spec:
          serviceAccountName: {{ $sa }}
          enableServiceLinks: false
          restartPolicy: OnFailure
          initContainers:
            {{- if $license.virtctlImage }}
            - name: install-virtctl
              image: {{ $license.virtctlImage | quote }}
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  set -eu
                  src="$(command -v virtctl || true)"
                  if [ -z "${src}" ] || [ ! -x "${src}" ]; then
                    echo "virtctl binary not found in init image" >&2
                    exit 1
                  fi
                  cp "${src}" /tools/virtctl
                  chmod +x /tools/virtctl
              volumeMounts:
                - name: infoblox-tools
                  mountPath: /tools
            {{- else }}
            - name: install-virtctl
              image: {{ default "docker.io/curlimages/curl:8.13.0" $license.virtctlDownloadImage | quote }}
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  set -eu

                  arch="$(uname -m)"
                  case "${arch}" in
                    x86_64|amd64)
                      asset_arch="amd64"
                      ;;
                    aarch64|arm64)
                      asset_arch="arm64"
                      ;;
                    *)
                      echo "unsupported virtctl architecture: ${arch}" >&2
                      exit 1
                      ;;
                  esac

                  version="{{ default "v1.7.2" $license.virtctlVersion }}"
                  url="https://github.com/kubevirt/kubevirt/releases/download/${version}/virtctl-${version}-linux-${asset_arch}"
                  curl -fsSL "${url}" -o /tools/virtctl
                  chmod +x /tools/virtctl
              volumeMounts:
                - name: infoblox-tools
                  mountPath: /tools
            {{- end }}
          containers:
            - name: license
              image: {{ $image | quote }}
              imagePullPolicy: {{ $pullPolicy | quote }}
              securityContext:
                runAsUser: 0
                runAsGroup: 0
              env:
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: VM_NAME
                  value: {{ $name | quote }}
                - name: STATE_CM
                  value: {{ $stateCM | quote }}
                - name: MAX_ATTEMPTS
                  value: {{ default 3 $license.maxAttempts | quote }}
                - name: ATTEMPT_SLEEP_SECONDS
                  value: {{ default 20 $license.attemptSleepSeconds | quote }}
                - name: PROMPT_WAIT_SECONDS
                  value: {{ default 180 $license.promptWaitSeconds | quote }}
                - name: CONSOLE_TIMEOUT_SECONDS
                  value: {{ default 240 $license.consoleTimeoutSeconds | quote }}
                - name: POST_BOOTSTRAP_WAIT_SECONDS
                  value: {{ default 45 $license.postBootstrapWaitSeconds | quote }}
                - name: INITIAL_WAIT_SECONDS
                  value: {{ default 8 $license.initialWaitSeconds | quote }}
                - name: CONSOLE_USERNAME
                  value: {{ default "admin" $license.consoleUsername | quote }}
                - name: CONSOLE_PASSWORD
                  value: {{ default "infoblox" $license.consolePassword | quote }}
              command:
                - /bin/sh
                - -ec
                - |
                  set -eu
                  KUBECTL_BIN="$(command -v kubectl || true)"
                  if [ -z "${KUBECTL_BIN}" ] && [ -x /opt/bitnami/kubectl/bin/kubectl ]; then
                    KUBECTL_BIN="/opt/bitnami/kubectl/bin/kubectl"
                  fi
                  if [ -z "${KUBECTL_BIN}" ] || [ ! -x "${KUBECTL_BIN}" ]; then
                    echo "kubectl binary not found in container" >&2
                    exit 1
                  fi
                  VIRTCTL_BIN="/tools/virtctl"

                  log() {
                    printf '[infoblox-license] %s\n' "$*" >&2
                  }
                  kctl() {
                    "${KUBECTL_BIN}" "$@"
                  }

                  ensure_state_configmap() {
                    if kctl -n "${POD_NAMESPACE}" get configmap "${STATE_CM}" >/dev/null 2>&1; then
                      return 0
                    fi
                    cat <<EOF | kctl -n "${POD_NAMESPACE}" apply -f -
                  apiVersion: v1
                  kind: ConfigMap
                  metadata:
                    name: ${STATE_CM}
                  data:
                    last_reset_epoch: "0"
                    last_auto_stop_epoch: "0"
                    last_reseed_reason: ""
                    last_access_epoch: "0"
                    license_pending: "false"
                    license_last_apply_epoch: "0"
                  EOF
                  }

                  get_state_value() {
                    key="$1"
                    kctl -n "${POD_NAMESPACE}" get configmap "${STATE_CM}" -o jsonpath="{.data.${key}}" 2>/dev/null || true
                  }

                  set_state_value() {
                    key="$1"
                    value="$2"
                    kctl -n "${POD_NAMESPACE}" patch configmap "${STATE_CM}" --field-manager=infoblox-lifecycle --type=merge -p "{\"data\":{\"${key}\":\"${value}\"}}" >/dev/null
                  }

                  ensure_virtctl() {
                    if [ -x "${VIRTCTL_BIN}" ]; then
                      log "using bundled virtctl binary"
                      return 0
                    fi
                    log "virtctl binary missing at ${VIRTCTL_BIN}"
                    return 1
                  }

                  run_bootstrap_once() {
                    input_file="/tmp/ibx-console.input"
                    output_file="/tmp/ibx-console.output"

                    {
                      i=0
                      while [ "${i}" -lt "${INITIAL_WAIT_SECONDS}" ]; do
                        printf '\n'
                        i="$((i + 1))"
                      done
                      printf '%s\n' "${CONSOLE_USERNAME}"
                      printf '%s\n' "${CONSOLE_PASSWORD}"
                      printf 'set network\n'
                      i=0
                      while [ "${i}" -lt 12 ]; do
                        printf 'y\n'
                        i="$((i + 1))"
                      done
                      printf 'set temp_license\n'
                      i=0
                      while [ "${i}" -lt 24 ]; do
                        printf 'y\n'
                        i="$((i + 1))"
                      done
                      printf 'save config\n'
                      i=0
                      while [ "${i}" -lt 10 ]; do
                        printf 'y\n'
                        i="$((i + 1))"
                      done
                      printf 'exit\n'
                    } >"${input_file}"

                    if command -v timeout >/dev/null 2>&1; then
                      if ! timeout "${CONSOLE_TIMEOUT_SECONDS}"s sh -c "cat \"${input_file}\" | \"${VIRTCTL_BIN}\" --namespace \"${POD_NAMESPACE}\" console \"${VM_NAME}\" >\"${output_file}\" 2>&1"; then
                        log "virtctl console/bootstrap command failed"
                        tail -n 60 "${output_file}" >&2 || true
                        return 1
                      fi
                    else
                      if ! cat "${input_file}" | "${VIRTCTL_BIN}" --namespace "${POD_NAMESPACE}" console "${VM_NAME}" >"${output_file}" 2>&1; then
                        log "virtctl console/bootstrap command failed"
                        tail -n 60 "${output_file}" >&2 || true
                        return 1
                      fi
                    fi

                    # Guard against false-positive console success where virtctl
                    # connects but the appliance never presents a login/prompt.
                    if ! grep -Eiq 'login:|[Pp]assword:|[>#] ' "${output_file}"; then
                      log "console did not present an interactive prompt"
                      tail -n 60 "${output_file}" >&2 || true
                      return 1
                    fi

                    log "virtctl console/bootstrap command completed"
                    tail -n 40 "${output_file}" >&2 || true
                  }

                  ensure_state_configmap
                  run_strategy="$(kctl -n "${POD_NAMESPACE}" get vm "${VM_NAME}" -o jsonpath='{.spec.runStrategy}' 2>/dev/null || true)"
                  if [ "${run_strategy}" != "Always" ]; then
                    exit 0
                  fi
                  if ! kctl -n "${POD_NAMESPACE}" get vmi "${VM_NAME}" >/dev/null 2>&1; then
                    exit 0
                  fi

                  if ! ensure_virtctl; then
                    set_state_value "license_pending" "true"
                    log "virtctl unavailable; keeping license_pending=true"
                    exit 0
                  fi

                  attempt=1
                  while [ "${attempt}" -le "${MAX_ATTEMPTS}" ]; do
                    log "bootstrap attempt ${attempt}/${MAX_ATTEMPTS}"
                    if run_bootstrap_once; then
                      now_epoch="$(date -u +%s)"
                      set_state_value "license_pending" "false"
                      set_state_value "license_last_apply_epoch" "${now_epoch}"
                      set_state_value "last_access_epoch" "${now_epoch}"
                      log "bootstrap command applied; state updated"
                      exit 0
                    fi
                    log "attempt ${attempt} did not converge; sleeping ${ATTEMPT_SLEEP_SECONDS}s"
                    sleep "${ATTEMPT_SLEEP_SECONDS}"
                    attempt="$((attempt + 1))"
                  done

                  set_state_value "license_pending" "true"
                  log "bootstrap exhausted; leaving license_pending=true"
              volumeMounts:
                - name: infoblox-tools
                  mountPath: /tools
          volumes:
            - name: infoblox-tools
              emptyDir: {}
{{- end }}
{{- end }}
