{{- if .Values.skyforge.localFrontdoor.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: skyforge-local-frontdoor
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
data:
  nginx.conf: |
    events {}
    http {
      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }

      upstream skyforge_server { server skyforge-server:8085; }
      upstream skyforge_dex { server dex:5556; }
      upstream skyforge_git { server gitea-sso-proxy:8080; }
      upstream skyforge_redoc { server redoc-sso-proxy:8080; }
      upstream skyforge_coder { server coder:7080; }
      upstream skyforge_yaade { server yaade:80; }
      upstream skyforge_s3gw { server s3gw:7480; }

      server {
        listen 80;
        server_name {{ .Values.skyforge.hostname }};
        return 308 https://$host$request_uri;
      }

      server {
        listen 443 ssl;
        server_name {{ .Values.skyforge.hostname }};

        ssl_certificate /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        location = /coder/launch {
          return 302 /coder/;
        }

        location /coder/ {
          rewrite ^/coder/?(.*)$ /$1 break;
          proxy_pass http://skyforge_coder;
        }

        location /api/v2/ {
          proxy_pass http://skyforge_coder;
        }

        location /dex/ {
          proxy_pass http://skyforge_dex;
        }

        location /git/ {
          proxy_set_header X-Skyforge-External-Prefix /git;
          rewrite ^/git/?(.*)$ /$1 break;
          proxy_pass http://skyforge_git;
        }

        location /redoc/ {
          proxy_set_header X-Skyforge-External-Prefix /redoc;
          rewrite ^/redoc/?(.*)$ /$1 break;
          proxy_pass http://skyforge_redoc;
        }

        location /api-testing/ {
          proxy_pass http://skyforge_yaade;
        }

        location /files/ {
          rewrite ^/files/(.*)$ /{{ .Values.skyforge.objectStorage.filesBucket | default "skyforge-files" }}/$1 break;
          proxy_pass http://skyforge_s3gw;
        }

        location = / {
          rewrite ^ /index.html break;
          proxy_pass http://skyforge_server;
        }

        location = /settings {
          rewrite ^ /index.html break;
          proxy_pass http://skyforge_server;
        }

        location /settings/ {
          rewrite ^ /index.html break;
          proxy_pass http://skyforge_server;
        }

        location / {
          proxy_pass http://skyforge_server;
        }
      }
    }
{{- end }}
