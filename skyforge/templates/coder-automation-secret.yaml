{{- if .Values.skyforge.coder.enabled -}}
{{- $secretName := default "coder-automation" .Values.skyforge.coder.automation.secretName -}}
{{- $tokenKey := default "token" .Values.skyforge.coder.automation.tokenKey -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $tokenValue := "" -}}
{{- if $existing -}}
  {{- $tokenValue = default "" (index $existing.data $tokenKey) -}}
{{- else -}}
  {{- $tokenValue = b64enc (printf "%s-%s" (randAlphaNum 10) (randAlphaNum 22)) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  annotations:
    "helm.sh/resource-policy": keep
  labels:
{{ include "skyforge.labels" . | indent 4 }}
type: Opaque
data:
  {{ $tokenKey }}: {{ $tokenValue | quote }}
{{- end }}
