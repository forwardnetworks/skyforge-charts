{{- if .Values.skyforge.encoreCfg.create }}
{{- $cfg := dict -}}
{{- if .Values.skyforge.encoreCfg.json }}
{{- $cfg = (fromJson (.Values.skyforge.encoreCfg.json | trim)) -}}
{{- end }}
{{- $obsEnabled := default false .Values.skyforge.observability.enabled -}}
{{- $obsManagedEnabled := default false .Values.skyforge.observability.managed.enabled -}}
{{- $edition := lower (trim (default "enterprise" .Values.skyforge.edition)) -}}
{{- $forwardEnabled := and (ne $edition "oss") .Values.skyforge.forward.enabled -}}
{{- $obsNamespace := default .Release.Namespace .Values.skyforge.observability.namespace -}}
{{- $obsPromName := default "skyforge-prometheus" .Values.skyforge.observability.prometheus.serviceName -}}
{{- $obsPromPort := default 9090 .Values.skyforge.observability.prometheus.servicePort -}}
{{- $obsPromExternalPrefix := default "/prometheus" .Values.skyforge.observability.prometheus.externalPrefix | trimSuffix "/" -}}
{{- $obsPromBaseURLDefault := printf "http://%s.%s.svc.cluster.local:%v%s" $obsPromName $obsNamespace $obsPromPort $obsPromExternalPrefix -}}
{{- $obsPromBaseURL := "" -}}
{{- $obsPromInternalBaseURL := default "" .Values.skyforge.observability.prometheus.internalBaseURL | trimSuffix "/" -}}
{{- $obsPromBackendEnabled := and $obsEnabled (or $obsManagedEnabled (ne $obsPromInternalBaseURL "")) -}}
{{- $host := .Values.skyforge.hostname -}}
{{- $gatewayAdditionalHostnames := .Values.skyforge.gateway.additionalHostnames | default (list) -}}
{{- $forwardHost := default $host .Values.skyforge.forwardCluster.hostname -}}
{{- $defaultForwardBaseURL := "https://fwd-appserver.forward.svc:8443" -}}
{{- $managedForwardBaseURL := (default "" .Values.skyforge.forward.baseUrl | trimSuffix "/") -}}
{{- if and (eq $managedForwardBaseURL "") .Values.skyforge.forwardCluster.enabled (ne $forwardHost "") -}}
  {{- $managedForwardBaseURL = printf "https://%s" $forwardHost -}}
{{- end -}}
{{- if eq $managedForwardBaseURL "" -}}
  {{- $managedForwardBaseURL = $defaultForwardBaseURL -}}
{{- end -}}
{{- if $obsEnabled -}}
  {{- if $obsPromBackendEnabled -}}
    {{- $obsPromBaseURL = (default $obsPromBaseURLDefault $obsPromInternalBaseURL | trimSuffix "/") -}}
  {{- end -}}
{{- end -}}
{{- $integrations := merge (get $cfg "Integrations" | default (dict)) (dict
  "GiteaBaseURL" (default "" .Values.skyforge.gitea.url | trimSuffix "/")
  "CoderLaunchPath" (default "/api/coder/session" .Values.skyforge.coder.portalRedirectPath)
  "NetboxBaseURL" (default "" .Values.skyforge.netboxUrl | trimSuffix "/")
  "NetboxInternalBaseURL" (default "" .Values.skyforge.netbox.internalUrl | trimSuffix "/")
  "NautobotBaseURL" (default "" .Values.skyforge.nautobotUrl | trimSuffix "/")
  "NautobotInternalBaseURL" (default "" .Values.skyforge.nautobot.internalUrl | trimSuffix "/")
  "InfobloxBaseURL" (default "" .Values.skyforge.infobloxUrl | trimSuffix "/")
  "InfobloxInternalBaseURL" (default "" .Values.skyforge.infoblox.internalUrl | trimSuffix "/")
  "JiraBaseURL" (default "" .Values.skyforge.jiraUrl | trimSuffix "/")
  "Rapid7BaseURL" (default "" .Values.skyforge.rapid7Url | trimSuffix "/")
  "ElkBaseURL" (default "" .Values.skyforge.elkUrl | trimSuffix "/")
  "PrometheusBaseURL" $obsPromBaseURL
  "YaadeBaseURL" (default "" .Values.skyforge.yaadeUrl | trimSuffix "/")
  "YaadeInternalBaseURL" (default "" .Values.skyforge.yaade.internalUrl | trimSuffix "/")
) -}}
{{- $_ := set $cfg "Integrations" $integrations -}}
{{- $netlab := merge (get $cfg "Netlab" | default (dict)) (dict
  "SSHUser" (default "" .Values.skyforge.netlab.sshUser)
  "StateRoot" (default "" .Values.skyforge.netlab.stateRoot)
  "Mode" "k8s"
  "Image" (required "skyforge.netlab.image is required" .Values.skyforge.netlab.image)
  "PullPolicy" (default "IfNotPresent" .Values.skyforge.netlab.pullPolicy)
) -}}
{{- $_ := set $cfg "Netlab" $netlab -}}
{{- $_ := set $cfg "PublicURL" (default "" .Values.skyforge.publicUrl | trimSuffix "/") -}}
{{- $forwardPublicURL := "" -}}
{{- if .Values.skyforge.forwardCluster.enabled -}}
{{- $forwardHostName := default "" .Values.skyforge.forwardCluster.hostname -}}
{{- if $forwardHostName -}}
{{- $forwardPublicURL = printf "https://%s" $forwardHostName -}}
{{- else -}}
{{- $forwardPublicURL = (default "" .Values.skyforge.publicUrl | trimSuffix "/") -}}
{{- end -}}
{{- end -}}
{{- $_ := set $cfg "ForwardClusterPublicURL" $forwardPublicURL -}}
{{- $userScopes := merge (get $cfg "UserScopes" | default (dict)) (dict
  "DataDir" (default "/var/lib/skyforge" .Values.skyforge.userDataDir)
  "GiteaAPIURL" (default "" .Values.skyforge.gitea.apiUrl | trimSuffix "/")
  "GiteaUsername" (default "" .Values.skyforge.gitea.username)
  "GiteaRepoPrivate" .Values.skyforge.gitea.repoPrivate
  "DeleteMode" (default "live" .Values.skyforge.userDeleteMode)
) -}}
{{- $_ := set $cfg "UserScopes" $userScopes -}}
{{- $objectStorage := merge (get $cfg "ObjectStorage" | default (dict)) (dict
  "Endpoint" (default "s3gw:7480" .Values.skyforge.objectStorage.endpoint | trimSuffix "/")
  "UseSSL" (default false .Values.skyforge.objectStorage.useSsl)
) -}}
{{- $_ := set $cfg "ObjectStorage" $objectStorage -}}
{{- $terraform := merge (get $cfg "Terraform" | default (dict)) (dict
  "BinaryPath" (default "" .Values.skyforge.terraform.path)
) -}}
{{- $_ := set $cfg "Terraform" $terraform -}}
{{- $forward := merge (get $cfg "Forward" | default (dict)) (dict
  "BaseURL" $managedForwardBaseURL
  "SNMPPlaceholderEnabled" .Values.skyforge.forward.snmpPlaceholderEnabled
) -}}
{{- $_ := set $cfg "Forward" $forward -}}
{{- $burst := merge (get $cfg "Burst" | default (dict)) (dict
  "Hetzner" (merge (get (get $cfg "Burst" | default (dict)) "Hetzner" | default (dict)) (dict
    "Enabled" (default false .Values.skyforge.burst.hetzner.enabled)
    "ProvisioningEnabled" (default false .Values.skyforge.burst.hetzner.provisioningEnabled)
    "ProviderLabel" (default "hetzner" .Values.skyforge.burst.hetzner.providerLabel)
    "PoolClass" (default "burst" .Values.skyforge.burst.hetzner.poolClass)
    "Location" (default "" .Values.skyforge.burst.hetzner.location)
    "NetworkZone" (default "" .Values.skyforge.burst.hetzner.networkZone)
    "NetworkCIDR" (default "" .Values.skyforge.burst.hetzner.networkCIDR)
    "WorkerSubnetCIDR" (default "" .Values.skyforge.burst.hetzner.workerSubnetCIDR)
    "ServerType" (default "" .Values.skyforge.burst.hetzner.serverType)
    "ServerImage" (default "" .Values.skyforge.burst.hetzner.image)
    "MinReplicas" (default 0 .Values.skyforge.burst.hetzner.minReplicas)
    "MaxReplicas" (default 0 .Values.skyforge.burst.hetzner.maxReplicas)
    "ScaleDownCooldownMinutes" (default 30 .Values.skyforge.burst.hetzner.scaleDownCooldownMinutes)
    "WireGuard" (dict
      "Mode" (default "outbound-to-gateway" .Values.skyforge.burst.hetzner.wireguard.mode)
      "EndpointHost" (default "" .Values.skyforge.burst.hetzner.wireguard.endpointHost)
      "EndpointPort" (default 51820 .Values.skyforge.burst.hetzner.wireguard.endpointPort)
      "ListenPort" (default 51820 .Values.skyforge.burst.hetzner.wireguard.listenPort)
      "InterfaceName" (default "wg-burst0" .Values.skyforge.burst.hetzner.wireguard.interfaceName)
      "TunnelCIDR" (default "" .Values.skyforge.burst.hetzner.wireguard.tunnelCIDR)
      "LocalAddressCIDR" (default "" .Values.skyforge.burst.hetzner.wireguard.localAddressCIDR)
      "GatewayNodeIP" (default "" .Values.skyforge.burst.hetzner.wireguard.gatewayNodeIP)
      "MTU" (default 1420 .Values.skyforge.burst.hetzner.wireguard.mtu)
      "AllowedIPs" (default (list) .Values.skyforge.burst.hetzner.wireguard.allowedIPs)
      "BurstNodeCIDRs" (default (list) .Values.skyforge.burst.hetzner.wireguard.burstNodeCIDRs)
    )
    "K3S" (dict
      "ServerURL" (default "" .Values.skyforge.burst.hetzner.k3s.serverUrl)
    )
  ))
) -}}
{{- $_ := set $cfg "Burst" $burst -}}
{{- $forwardCollector := merge (get $cfg "ForwardCollector" | default (dict)) (dict
  "Image" (include "skyforge.forwardCollector.image" .)
  "PullPolicy" (default "IfNotPresent" .Values.skyforge.forwardCollector.pullPolicy)
  "ImagePullSecretName" (default "" .Values.skyforge.forwardCollector.imagePullSecretName)
  "ImagePullSecretNamespace" (default "" .Values.skyforge.forwardCollector.imagePullSecretNamespace)
  "HeapSizeGB" (default 0 .Values.skyforge.forwardCollector.heapSizeGB)
) -}}
{{- $_ := set $cfg "ForwardCollector" $forwardCollector -}}
{{- $features := merge (get $cfg "Features" | default (dict)) (dict
  "GiteaEnabled" .Values.skyforge.gitea.enabled
  "CoderEnabled" .Values.skyforge.coder.enabled
  "YaadeEnabled" .Values.skyforge.yaade.enabled
  "SwaggerUIEnabled" .Values.skyforge.redoc.enabled
  "ForwardEnabled" $forwardEnabled
  "NetboxEnabled" .Values.skyforge.netbox.enabled
  "NautobotEnabled" .Values.skyforge.nautobot.enabled
  "InfobloxEnabled" .Values.skyforge.infoblox.enabled
  "JiraEnabled" .Values.skyforge.jira.enabled
  "Rapid7Enabled" .Values.skyforge.rapid7.enabled
  "ElkEnabled" .Values.skyforge.elk.enabled
  "ForwardGrafanaEnabled" $obsEnabled
  "ForwardPrometheusEnabled" $obsPromBackendEnabled
  "DNSEnabled" .Values.skyforge.dns.enabled
) -}}
{{- $_ := set $cfg "Features" $features -}}
{{- $worker := merge (get $cfg "Worker" | default (dict)) (dict
  "InteractiveConcurrency" (default 8 .Values.skyforge.worker.tuning.interactiveConcurrency)
  "InteractiveQueueSize" (default 64 .Values.skyforge.worker.tuning.interactiveQueueSize)
  "BackgroundConcurrency" (default 2 .Values.skyforge.worker.tuning.backgroundConcurrency)
  "BackgroundQueueSize" (default 16 .Values.skyforge.worker.tuning.backgroundQueueSize)
  "HeartbeatIntervalSeconds" (default 30 .Values.skyforge.worker.tuning.heartbeatIntervalSeconds)
  "ReconcileQueuedIntervalSeconds" (default 30 .Values.skyforge.worker.tuning.reconcileQueuedIntervalSeconds)
  "ReconcileRunningIntervalSeconds" (default 300 .Values.skyforge.worker.tuning.reconcileRunningIntervalSeconds)
  "ActivationIntervalSeconds" (default 20 .Values.skyforge.worker.tuning.activationIntervalSeconds)
  "ActivationMinQueuedAgeSeconds" (default 20 .Values.skyforge.worker.tuning.activationMinQueuedAgeSeconds)
  "ActivationBatchSize" (default 200 .Values.skyforge.worker.tuning.activationBatchSize)
  "DiagStaleHeartbeatSeconds" (default 120 .Values.skyforge.worker.tuning.diagStaleHeartbeatSeconds)
  "DiagOldestQueuedSeconds" (default 300 .Values.skyforge.worker.tuning.diagOldestQueuedSeconds)
) -}}
{{- $_ := set $cfg "Worker" $worker -}}
{{- $kube := merge (get $cfg "Kubernetes" | default (dict)) (dict
  "ImagePullSecretName" (default "ghcr-pull" .Values.kubernetes.imagePullSecret.name)
  "ImagePullSecretNamespace" .Release.Namespace
) -}}
{{- $_ := set $cfg "Kubernetes" $kube -}}
{{- $_ := set $cfg "TaskWorkerEnabled" true -}}
{{- $_ := set $cfg "NotificationsEnabled" .Values.skyforge.notificationsEnabled -}}
{{- $_ := set $cfg "AuditRetention" (default "180d" .Values.skyforge.audit.retention) -}}
{{- $_ := set $cfg "StaticRoot" (default "/opt/skyforge/static" .Values.skyforge.staticRoot) -}}
{{- $_ := set $cfg "ListenAddr" (default ":8085" .Values.skyforge.listenAddr) -}}
{{- $_ := set $cfg "AdminUsers" (default "" .Values.skyforge.adminUsers) -}}
{{- $_ := set $cfg "AdminUsername" (default "skyforge" .Values.skyforge.admin.username) -}}
{{- $_ := set $cfg "CorpEmailDomain" (default "" .Values.skyforge.domain) -}}
{{- $_ := set $cfg "MaxGroups" (default 50 .Values.skyforge.maxGroups) -}}
{{- $_ := set $cfg "SessionCookie" (default "skyforge_session" .Values.skyforge.sessionCookie) -}}
{{- $_ := set $cfg "SessionTTL" (default "8h" .Values.skyforge.sessionTtl) -}}
{{- $_ := set $cfg "CookieSecure" (printf "%v" .Values.skyforge.cookieSecure) -}}
{{- $_ := set $cfg "CookieDomain" (default "" .Values.skyforge.cookieDomain) -}}
{{- $uiAuthMode := default "local" .Values.skyforge.auth.mode -}}
{{- $ui := merge (get $cfg "UI" | default (dict)) (dict
  "ProductName" (default "" .Values.skyforge.ui.productName)
  "ProductSubtitle" (default "" .Values.skyforge.ui.productSubtitle)
  "LogoURL" (default "" .Values.skyforge.ui.logoUrl)
  "LogoAlt" (default "" .Values.skyforge.ui.logoAlt)
  "HeaderBackground" (default "" .Values.skyforge.ui.headerBgUrl)
  "SupportText" (default "" .Values.skyforge.ui.supportText)
  "SupportURL" (default "" .Values.skyforge.ui.supportUrl)
  "ThemeDefault" (default "" .Values.skyforge.uiThemeDefault)
  "AuthMode" $uiAuthMode
) -}}
{{- $_ := set $cfg "UI" $ui -}}
{{- if and .Values.skyforge.dex.enabled (eq $uiAuthMode "oidc") -}}
{{- $oidc := merge (get $cfg "OIDC" | default (dict)) (dict
  "DiscoveryURL" (default "http://dex:5556/dex" .Values.skyforge.oidc.discoveryUrl)
  "IssuerURL" (default (printf "https://%s/dex" .Values.skyforge.hostname) .Values.skyforge.oidc.issuerUrl)
  "RedirectURL" (default (printf "https://%s/api/auth/oidc/callback" .Values.skyforge.hostname) .Values.skyforge.oidc.redirectUrl)
) -}}
{{- $_ := set $cfg "OIDC" $oidc -}}
{{- end -}}
{{- $_ := set $cfg "AwsSSOStartURL" (default "" .Values.skyforge.awsSsoStartUrl) -}}
{{- $_ := set $cfg "AwsSSORegion" (default "us-east-1" .Values.skyforge.awsSsoRegion) -}}
{{- $_ := set $cfg "YaadeAdminUsername" (default "admin" .Values.skyforge.yaadeAdminUsername) -}}
{{- $dns := merge (get $cfg "DNS" | default (dict)) (dict
  "AdminUsername" (default "admin" .Values.skyforge.dns.adminUsername)
  "UserZoneSuffix" (default "skyforge" .Values.skyforge.dns.userZoneSuffix)
) -}}
{{- $_ := set $cfg "DNS" $dns -}}
apiVersion: v1
kind: Secret
metadata:
  name: skyforge-encore-cfg
type: Opaque
stringData:
  # NOTE: This is the typed Encore config payload for the `skyforge` service.
  # Encore expects ENCORE_CFG_<SERVICE> to contain a base64url-encoded JSON object
  # without padding. (Encore uses base64.RawURLEncoding.)
  # Keep it non-secret: do not include passwords/tokens here.
  ENCORE_CFG_SKYFORGE: {{ toJson $cfg | b64enc | replace "+" "-" | replace "/" "_" | trimAll "=" | quote }}
  # cloudcredentials service reads typed config from ENCORE_CFG_CLOUDCREDENTIALS.
  # Keep this payload in sync with ENCORE_CFG_SKYFORGE for shared fields
  # (including AwsSSOStartURL/AwsSSORegion).
  ENCORE_CFG_CLOUDCREDENTIALS: {{ toJson $cfg | b64enc | replace "+" "-" | replace "/" "_" | trimAll "=" | quote }}
{{- end }}
