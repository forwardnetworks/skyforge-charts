{{- if and .Values.skyforge.rapid7.enabled .Values.skyforge.rapid7.managed }}
{{- $name := default "rapid7" .Values.skyforge.rapid7.serviceName -}}
{{- $port := default 3780 .Values.skyforge.rapid7.servicePort -}}
{{- $containerPort := default 3780 .Values.skyforge.rapid7.containerPort -}}
{{- $pullPolicy := default "IfNotPresent" .Values.skyforge.rapid7.pullPolicy -}}
{{- $priorityClass := default .Values.skyforge.integrationsPriorityClassName .Values.skyforge.rapid7.priorityClassName -}}
---
{{- if .Values.skyforge.rapid7.storage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}-home
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ default "50Gi" .Values.skyforge.rapid7.storage.size | quote }}
  {{- with .Values.skyforge.rapid7.storage.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  replicas: 1
  progressDeadlineSeconds: {{ default 3600 .Values.skyforge.rapid7.progressDeadlineSeconds }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: rapid7
    spec:
      {{- if $priorityClass }}
      priorityClassName: {{ $priorityClass | quote }}
      {{- end }}
      {{- with .Values.kubernetes.imagePullSecrets }}
      imagePullSecrets:
      {{- range . }}
        - name: {{ . | quote }}
      {{- end }}
      {{- end }}
      containers:
        - name: rapid7
          image: {{ required "skyforge.rapid7.image is required when rapid7.managed=true" .Values.skyforge.rapid7.image | quote }}
          imagePullPolicy: {{ $pullPolicy | quote }}
          ports:
            - name: https
              containerPort: {{ $containerPort }}
          env:
            {{- range $k, $v := .Values.skyforge.rapid7.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            tcpSocket:
              port: https
            # Rapid7 first boot can take a long time while extracting content.
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 180
          livenessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
{{ toYaml .Values.skyforge.rapid7.resources | nindent 12 }}
          volumeMounts:
            - name: rapid7-home
              mountPath: /opt/rapid7/nexpose
      volumes:
        - name: rapid7-home
          {{- if .Values.skyforge.rapid7.storage.enabled }}
          persistentVolumeClaim:
            claimName: {{ $name }}-home
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: https
      port: {{ $port }}
      targetPort: https
      appProtocol: https
{{- end }}
