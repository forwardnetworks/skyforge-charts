{{- $obsEnabled := default false .Values.skyforge.observability.enabled -}}
{{- $obsManagedEnabled := default false .Values.skyforge.observability.managed.enabled -}}
{{- $obsNamespace := default .Release.Namespace .Values.skyforge.observability.namespace -}}
{{- $dashboards := default dict .Values.skyforge.observability.dashboards -}}
{{- if and $obsEnabled $obsManagedEnabled (default false $dashboards.enabled) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: skyforge-signals-dashboard
  namespace: {{ $obsNamespace }}
  labels:
    {{- include "skyforge.labels" . | nindent 4 }}
    {{ default "grafana_dashboard" $dashboards.labelKey | quote }}: {{ default "1" $dashboards.labelValue | quote }}
  annotations:
    k8s-sidecar-target-directory: {{ default "Skyforge" $dashboards.folder | quote }}
data:
  skyforge-signals.json: |
{{ .Files.Get "files/grafana-dashboards/skyforge-signals.json" | indent 4 }}
{{- end }}
